<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chatub - AI Agent Chat Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables / Theme ===== */
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #181b22;
  --bg-tertiary: #1f232c;
  --bg-hover: #282d38;
  --bg-active: #323842;
  --text-primary: #e8eaef;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.12);
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-dim: rgba(99,102,241,0.12);
  --accent-glow: rgba(99,102,241,0.25);
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --agent-laika: #f97316;
  --agent-xiaomi: #06b6d4;
  --agent-lenovo: #a78bfa;
  --ai-bg: rgba(30,41,59,0.5);
  --ai-border: rgba(51,65,85,0.4);
  --mention-bg: rgba(99,102,241,0.15);
  --mention-text: #a5b4fc;
  --glass-bg: rgba(24,27,34,0.88);
  --glass-border: rgba(255,255,255,0.06);
  --scrollbar-track: transparent;
  --scrollbar-thumb: rgba(255,255,255,0.08);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --sidebar-w: 280px;
  --panel-w: 340px;
  --header-h: 56px;
  --input-h: 60px;
  --transition: 0.2s ease;
  --transition-slow: 0.35s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg-primary: #f8fafc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f1f5f9;
  --bg-hover: #e2e8f0;
  --bg-active: #cbd5e1;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.1);
  --accent: #4f46e5;
  --accent-hover: #6366f1;
  --accent-dim: rgba(79,70,229,0.08);
  --accent-glow: rgba(79,70,229,0.15);
  --ai-bg: rgba(240,244,255,0.8);
  --ai-border: rgba(199,210,254,0.5);
  --mention-bg: rgba(79,70,229,0.1);
  --mention-text: #4338ca;
  --glass-bg: rgba(255,255,255,0.92);
  --glass-border: rgba(0,0,0,0.05);
  --scrollbar-track: transparent;
  --scrollbar-thumb: rgba(0,0,0,0.1);
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
input, textarea, select, button { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
a { color: var(--accent); text-decoration: none; }

/* ===== Layout ===== */
#app { display: flex; height: 100vh; width: 100vw; }
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--glass-border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform var(--transition-slow);
}
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#right-panel {
  width: var(--panel-w); min-width: var(--panel-w);
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-left: 1px solid var(--glass-border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform var(--transition-slow);
}
#right-panel.hidden { display: none; }

/* ===== Sidebar ===== */
.sidebar-header {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header h2 {
  font-size: 17px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent) 0%, var(--agent-lenovo) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.project-switcher {
  padding: 8px 16px; border-bottom: 1px solid var(--border);
}
.project-switcher select {
  width: 100%; padding: 7px 10px; background: var(--bg-tertiary);
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  color: var(--text-primary); outline: none; font-weight: 500;
  transition: border-color var(--transition);
}
.project-switcher select:focus { border-color: var(--accent); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-section { padding: 4px 12px; }
.nav-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  color: var(--text-muted); letter-spacing: 1px; padding: 10px 0 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-section-title button {
  font-size: 15px; color: var(--text-muted); padding: 2px 6px;
  line-height: 1; transition: all var(--transition);
  border-radius: var(--radius-sm);
}
.nav-section-title button:hover { color: var(--accent); background: var(--accent-dim); }

/* Forum Topic Style Channel Items */
.nav-item {
  display: flex; align-items: center; padding: 8px 10px; border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition); gap: 10px;
  color: var(--text-secondary); font-size: 13px; position: relative;
  margin-bottom: 2px; border: 1px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--accent-dim); color: var(--text-primary); font-weight: 600;
  border-color: var(--accent-glow);
}
.nav-item .icon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
  background: var(--bg-tertiary);
}
.nav-item.active .icon { background: var(--accent-dim); }
.nav-item .channel-info-wrap { flex: 1; min-width: 0; }
.nav-item .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-item .topic-preview {
  font-size: 11px; color: var(--text-muted); margin-top: 1px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nav-item .badge {
  background: var(--danger); color: #fff; font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center;
}
.nav-item .badge:empty { display: none; }

/* Agent section in sidebar */
.agent-section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted);
  padding: 8px 4px 4px;
}
.member-item {
  display: flex; align-items: center; padding: 6px 8px; gap: 10px;
  border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary);
  cursor: default; transition: background var(--transition);
}
.member-item:hover { background: var(--bg-hover); }
.member-avatar {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 14px;
  flex-shrink: 0; position: relative;
}
.member-avatar.agent-avatar {
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.member-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.member-role {
  font-size: 10px; color: var(--text-muted); padding: 1px 6px;
  background: var(--bg-tertiary); border-radius: 8px; white-space: nowrap;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.bot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse-dot 2s infinite; }
.status-dot.offline { background: var(--text-muted); }
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Sidebar footer */
.sidebar-footer {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.sidebar-footer button {
  flex: 1; padding: 8px; border-radius: var(--radius-sm);
  background: var(--bg-tertiary); color: var(--text-secondary);
  font-size: 12px; font-weight: 500; transition: all var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 4px;
  border: 1px solid transparent;
}
.sidebar-footer button:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }

/* ===== Main Header ===== */
.main-header {
  height: var(--header-h); padding: 0 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.main-header .hamburger {
  display: none; font-size: 20px; padding: 6px;
  color: var(--text-secondary); border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.main-header .hamburger:hover { background: var(--bg-hover); }
.main-header .channel-info { flex: 1; }
.main-header .channel-name { font-size: 15px; font-weight: 700; }
.main-header .channel-desc { font-size: 11px; color: var(--text-muted); }
.main-header .actions { display: flex; gap: 2px; }
.header-btn {
  padding: 8px; border-radius: var(--radius-sm); color: var(--text-secondary);
  font-size: 16px; transition: all var(--transition);
}
.header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.header-btn.active { color: var(--accent); }

/* ===== Messages ===== */
.messages-container {
  flex: 1; overflow-y: auto; padding: 16px 20px; display: flex;
  flex-direction: column; gap: 4px; scroll-behavior: smooth;
}
.msg-group {
  display: flex; gap: 12px; padding: 8px 12px; position: relative;
  border-radius: var(--radius-lg); transition: background 0.15s ease;
  animation: slideUp 0.25s ease;
}
.msg-group:hover { background: var(--bg-hover); }
.msg-avatar {
  width: 38px; height: 38px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 17px;
  flex-shrink: 0; margin-top: 2px; transition: transform var(--transition);
}
.msg-group:hover .msg-avatar { transform: scale(1.05); }
.msg-content { flex: 1; min-width: 0; }
.msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
.msg-author { font-weight: 700; font-size: 13px; }
.msg-time { font-size: 11px; color: var(--text-muted); }
.msg-badge-bot {
  font-size: 9px; background: var(--accent); color: #fff;
  padding: 1px 4px; border-radius: 3px; font-weight: 700;
}
/* Agent role badge */
.msg-badge-agent {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--accent-glow);
  letter-spacing: 0.3px;
}
.msg-badge-agent[data-agent="laika"] {
  background: rgba(249,115,22,0.12); color: var(--agent-laika);
  border-color: rgba(249,115,22,0.25);
}
.msg-badge-agent[data-agent="xiaomi"] {
  background: rgba(6,182,212,0.12); color: var(--agent-xiaomi);
  border-color: rgba(6,182,212,0.25);
}
.msg-badge-agent[data-agent="lenovo"] {
  background: rgba(167,139,250,0.12); color: var(--agent-lenovo);
  border-color: rgba(167,139,250,0.25);
}
.msg-body { word-wrap: break-word; overflow-wrap: break-word; }
.msg-body p { margin: 4px 0; }
.msg-body code {
  background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;
  font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 12.5px;
  border: 1px solid var(--border);
}
.msg-body pre {
  background: var(--bg-primary); border: 1px solid var(--border-strong);
  border-radius: var(--radius); padding: 14px; margin: 8px 0;
  overflow-x: auto; position: relative;
}
.msg-body pre code { background: none; padding: 0; font-size: 12.5px; display: block; border: none; }
.code-copy-btn {
  position: absolute; top: 6px; right: 6px; padding: 4px 10px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 11px; color: var(--text-secondary);
  opacity: 0; transition: all var(--transition); font-weight: 500;
}
.msg-body pre:hover .code-copy-btn { opacity: 1; }
.code-copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.msg-body blockquote {
  border-left: 3px solid var(--accent); padding: 6px 14px;
  margin: 8px 0; color: var(--text-secondary); background: var(--accent-dim);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.msg-body ul, .msg-body ol { padding-left: 24px; margin: 4px 0; }
.msg-body strong { font-weight: 700; }
.msg-body em { font-style: italic; }
.msg-body img {
  max-width: 300px; max-height: 200px; border-radius: var(--radius);
  cursor: pointer; margin: 4px 0;
}

/* AI Agent message style */
.msg-group.ai-msg {
  background: var(--ai-bg); border: 1px solid var(--ai-border);
  border-radius: var(--radius-lg); padding: 10px 14px; margin: 4px 0;
  border-left: 3px solid var(--accent);
}
.msg-group.ai-msg:hover { background: var(--ai-bg); filter: brightness(1.05); }
.msg-group.ai-msg[data-agent="laika"] { border-left-color: var(--agent-laika); }
.msg-group.ai-msg[data-agent="xiaomi"] { border-left-color: var(--agent-xiaomi); }
.msg-group.ai-msg[data-agent="lenovo"] { border-left-color: var(--agent-lenovo); }
.msg-group.ai-msg .msg-avatar {
  box-shadow: 0 0 0 2px var(--accent-glow), 0 0 12px rgba(99,102,241,0.2);
}
.msg-group.ai-msg[data-agent="laika"] .msg-avatar { box-shadow: 0 0 0 2px rgba(249,115,22,0.3), 0 0 12px rgba(249,115,22,0.15); }
.msg-group.ai-msg[data-agent="xiaomi"] .msg-avatar { box-shadow: 0 0 0 2px rgba(6,182,212,0.3), 0 0 12px rgba(6,182,212,0.15); }
.msg-group.ai-msg[data-agent="lenovo"] .msg-avatar { box-shadow: 0 0 0 2px rgba(167,139,250,0.3), 0 0 12px rgba(167,139,250,0.15); }

.ai-copy-btn {
  margin-top: 6px; padding: 4px 10px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 11px; color: var(--text-secondary); font-weight: 500;
  transition: all var(--transition);
}
.ai-copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Typing indicator */
.typing-indicator {
  padding: 8px 16px; font-size: 13px; color: var(--text-muted);
  display: none; align-items: center; gap: 8px;
}
.typing-indicator.show { display: flex; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 6px; height: 6px; background: var(--accent);
  border-radius: 50%; animation: typingBounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Message reactions */
.msg-reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.reaction-btn {
  padding: 2px 8px; border-radius: 12px; font-size: 12px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  cursor: pointer; transition: all var(--transition);
  display: flex; align-items: center; gap: 3px;
}
.reaction-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.reaction-btn.active { background: var(--accent-dim); border-color: var(--accent); }
.reaction-btn .count { font-size: 11px; color: var(--text-muted); }
.add-reaction-btn {
  padding: 2px 8px; border-radius: 12px; font-size: 12px;
  background: var(--bg-tertiary); border: 1px solid transparent;
  color: var(--text-muted); cursor: pointer; opacity: 0;
  transition: all var(--transition);
}
.msg-group:hover .add-reaction-btn { opacity: 1; }
.add-reaction-btn:hover { border-color: var(--border); color: var(--text-primary); }

/* Thread indicator */
.msg-thread-info {
  margin-top: 6px; padding: 5px 10px; border-radius: var(--radius-sm);
  background: var(--accent-dim); color: var(--accent); font-size: 12px;
  cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
  font-weight: 600; transition: all var(--transition);
  border: 1px solid transparent;
}
.msg-thread-info:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Message actions on hover */
.msg-actions {
  display: none; position: absolute; top: -10px; right: 8px;
  background: var(--bg-secondary); border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); padding: 2px; gap: 1px;
  box-shadow: var(--shadow-sm);
}
.msg-group:hover .msg-actions { display: flex; }
.msg-action-btn {
  padding: 4px 6px; border-radius: var(--radius-sm); font-size: 12px;
  color: var(--text-secondary); transition: all var(--transition);
}
.msg-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* @mention highlight */
.mention {
  background: var(--mention-bg); color: var(--mention-text);
  padding: 1px 5px; border-radius: 4px; font-weight: 600;
}

/* ===== Message Input ===== */
.input-container {
  padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.input-wrapper {
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--bg-tertiary); border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg); padding: 10px 14px;
  transition: all var(--transition);
}
.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.input-wrapper textarea {
  flex: 1; background: none; border: none; outline: none;
  resize: none; min-height: 20px; max-height: 120px;
  color: var(--text-primary); line-height: 1.4;
}
.input-actions { display: flex; gap: 4px; align-items: center; }
.input-btn {
  padding: 4px 8px; border-radius: var(--radius-sm); color: var(--text-muted);
  font-size: 16px; transition: all var(--transition);
}
.input-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.send-btn {
  padding: 8px 16px; background: var(--accent); color: #fff;
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(99,102,241,0.3);
}
.send-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(99,102,241,0.4); transform: translateY(-1px); }
.send-btn:active { transform: translateY(0); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

/* Mention autocomplete dropdown */
.mention-dropdown {
  display: none; position: absolute; bottom: 100%; left: 0; right: 0;
  background: var(--bg-secondary); border: 1px solid var(--border-strong);
  border-radius: var(--radius); box-shadow: var(--shadow);
  max-height: 200px; overflow-y: auto; margin-bottom: 4px; z-index: 100;
}
.mention-dropdown.show { display: block; }
.mention-option {
  padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: background var(--transition);
}
.mention-option:hover, .mention-option.selected { background: var(--bg-hover); }
.mention-option .avatar {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 14px;
}
.mention-option .info { flex: 1; }
.mention-option .info .name { font-weight: 600; font-size: 13px; }
.mention-option .info .role { font-size: 11px; color: var(--text-muted); }

/* ===== Right Panel ===== */
.panel-header {
  height: var(--header-h); padding: 0 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-header h3 { font-size: 14px; font-weight: 700; }
.panel-tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.panel-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 12px;
  font-weight: 600; color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
}
.panel-tab:hover { color: var(--text-primary); background: var(--bg-hover); }

<script>
/* ================================================================
   Chatub v2.0 - AI Agent Chat Room
   Single-file application
   ================================================================ */
'use strict';

// ===== Constants =====
const STORAGE_KEY = 'chatub';
const MAX_STORAGE = 4 * 1024 * 1024; // 4MB
const MAX_IMG_SIZE = 200 * 1024; // 200KB
const QUICK_EMOJIS = ['👍','❤️','😂','🎉','🤔','👀','🔥','✅','❌','💯','🚀','👏'];
const DEFAULT_BOTS = [
  { id: 'laika', name: '라이카', emoji: '🐕', role: 'PM / 조율', active: true, isBot: true,
    systemPrompt: '당신은 라이카, 프로젝트 매니저 AI 에이전트입니다. 팀 조율, 일정 관리, 우선순위 결정에 능숙합니다. 따뜻하고 명확한 소통 스타일로 한국어로 응답하세요.' },
  { id: 'xiaomi', name: '샤오미', emoji: '🤖', role: '개발', active: true, isBot: true,
    systemPrompt: '당신은 샤오미, 시니어 개발자 AI 에이전트입니다. 코드 리뷰, 아키텍처 설계, 디버깅, 기술적 의사결정에 능숙합니다. 정확하고 간결한 스타일로 한국어로 응답하세요.' },
  { id: 'lenovo', name: '레노버', emoji: '👼', role: '비서 / UI', active: true, isBot: true,
    systemPrompt: '당신은 레노버, 비서 겸 UI 디자이너 AI 에이전트입니다. UX/UI 디자인, 문서 정리, 일정 조율, 사용자 경험 개선에 능숙합니다. 친절하고 꼼꼼한 스타일로 한국어로 응답하세요.' },
];
const DEFAULT_CHANNELS = [
  { id: 'general', name: '일반', icon: '💬', color: '#6366f1' },
  { id: 'dev', name: '개발', icon: '🛠️', color: '#22c55e' },
  { id: 'design', name: '디자인', icon: '🎨', color: '#f59e0b' },
];

// Agent color helper
function agentColor(agentId) {
  const colors = { laika: '#f97316', xiaomi: '#06b6d4', lenovo: '#a78bfa' };
  return colors[agentId] || '#6366f1';
}

// ===== State =====
let state = {
  currentProject: null,
  projects: [],
};

function getProject() {
  return state.projects.find(p => p.id === state.currentProject);
}

// ===== Storage (Per-project independent data) =====
const STORAGE_META = 'chatub_meta';

function projectStorageKey(projectId) {
  return `chatub_${projectId}`;
}

function loadState() {
  try {
    // Try per-project format first
    const metaRaw = localStorage.getItem(STORAGE_META);
    if (metaRaw) {
      const meta = JSON.parse(metaRaw);
      state.currentProject = meta.currentProject;
      state.projects = [];
      (meta.projectIds || []).forEach(id => {
        const raw = localStorage.getItem(projectStorageKey(id));
        if (raw) {
          const proj = JSON.parse(raw);
          if (!proj.milestones) proj.milestones = [];
          if (!proj.settings) proj.settings = { gatewayUrl: '', gatewayToken: '', contextLength: 20 };
          state.projects.push(proj);
        }
      });
    } else {
      // Migration from old single-key format
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        state = JSON.parse(raw);
        state.projects.forEach(p => {
          if (!p.milestones) p.milestones = [];
          if (!p.settings) p.settings = { gatewayUrl: '', gatewayToken: '', contextLength: 20 };
        });
        // Save in new per-project format and remove old key
        saveState();
        localStorage.removeItem(STORAGE_KEY);
      }
    }
  } catch(e) {
    console.warn('Failed to load state', e);
  }
  if (!state.projects.length) {
    createProject('내 프로젝트', '첫 번째 프로젝트', '#6366f1');
  }
  if (!state.currentProject) {
    state.currentProject = state.projects[0].id;
  }
}

function saveState() {
  if (!isGuestMode) return; // Server mode: data saved via API calls
  try {
    // Save meta index
    const meta = {
      currentProject: state.currentProject,
      projectIds: state.projects.map(p => p.id),
    };
    localStorage.setItem(STORAGE_META, JSON.stringify(meta));

    // Save each project independently: chatub_{projectId}
    state.projects.forEach(p => {
      const data = JSON.stringify(p);
      if (data.length > MAX_STORAGE) {
        pruneOldMessages();
      }
      localStorage.setItem(projectStorageKey(p.id), data);
    });
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      pruneOldMessages();
      try {
        state.projects.forEach(p => {
          localStorage.setItem(projectStorageKey(p.id), JSON.stringify(p));
        });
      } catch(e2) { toast('저장 실패: 용량 초과', 'error'); }
    }
  }
}

function pruneOldMessages() {
  const proj = getProject();
  if (!proj) return;
  proj.channels.forEach(ch => {
    if (ch.messages.length > 100) {
      ch.messages = ch.messages.slice(-50);
    }
  });
  toast('오래된 메시지를 정리했습니다', 'info');
}

function getStorageSize() {
  let total = (localStorage.getItem(STORAGE_META) || '').length;
  state.projects.forEach(p => {
    total += (localStorage.getItem(projectStorageKey(p.id)) || '').length;
  });
  return total * 2; // rough UTF-16 estimate
}

// ===== Project Management =====
function createProject(name, desc, color) {
  const proj = {
    id: 'proj_' + Date.now(),
    name, desc, color: color || '#6366f1',
    channels: DEFAULT_CHANNELS.map(ch => ({...ch, messages: [], unread: 0 })),
    currentChannel: 'general',
    members: [
      { id: 'me', name: '나', emoji: '😊', role: '팀원', color: '#6366f1', isMe: true },
    ],
    bots: DEFAULT_BOTS.map(b => ({...b})),
    tasks: [],
    milestones: [],
    settings: { gatewayUrl: '', gatewayToken: '', contextLength: 20 },
    nextTaskId: 1,
  };
  state.projects.push(proj);
  state.currentProject = proj.id;
  if (!isGuestMode) {
    API.createProject(name, desc, color || '#6366f1').then(res => {
      if (res.ok && res.data) {
        proj.id = res.data.id;
        state.currentProject = proj.id;
      }
    });
  }
  saveState();
  return proj;
}

function deleteProject(id) {
  if (!isGuestMode) API.deleteProject(id);
  // Remove per-project storage key
  localStorage.removeItem(projectStorageKey(id));
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.currentProject === id) {
    state.currentProject = state.projects[0]?.id || null;
  }
  if (!state.projects.length) {
    createProject('내 프로젝트', '새 프로젝트', '#6366f1');
  }
  saveState();
}

// ===== Toast =====
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ===== Markdown Renderer (XSS-safe) =====
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(text) {
  // Extract code blocks first
  const codeBlocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push({ lang, code: code.trimEnd() });
    return `\x00CODE${codeBlocks.length - 1}\x00`;
  });

  // Escape HTML
  text = escapeHtml(text);

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // @mentions
  text = text.replace(/@(\S+)/g, (m, name) => {
    return `<span class="mention">@${name}</span>`;
  });

  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Process lines
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  let inOl = false;
  let inBlockquote = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Blockquote
    if (line.startsWith('&gt; ')) {
      if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
      html += line.slice(5) + '<br>';
      continue;
    } else if (inBlockquote) {
      html += '</blockquote>'; inBlockquote = false;
    }

    // Unordered list
    if (/^[\-\*] /.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${line.slice(2)}</li>`;
      continue;
    } else if (inList) {
      html += '</ul>'; inList = false;
    }

    // Ordered list
    if (/^\d+\. /.test(line)) {
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += `<li>${line.replace(/^\d+\. /, '')}</li>`;
      continue;
    } else if (inOl) {
      html += '</ol>'; inOl = false;
    }

    // Headings
    if (line.startsWith('### ')) { html += `<h4>${line.slice(4)}</h4>`; continue; }
    if (line.startsWith('## ')) { html += `<h3>${line.slice(3)}</h3>`; continue; }
    if (line.startsWith('# ')) { html += `<h2>${line.slice(2)}</h2>`; continue; }

    // Code block placeholder
    const codeMatch = line.match(/\x00CODE(\d+)\x00/);
    if (codeMatch) {
      const cb = codeBlocks[parseInt(codeMatch[1])];
      html += `<pre><code class="lang-${cb.lang}">${highlightCode(escapeHtml(cb.code), cb.lang)}</code><button class="code-copy-btn" onclick="copyCode(this)">복사</button></pre>`;
      continue;
    }

    // Empty line
    if (!line.trim()) { html += '<br>'; continue; }

    html += `<p>${line}</p>`;
  }

  if (inList) html += '</ul>';
  if (inOl) html += '</ol>';
  if (inBlockquote) html += '</blockquote>';

  return html;
}

// Basic syntax highlighting
function highlightCode(code, lang) {
  const keywords = /\b(function|const|let|var|if|else|for|while|return|import|export|from|class|extends|new|this|async|await|try|catch|throw|switch|case|break|continue|default|typeof|instanceof|in|of|do|yield|def|self|True|False|None|print|raise|except|finally|with|as|lambda|pass|elif|and|or|not|is)\b/g;
  code = code.replace(keywords, '<span class="kw">$1</span>');
  code = code.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="str">$&</span>');
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  code = code.replace(/(\/\/.*$|#.*$)/gm, '<span class="cm">$1</span>');
  return code;
}

function copyCode(btn) {
  const pre = btn.closest('pre');
  const code = pre.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {

    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

// ===== Image handling =====
function processImage(file, callback) {
  if (!file.type.startsWith('image/')) {
    toast('이미지 파일만 첨부할 수 있습니다', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const maxDim = 400;
      if (w > maxDim || h > maxDim) {
        const ratio = Math.min(maxDim / w, maxDim / h);
        w *= ratio; h *= ratio;
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      let quality = 0.8;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length > MAX_IMG_SIZE && quality > 0.1) {
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      if (dataUrl.length > MAX_IMG_SIZE) {
        toast('이미지가 너무 큽니다', 'error');
        return;
      }
      callback(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===== Time formatting =====
function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return '방금';
  if (diffMin < 60) return `${diffMin}분 전`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}시간 전`;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderMessage(msg, proj) {
  const isAI = msg.isBot;
  const sender = isAI
    ? proj.bots.find(b => b.id === msg.authorId) || { emoji: '🤖', name: msg.author }
    : proj.members.find(m => m.id === msg.authorId) || { emoji: '👤', name: msg.author, color: '#374151' };

  const avatarBg = sender.color || (isAI ? agentColor(msg.authorId) : '#374151');
  const threadCount = msg.replies ? msg.replies.length : 0;

  let reactionsHtml = '';
  if (msg.reactions && Object.keys(msg.reactions).length) {
    reactionsHtml = '<div class="msg-reactions">';
    for (const [emoji, users] of Object.entries(msg.reactions)) {
      const isActive = users.includes('me');
      reactionsHtml += `<button class="reaction-btn ${isActive ? 'active' : ''}" onclick="toggleReaction('${msg.id}','${emoji}')">
        ${emoji} <span class="count">${users.length}</span>
      </button>`;
    }
    reactionsHtml += `<button class="add-reaction-btn" onclick="showEmojiPicker(event,'${msg.id}')">+</button></div>`;
  } else {
    reactionsHtml = `<div class="msg-reactions"><button class="add-reaction-btn" onclick="showEmojiPicker(event,'${msg.id}')">+</button></div>`;
  }

  let bodyHtml = '';
  if (msg.image) {
    bodyHtml += `<img src="${msg.image}" alt="첨부 이미지" onclick="previewImage(this.src)">`;
  }
  if (msg.text) {
    bodyHtml += renderMarkdown(msg.text);
  }
  if (msg.streaming) {
    bodyHtml += '<span class="typing-cursor" style="display:inline-block;width:2px;height:14px;background:var(--accent);animation:blink 1s infinite;vertical-align:middle;margin-left:2px;"></span>';
  }

  const aiCopyBtn = isAI && !msg.streaming
    ? `<button class="ai-copy-btn" onclick="copyAiMsg('${msg.id}')">📋 복사</button>` : '';

  const agentBadge = isAI
    ? `<span class="msg-badge-agent" data-agent="${msg.authorId}">${escapeHtml(sender.role || 'AI')}</span>`
    : '';

  return `<div class="msg-group ${isAI ? 'ai-msg' : ''}" data-msg-id="${msg.id}" ${isAI ? 'data-agent="'+msg.authorId+'"' : ''}>
    <div class="msg-avatar" style="background:${avatarBg}">${sender.emoji || '👤'}</div>
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-author">${escapeHtml(msg.author)}</span>
        ${agentBadge}
        <span class="msg-time">${formatTime(msg.ts)}</span>
      </div>
      <div class="msg-body">${bodyHtml}</div>
      ${aiCopyBtn}
      ${reactionsHtml}
      ${threadCount > 0 ? `<div class="msg-thread-info" onclick="openThread('${msg.id}')">💬 ${threadCount}개 답글</div>` : ''}
    </div>
    <div class="msg-actions">
      <button class="msg-action-btn" onclick="showEmojiPicker(event,'${msg.id}')" title="리액션">😀</button>
      <button class="msg-action-btn" onclick="openThread('${msg.id}')" title="스레드">💬</button>
      ${!isAI && msg.authorId === 'me' ? `<button class="msg-action-btn" onclick="editMessage('${msg.id}')" title="편집">✏️</button>` : ''}
      ${msg.authorId === 'me' ? `<button class="msg-action-btn" onclick="deleteMessage('${msg.id}')" title="삭제">🗑️</button>` : ''}
    </div>
  </div>`;
}

function sendMessage(text, image) {
  const proj = getProject();
  if (!proj) return;
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  if (!ch) return;

  text = text?.trim() || '';
  if (!text && !image) return;

  // /todo command
  if (text.startsWith('/todo ')) {
    const title = text.slice(6).trim();
    if (title) {
      addTask(title, '', 'todo');
      toast(`태스크 생성: ${title}`, 'success');
    }
    return;
  }

  // /done command
  if (text.startsWith('/done ')) {
    const num = parseInt(text.slice(6).trim());
    if (!isNaN(num)) {
      completeTaskByNumber(num);
    }
    return;
  }

  const me = proj.members.find(m => m.isMe) || { id: 'me', name: '나', emoji: '😊' };
  const msg = {
    id: uid(),
    authorId: me.id,
    author: me.name,
    text,
    image: image || null,
    ts: Date.now(),
    isBot: false,
    reactions: {},
    replies: [],
  };
  ch.messages.push(msg);

  if (!isGuestMode) {
    // Try WebSocket first for real-time delivery, fall back to REST
    const wsSent = WS.send({ type: 'message', text: msg.text, image: msg.image || '' });
    if (!wsSent) {
      API.sendMessage({ channel_id: ch.id, text: msg.text, image: msg.image || '' }).then(res => {
        if (res.ok && res.data) {
          msg.id = res.data.id;
        }
      });
    }
  }

  saveState();
  renderMessages();
  renderChannelList();

  // Check for @bot mentions
  const mentionMatch = text.match(/@(\S+)/);
  if (mentionMatch) {
    const botName = mentionMatch[1];
    const bot = proj.bots.find(b => b.active && b.name.toLowerCase() === botName.toLowerCase());
    if (bot) {
      callAI(bot, text, ch);
    }
  }
}

// ================================================================
// AI INTEGRATION
// ================================================================

async function callAI(bot, userText, channel) {
  const proj = getProject();
  const settings = proj.settings;

  // Create placeholder message
  const aiMsg = {
    id: uid(),
    authorId: bot.id,
    author: bot.name,
    text: '',
    ts: Date.now(),
    isBot: true,
    streaming: true,
    reactions: {},
    replies: [],
  };
  channel.messages.push(aiMsg);
  renderMessages();
  showTypingIndicator(bot.name);

  // Build context
  const contextLen = settings.contextLength || 20;
  const recentMsgs = channel.messages.slice(-contextLen - 1, -1);
  const messages = [
    {
      role: 'system',
      content: `${bot.systemPrompt}\n\n프로젝트: ${proj.name}\n설명: ${proj.desc || ''}`
    },
    ...recentMsgs.map(m => ({
      role: m.isBot ? 'assistant' : 'user',
      content: `${m.author}: ${m.text}`
    }))
  ];

  const gatewayUrl = settings.gatewayUrl || 'http://127.0.0.1:18789';
  const model = `openclaw/${bot.id}`;

  try {
    const apiUrl = (gatewayUrl.replace(/\/+$/, '')) + '/api/chat';
    const headers = { 'Content-Type': 'application/json' };
    if (settings.gatewayToken) headers['Authorization'] = 'Bearer ' + settings.gatewayToken;

    const response = await fetch(apiUrl, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model,
        messages,
        stream: true,
      }),
    });

    if (!response.ok) {
      throw new Error(`Gateway error: ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content;
          if (delta) {
            aiMsg.text += delta;
            updateStreamingMessage(aiMsg);
          }
        } catch(e) { /* ignore parse errors */ }
      }
    }
  } catch(e) {
    aiMsg.text = aiMsg.text || `[오류: ${e.message}]`;
  }

  aiMsg.streaming = false;
  hideTypingIndicator();

  const currentProj = getProject();
  if (currentProj && currentProj.currentChannel !== channel.id) {
    channel.unread = (channel.unread || 0) + 1;
    renderChannelList();
  }

  saveState();
  renderMessages();
}

function updateStreamingMessage(msg) {
  const el = document.querySelector(`[data-msg-id="${msg.id}"] .msg-body`);
  if (el) {
    el.innerHTML = renderMarkdown(msg.text) +

function toggleReaction(msgId, emoji) {
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  const msg = ch?.messages.find(m => m.id === msgId);
  if (!msg) return;
  if (!msg.reactions) msg.reactions = {};
  if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
  const idx = msg.reactions[emoji].indexOf('me');
  if (idx >= 0) {
    msg.reactions[emoji].splice(idx, 1);
    if (!msg.reactions[emoji].length) delete msg.reactions[emoji];
  } else {
    msg.reactions[emoji].push('me');
  }
  if (!isGuestMode) {
    API.updateMessage(msgId, { reactions_json: JSON.stringify(msg.reactions) });
  }
  saveState();
  renderMessages();
}

let currentEmojiTarget = null;
function showEmojiPicker(event, msgId) {
  event.stopPropagation();
  currentEmojiTarget = msgId;
  const picker = $('emoji-picker');

  grid.innerHTML = QUICK_EMOJIS.map(e => `<button onclick="pickEmoji('${e}')">${e}</button>`).join('');
  picker.style.left = event.clientX + 'px';
  picker.style.top = (event.clientY - 60) + 'px';
  picker.classList.add('show');
}

function pickEmoji(emoji) {
  if (currentEmojiTarget) {
    toggleReaction(currentEmojiTarget, emoji);
  }
  $('emoji-picker').classList.remove('show');
  currentEmojiTarget = null;
}

  const me = proj.members.find(m => m.isMe) || { name: '나', emoji: '😊' };

  const renderThreadContent = () => {
    const repliesHtml = (msg.replies || []).map(r => {
      const sender = r.isBot
        ? proj.bots.find(b => b.id === r.authorId) || { emoji: '🤖', name: r.author }
        : proj.members.find(m => m.id === r.authorId) || { emoji: '👤', name: r.author };
      return `<div class="msg-group ${r.isBot ? 'ai-msg' : ''}" ${r.isBot ? 'data-agent="'+r.authorId+'"' : ''} style="margin-bottom:8px;">
        <div class="msg-avatar" style="background:${sender.color || (r.isBot ? agentColor(r.authorId) : '#374151')};width:28px;height:28px;font-size:13px;">${sender.emoji}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author" style="font-size:13px;">${escapeHtml(r.author)}</span>
            <span class="msg-time">${formatTime(r.ts)}</span>
          </div>
          <div class="msg-body" style="font-size:13px;">${renderMarkdown(r.text)}</div>
        </div>
      </div>`;
    }).join('');

    $('panel-content').innerHTML = `
      <div class="thread-panel">
        <div class="thread-original">
          <div style="font-weight:700;margin-bottom:4px;">${escapeHtml(msg.author)}</div>
          <div style="font-size:13px;">${renderMarkdown(msg.text)}</div>
        </div>
        <div class="thread-messages" id="thread-messages">${repliesHtml || '<div style="padding:20px;color:var(--text-muted);text-align:center;font-size:13px;">아직 답글이 없습니다</div>'}</div>
        <div class="thread-input">
          <div class="input-wrapper">
            <textarea id="thread-input" placeholder="답글 입력..." rows="1" style="font-size:13px;"></textarea>
            <button class="send-btn" onclick="sendThreadReply('${msgId}')" style="font-size:12px;">답글</button>
          </div>
        </div>
      </div>`;

    const threadInput = $('thread-input');
    if (threadInput) {
      threadInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendThreadReply(msgId);
        }
      });
    }
  };

  renderThreadContent();
  window._currentThreadMsgId = msgId;
  window._renderThreadContent = renderThreadContent;
}

function sendThreadReply(msgId) {
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  const msg = ch?.messages.find(m => m.id === msgId);
  if (!msg) return;

  const input = $('thread-input');
  const text = input?.value.trim();
  if (!text) return;

  const me = proj.members.find(m => m.isMe) || { id: 'me', name: '나', emoji: '😊' };
  if (!msg.replies) msg.replies = [];
  msg.replies.push({
    id: uid(),
    authorId: me.id,
    author: me.name,
    text,
    ts: Date.now(),
    isBot: false,
  });

  if (!isGuestMode) {
    API.createThread({ message_id: msgId, text });
  }

  saveState();
  renderMessages();

  if (window._currentThreadMsgId === msgId && window._renderThreadContent) {
    window._renderThreadContent();
    const newInput = $('thread-input');
    if (newInput) newInput.value = '';
  }
}

let mentionState = { active: false, query: '', startPos: 0, selectedIdx: 0 };

function handleMentionInput(textarea) {
  const val = textarea.value;
  const pos = textarea.selectionStart;
  const beforeCursor = val.slice(0, pos);
  const atMatch = beforeCursor.match(/@(\S*)$/);

  if (atMatch) {
    mentionState.active = true;
    mentionState.query = atMatch[1].toLowerCase();
    mentionState.startPos = pos - atMatch[1].length - 1;
    showMentionDropdown();
  } else {
    mentionState.active = false;
    hideMentionDropdown();
  }
}

function showMentionDropdown() {
  const proj = getProject();
  if (!proj) return;
  const dropdown = $('mention-dropdown');

  const allMentionable = [
    ...proj.members.map(m => ({ ...m, type: 'member' })),
    ...proj.bots.filter(b => b.active).map(b => ({ ...b, type: 'bot' })),
  ];

  const filtered = mentionState.query
    ? allMentionable.filter(m => m.name.toLowerCase().includes(mentionState.query))
    : allMentionable;

  if (!filtered.length) { hideMentionDropdown(); return; }

  mentionState.selectedIdx = 0;
  dropdown.innerHTML = filtered.map((m, i) => `
    <div class="mention-option ${i === 0 ? 'selected' : ''}" data-name="${escapeHtml(m.name)}" onclick="selectMention('${escapeHtml(m.name)}')">
      <div class="avatar" style="background:${m.type === 'bot' ? agentColor(m.id) : (m.color || '#6366f1')}">${m.emoji || '👤'}</div>
      <div class="info">
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="role">${escapeHtml(m.role || (m.type === 'bot' ? 'AI 에이전트' : '팀원'))}</div>
      </div>
    </div>
  `).join('');
  dropdown.classList.add('show');
}

function hideMentionDropdown() {
  $('mention-dropdown').classList.remove('show');
}

function selectMention(name) {
  const textarea = $('msg-input');
  const val = textarea.value;
  const before = val.slice(0, mentionState.startPos);
  const after = val.slice(textarea.selectionStart);
  textarea.value = before + '@' + name + ' ' + after;
  textarea.focus();
  textarea.selectionStart = textarea.selectionEnd = before.length + name.length + 2;
  mentionState.active = false;
  hideMentionDropdown();
}

function handleMentionKeydown(e) {
  if (!mentionState.active) return false;
  const dropdown = $('mention-dropdown');
  const options = dropdown.querySelectorAll('.mention-option');
  if (!options.length) return false;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    mentionState.selectedIdx = Math.min(mentionState.selectedIdx + 1, options.length - 1);
    options.forEach((o, i) => o.classList.toggle('selected', i === mentionState.selectedIdx));
    return true;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    mentionState.selectedIdx = Math.max(mentionState.selectedIdx - 1, 0);
    options.forEach((o, i) => o.classList.toggle('selected', i === mentionState.selectedIdx));
    return true;
  }
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    const selected = options[mentionState.selectedIdx];
    if (selected) selectMention(selected.dataset.name);
    return true;
  }
  if (e.key === 'Escape') {
    hideMentionDropdown();
    mentionState.active = false;
    return true;
  }
  return false;
}

function openSearch() {
  const overlay = $('search-overlay');
  overlay.classList.add('show');
  const input = $('search-input');
  input.value = '';
  input.focus();
  $('search-results').innerHTML = '';
}

function closeSearch() {
  $('search-overlay').classList.remove('show');
}

function performSearch(query) {
  if (!query.trim()) { $('search-results').innerHTML = ''; return; }
  const proj = getProject();
  if (!proj) return;
  const results = [];
  const q = query.toLowerCase();
  proj.channels.forEach(ch => {
    ch.messages.forEach(msg => {
      if (msg.text && msg.text.toLowerCase().includes(q)) {
        results.push({ channel: ch, msg });
      }
    });
  });
  const container = $('search-results');
  if (!results.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">결과 없음</div>';
    return;
  }
  container.innerHTML = results.slice(0, 20).map(r => `
    <div class="search-result-item" onclick="goToSearchResult('${r.channel.id}','${r.msg.id}')">
      <div class="result-channel">#${escapeHtml(r.channel.name)}</div>
      <div class="result-text">${highlightSearchResult(escapeHtml(r.msg.text.slice(0, 100)), query)}</div>
      <div class="result-author">${escapeHtml(r.msg.author)} · ${formatTime(r.msg.ts)}</div>
    </div>
  `).join('');
}

function highlightSearchResult(text, query) {
  const re = new RegExp(`(${escapeHtml(query)})`, 'gi');
  return text.replace(re, '<strong style="color:var(--accent)">$1</strong>');
}

function goToSearchResult(channelId, msgId) {
  closeSearch();
  switchChannel(channelId);
  setTimeout(() => {
    const el = document.querySelector(`[data-msg-id="${msgId}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.background = 'var(--accent-dim)';
      setTimeout(() => el.style.background = '', 2000);
    }
  }, 100);
}

function renderTaskView() {
  const proj = getProject();
  if (!proj) return;

  const tasks = proj.tasks || [];
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const doing = tasks.filter(t => t.status === 'doing').length;
  const todo = tasks.filter(t => t.status === 'todo').length;

  $('task-stats').innerHTML = `
    <div class="stat-card"><div class="num">📊 ${total}</div><div class="label">전체</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warning)">⏳ ${todo}</div><div class="label">대기</div></div>
    <div class="stat-card"><div class="num" style="color:var(--info)">🔄 ${doing}</div><div class="label">진행</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">✅ ${done}</div><div class="label">완료</div></div>
  `;

  const pct = total ? Math.round((done / total) * 100) : 0;
  const progressFill = $('task-progress');
  progressFill.style.width = pct + '%';
  progressFill.style.background = pct > 70 ? 'var(--success)' : pct >= 30 ? 'var(--warning)' : 'var(--danger)';

  const msFilter = $('milestone-filter');
  if (msFilter) {
    const milestones = proj.milestones || [];
    const currentVal = currentMilestoneFilter;
    msFilter.innerHTML = '<option value="">모든 마일스톤</option>' +
      milestones.map(m => `<option value="${m.id}" ${currentVal === m.id ? 'selected' : ''}>${escapeHtml(m.name)}</option>`).join('');
  }

  const oldMsProgress = document.getElementById('milestone-progress-section');
  if (oldMsProgress) oldMsProgress.remove();
  if ((proj.milestones || []).length) {
    let msProgressHtml = '<div id="milestone-progress-section" style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">';
    proj.milestones.forEach(m => {
      const msTasks = tasks.filter(t => t.milestoneId === m.id);
      const msDone = msTasks.filter(t => t.status === 'done').length;
      const msPct = msTasks.length ? Math.round(msDone / msTasks.length * 100) : 0;
      const msColor = msPct > 70 ? 'var(--success)' : msPct >= 30 ? 'var(--warning)' : 'var(--danger)';
      msProgressHtml += `<div style="display:flex;align-items:center;gap:6px;font-size:11px;">
        <span class="milestone-tag" style="background:${m.color}20;color:${m.color}">${escapeHtml(m.name)}</span>
        <div class="progress-bar" style="flex:1;height:4px;"><div class="fill" style="width:${msPct}%;background:${msColor}"></div></div>
        <span style="color:var(--text-muted)">${msDone}/${msTasks.length} (${msPct}%)</span>
      </div>`;
    });
    msProgressHtml += '</div>';
    const progressEl = $('task-progress')?.parentElement;
    if (progressEl) progressEl.insertAdjacentHTML('afterend', msProgressHtml);
  }

  const filter = currentTaskFilter;
  const searchQ = ($('task-search')?.value || '').toLowerCase();

  const filterTasks = (status) => {
    return tasks.filter(t => {
      if (t.status !== status) return false;
      if (filter !== 'all' && t.status !== filter) return false;
      if (searchQ && !t.title.toLowerCase().includes(searchQ) && !(t.desc || '').toLowerCase().includes(searchQ)) return false;
      if (currentMilestoneFilter && t.milestoneId !== currentMilestoneFilter) return false;
      return true;
    });
  };

  ['todo', 'doing', 'done'].forEach(status => {
    const filtered = filterTasks(status);
    const col = $('col-' + status);
    $('count-' + status).textContent = filtered.length;
    col.innerHTML = filtered.map(t => renderTaskCard(t, proj)).join('');
  });

  setupDragAndDrop();
}

function renderTaskCard(task, proj) {
  const milestone = proj.milestones?.find(m => m.id === task.milestoneId);
  const milestoneTag = milestone
    ? `<span class="milestone-tag" style="background:${milestone.color}20;color:${milestone.color}">${escapeHtml(milestone.name)}</span>`
    : '';

  let deadlineHtml = '';
  if (task.deadline) {
    const isOverdue = new Date(task.deadline) < new Date() && task.status !== 'done';
    deadlineHtml = `<span class="task-deadline ${isOverdue ? 'overdue' : ''}">📅 ${task.deadline}</span>`;
  }

  return `<div class="task-card" draggable="true" data-task-id="${task.id}"
               ondragstart="onDragStart(event,'${task.id}')" onclick="openTaskDetail('${task.id}')">
    <div class="task-title">#${task.num} ${escapeHtml(task.title)}</div>
    ${task.desc ? `<div class="task-desc">${escapeHtml(task.desc)}</div>` : ''}
    <div class="task-meta">${milestoneTag}${deadlineHtml}</div>
  </div>`;
}

// Drag and Drop
let draggedTaskId = null;

function onDragStart(e, taskId) {
  draggedTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function setupDragAndDrop() {
  document.querySelectorAll('.kanban-col-body').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      if (!draggedTaskId) return;
      const newStatus = col.closest('.kanban-col').dataset.status;
      const proj = getProject();
      const task = proj.tasks.find(t => t.id === draggedTaskId);
      if (task) {
        task.status = newStatus;
        if (!isGuestMode) API.updateTask(task.id, { status: newStatus });
        saveState();
        renderTaskView();
      }
      draggedTaskId = null;
    });
  });

  setupTouchDrag();
}

function setupTouchDrag() {
  let touchTask = null;
  let touchEl = null;
  let clone = null;
  let startX, startY;

  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      touchTask = card.dataset.taskId;
      touchEl = card;
      card._touchTimer = setTimeout(() => {
        clone = card.cloneNode(true);
        clone.style.position = 'fixed';
        clone.style.width = card.offsetWidth + 'px';
        clone.style.opacity = '0.8';
        clone.style.zIndex = '1000';
        clone.style.pointerEvents = 'none';
        clone.style.transform = 'rotate(3deg)';
        document.body.appendChild(clone);
        card.style.opacity = '0.3';
      }, 300);
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      if (!clone) return;
      e.preventDefault();
      const touch = e.touches[0];
      clone.style.left = (touch.clientX - 40) + 'px';
      clone.style.top = (touch.clientY - 20) + 'px';
    }, { passive: false });

    card.addEventListener('touchend', e => {
      clearTimeout(card._touchTimer);
      if (clone) {
        clone.remove();
        clone = null;
        if (touchEl) touchEl.style.opacity = '1';

        const touch = e.changedTouches[0];
        const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        const col = dropTarget?.closest('.kanban-col');
        if (col && touchTask) {
          const newStatus = col.dataset.status;
          const proj = getProject();
          const task = proj.tasks.find(t => t.id === touchTask);
          if (task && task.status !== newStatus) {
            task.status = newStatus;
            if (!isGuestMode) API.updateTask(task.id, { status: newStatus });
            saveState();
            renderTaskView();
          }
        }
      }
      touchTask = null;
      touchEl = null;
    });
  });
}

// ===== Data Export/Import =====

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `chatub-backup-${formatDate(Date.now())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('데이터 내보내기 완료', 'success');
}

function importData() {
  const input = $('import-input');
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.projects) {
          state = data;
          saveState();
          renderAll();
          toast('데이터 가져오기 완료', 'success');
        } else {
          toast('잘못된 형식', 'error');
        }
      } catch(e) { toast('파일 파싱 실패', 'error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function confirmClearData() {
  if (confirm('모든 데이터를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
    state.projects.forEach(p => localStorage.removeItem(projectStorageKey(p.id)));
    localStorage.removeItem(STORAGE_META);
    localStorage.removeItem(STORAGE_KEY);
    state = { currentProject: null, projects: [] };
    loadState();
    renderAll();
    toast('데이터 삭제 완료', 'success');
  }
}

// ================================================================
// INLINE CHAT SEARCH
// ================================================================

let inlineSearchState = { active: false, matches: [], currentIdx: -1, query: '' };

function openInlineSearch() {
  const bar = $('chat-search-bar');
  bar.style.display = 'flex';
  inlineSearchState.active = true;
  const input = $('inline-search-input');
  input.value = inlineSearchState.query || '';
  input.focus();
  input.select();
}

function closeInlineSearch() {
  $('chat-search-bar').style.display = 'none';
  inlineSearchState.active = false;
  inlineSearchState.matches = [];
  inlineSearchState.currentIdx = -1;
  inlineSearchState.query = '';
  $('inline-search-counter').textContent = '';
  clearInlineHighlights();
}

function clearInlineHighlights() {
  document.querySelectorAll('#messages-container .search-highlight').forEach(el => {
    const parent = el.parentNode;
    parent.replaceChild(document.createTextNode(el.textContent), el);
    parent.normalize();
  });
}

function performInlineSearch(query) {
  clearInlineHighlights();
  inlineSearchState.matches = [];
  inlineSearchState.currentIdx = -1;
  inlineSearchState.query = query;

  if (!query.trim()) {
    $('inline-search-counter').textContent = '';
    return;
  }

  const container = $('messages-container');
  const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${escapedQuery})`, 'gi');

  const msgBodies = container.querySelectorAll('.msg-body');
  msgBodies.forEach(body => {
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null);
    const textNodes = [];
    while (walker.nextNode()) {
      if (walker.currentNode.textContent.toLowerCase().includes(query.toLowerCase())) {
        textNodes.push(walker.currentNode);
      }
    }
    textNodes.forEach(node => {
      const parts = node.textContent.split(regex);
      if (parts.length <= 1) return;
      const frag = document.createDocumentFragment();
      parts.forEach(part => {
        if (part.toLowerCase() === query.toLowerCase()) {
          const span = document.createElement('span');
          span.className = 'search-highlight';
          span.textContent = part;
          frag.appendChild(span);
          inlineSearchState.matches.push(span);
        } else {
          frag.appendChild(document.createTextNode(part));
        }
      });
      node.parentNode.replaceChild(frag, node);
    });
  });

  const total = inlineSearchState.matches.length;
  if (total > 0) {
    inlineSearchState.currentIdx = 0;
    updateInlineSearchHighlight();
  }
  $('inline-search-counter').textContent = total > 0 ? `1/${total}` : '0개';
}

function updateInlineSearchHighlight() {
  const { matches, currentIdx } = inlineSearchState;
  matches.forEach((m, i) => m.classList.toggle('current', i === currentIdx));
  if (matches[currentIdx]) {
    matches[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  $('inline-search-counter').textContent = `${currentIdx + 1}/${matches.length}`;
}

function navigateInlineSearch(direction) {
  const { matches } = inlineSearchState;
  if (!matches.length) return;
  if (direction === 'next') {
    inlineSearchState.currentIdx = (inlineSearchState.currentIdx + 1) % matches.length;
  } else {
    inlineSearchState.currentIdx = (inlineSearchState.currentIdx - 1 + matches.length) % matches.length;
  }
  updateInlineSearchHighlight();
}

// ================================================================
// KEYBOARD SHORTCUTS
// ================================================================

function handleGlobalKeydown(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f' && currentView === 'chat') {
    e.preventDefault();
    openInlineSearch();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const input = $('msg-input');
    if (document.activeElement === input) {
      e.preventDefault();
      sendMessage(input.value);
      input.value = '';
      autoResize(input);
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    addChannel();
  }
  if (e.key === 'Escape') {
    if (inlineSearchState.active) { closeInlineSearch(); return; }
    closeSearch();
    closeModal();
    $('emoji-picker').classList.remove('show');
    $('img-preview').classList.remove('show');
    closeSidebar();
    if (!$('right-panel').classList.contains('hidden')) {
      $('right-panel').classList.add('hidden');
    }
  }
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
}

// ================================================================
// AUTH & API LAYER
// ================================================================

const AUTH_TOKEN_KEY = 'chatub_token';
const AUTH_USER_KEY = 'chatub_user';
const AUTH_MODE_KEY = 'chatub_mode';

let authUser = null;
let isGuestMode = false;

const API = {
  get token() { return localStorage.getItem(AUTH_TOKEN_KEY); },

  async request(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (this.token) headers['Authorization'] = 'Bearer ' + this.token;

    const opts = { method, headers };
    if (body && method !== 'GET') opts.body = JSON.stringify(body);

    try {
      const resp = await fetch('/api/' + path, opts);
      const data = await resp.json();

      if (resp.status === 401) {
        toast('세션이 만료되었습니다. 다시 로그인해주세요.', 'error');
        handleLogout();
        return { ok: false, error: '세션 만료' };
      }

      return data;
    } catch(e) {
      console.error('API error:', e);
      toast('네트워크 오류', 'error');
      return { ok: false, error: e.message };
    }
  },

  async register(username, password, display_name) {
    return this.request('POST', 'auth/register', { username, password, display_name });
  },
  async login(username, password) {
    return this.request('POST', 'auth/login', { username, password });
  },
  async me() {
    return this.request('GET', 'auth/me');
  },

  async getProjects() { return this.request('GET', 'projects'); },
  async createProject(name, description, color) { return this.request('POST', 'projects', { name, description, color }); },
  async updateProject(id, data) { return this.request('PUT', 'projects/' + id, data); },
  async deleteProject(id) { return this.request('DELETE', 'projects/' + id); },

  // Channels: nested under projects
  async getChannels(projectId) { return this.request('GET', 'projects/' + projectId + '/channels'); },
  async createChannel(data) {
    const pid = data.project_id;
    const body = { name: data.name, icon: data.icon, color: data.color };
    return this.request('POST', 'projects/' + pid + '/channels', body);
  },
  async updateChannel(id, data) { return this.request('PUT', 'channels/' + id, data); },
  async deleteChannel(id) { return this.request('DELETE', 'channels/' + id); },

  // Messages: nested under channels
  async getMessages(channelId, limit, before) {
    let path = 'channels/' + channelId + '/messages';
    const params = [];
    if (limit) params.push('limit=' + limit);
    if (before) params.push('before=' + before);
    if (params.length) path += '?' + params.join('&');
    return this.request('GET', path);
  },
  async sendMessage(data) {
    const chId = data.channel_id;
    const body = { text: data.text, image: data.image || '' };
    return this.request('POST', 'channels/' + chId + '/messages', body);
  },
  async updateMessage(id, data) { return this.request('PUT', 'messages/' + id, data); },
  async deleteMessage(id) { return this.request('DELETE', 'messages/' + id); },

  async getThreads(messageId) { return this.request('GET', 'threads?message_id=' + messageId); },
  async createThread(data) { return this.request('POST', 'threads', data); },

  async getTasks(projectId, status, milestoneId) {
    let path = 'tasks?project_id=' + projectId;
    if (status) path += '&status=' + status;
    if (milestoneId) path += '&milestone_id=' + milestoneId;
    return this.request('GET', path);
  },
  async createTask(data) { return this.request('POST', 'tasks', data); },
  async updateTask(id, data) { return this.request('PUT', 'tasks/' + id, data); },
  async deleteTask(id) { return this.request('DELETE', 'tasks/' + id); },

  async getMilestones(projectId) { return this.request('GET', 'milestones?project_id=' + projectId); },
  async createMilestone(data) { return this.request('POST', 'milestones', data); },
  async updateMilestone(id, data) { return this.request('PUT', 'milestones/' + id, data); },
  async deleteMilestone(id) { return this.request('DELETE', 'milestones/' + id); },

  async getMembers(projectId) { return this.request('GET', 'members?project_id=' + projectId); },
  async createMember(data) { return this.request('POST', 'members', data); },
  async updateMember(id, data) { return this.request('PUT', 'members/' + id, data); },
  async deleteMember(id) { return this.request('DELETE', 'members/' + id); },

  async getBots(projectId) { return this.request('GET', 'bots?project_id=' + (projectId || '')); },
  async createBot(data) { return this.request('POST', 'bots', data); },
  async updateBot(id, data) { return this.request('PUT', 'bots/' + id, data); },
  async deleteBot(id) { return this.request('DELETE', 'bots/' + id); },

  async getSettings() { return this.request('GET', 'settings'); },
  async updateSettings(data) { return this.request('PUT', 'settings', data); },

  async migrate(data) { return this.request('POST', 'migrate', data); },
};

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.toggle('active', f.id === tab + '-form'));
  $('login-error').textContent = '';
  $('register-error').textContent = '';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = $('login-btn');
  btn.disabled = true;
  $('login-error').textContent = '';

  const username = $('login-username').value.trim();
  const password = $('login-password').value;

  const res = await API.login(username, password);
  btn.disabled = false;

  if (res.ok) {
    const d = res.data || res;
    localStorage.setItem(AUTH_TOKEN_KEY, d.token);
    localStorage.setItem(AUTH_USER_KEY, JSON.stringify(d.user));
    localStorage.removeItem(AUTH_MODE_KEY);
    authUser = d.user;
    isGuestMode = false;
    enterApp();
  } else {
    $('login-error').textContent = res.error || '로그인 실패';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = $('register-btn');
  btn.disabled = true;
  $('register-error').textContent = '';

  const username = $('reg-username').value.trim();
  const password = $('reg-password').value;
  const display_name = $('reg-display-name').value.trim();

  if (username.length < 2) { $('register-error').textContent = '사용자명은 2자 이상이어야 합니다'; btn.disabled = false; return; }
  if (password.length < 4) { $('register-error').textContent = '비밀번호는 4자 이상이어야 합니다'; btn.disabled = false; return; }
  if (!display_name) { $('register-error').textContent = '표시 이름을 입력하세요'; btn.disabled = false; return; }

  const res = await API.register(username, password, display_name);
  btn.disabled = false;

  if (res.ok) {
    const d = res.data || res;
    localStorage.setItem(AUTH_TOKEN_KEY, d.token);
    localStorage.setItem(AUTH_USER_KEY, JSON.stringify(d.user));
    localStorage.removeItem(AUTH_MODE_KEY);
    authUser = d.user;
    isGuestMode = false;
    enterApp();
    toast('가입 완료! 환영합니다.', 'success');
  } else {
    $('register-error').textContent = res.error || '가입 실패';
  }
}
