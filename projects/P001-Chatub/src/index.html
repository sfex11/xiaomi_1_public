function renderAll() {
  renderProjectSwitcher();
  renderChannelList();
  renderMemberList();
  renderMessages();
  renderHeader();
  renderTaskView();
  renderSettingsView();
}

function renderProjectSwitcher() {
  const sel = $('project-select');
  sel.innerHTML = state.projects.map(p =>
    `<option value="${p.id}" ${p.id === state.currentProject ? 'selected' : ''}>${p.name}</option>`
  ).join('');
}

function renderChannelList() {
  const proj = getProject();
  if (!proj) return;
  const list = $('channel-list');
  list.innerHTML = proj.channels.map(ch => {
    const lastMsg = ch.messages?.length ? ch.messages[ch.messages.length - 1] : null;
    const preview = lastMsg ? `${lastMsg.author}: ${(lastMsg.text || '').slice(0, 28)}` : '메시지 없음';
    return `
    <div class="nav-item ${ch.id === proj.currentChannel ? 'active' : ''}"
         data-channel="${ch.id}" onclick="switchChannel('${ch.id}')">
      <span class="icon">${ch.icon || '#'}</span>
      <div class="channel-info-wrap">
        <div class="name">${escapeHtml(ch.name)}</div>
        <div class="topic-preview">${escapeHtml(preview)}</div>
      </div>
      <span class="badge">${ch.unread > 0 ? ch.unread : ''}</span>
    </div>`;
  }).join('');
}

function renderMemberList() {
  const proj = getProject();
  if (!proj) return;
  const list = $('member-list');
  const agents = proj.bots.filter(b => b.active);
  const humans = proj.members;

  let html = '<div class="agent-section-label">AI 에이전트</div>';
  html += agents.map(a => `
    <div class="member-item">
      <div class="member-avatar agent-avatar" style="background:${agentColor(a.id)}">${a.emoji || '🤖'}</div>
      <span class="member-name">${escapeHtml(a.name)}</span>
      <span class="member-role">${escapeHtml(a.role || '')}</span>
      <span class="status-dot bot"></span>
    </div>
  `).join('');

  html += '<div class="agent-section-label" style="margin-top:8px;">팀원</div>';
  html += humans.map(m => `
    <div class="member-item">
      <div class="member-avatar" style="background:${m.color || '#374151'}">${m.emoji || '👤'}</div>
      <span class="member-name">${escapeHtml(m.name)}</span>
      <span class="member-role">${escapeHtml(m.role || '')}</span>
      <span class="status-dot ${m.isMe ? 'online' : 'offline'}"></span>
    </div>
  `).join('');

  list.innerHTML = html;
}

function renderHeader() {
  const proj = getProject();
  if (!proj) return;
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  if (ch) {
    $('current-channel-name').textContent = `${ch.icon || '#'} ${ch.name}`;
    $('current-channel-desc').textContent = proj.name;
  }
  if (isGuestMode) {
    $('current-channel-desc').textContent = proj.name + ' (게스트 모드)';
  }
}

function renderMessages() {
  const proj = getProject();
  if (!proj) return;
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  if (!ch) return;

  const container = $('messages-container');
  if (!ch.messages.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${ch.icon || '💬'}</div>
      <div class="empty-title">#${escapeHtml(ch.name)} 토픽</div>
      <div class="empty-desc">첫 번째 메시지를 보내보세요. @라이카, @샤오미, @레노버 를 멘션해서 에이전트와 대화할 수 있습니다.</div>
    </div>`;
    return;
  }

  // Add load more button for server mode
  let loadMoreHtml = '';
  if (!isGuestMode && serverMessagePagination[ch.id]?.hasMore) {
    loadMoreHtml = '<button class="load-more-btn" onclick="loadMoreMessages()">이전 메시지 불러오기</button>';
  }

  container.innerHTML = loadMoreHtml + ch.messages.map(msg => renderMessage(msg, proj)).join('');

  // Auto scroll
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function renderMessage(msg, proj) {
  const isAI = msg.isBot;
  const sender = isAI
    ? proj.bots.find(b => b.id === msg.authorId) || { emoji: '🤖', name: msg.author }
    : proj.members.find(m => m.id === msg.authorId) || { emoji: '👤', name: msg.author, color: '#374151' };

  const avatarBg = sender.color || (isAI ? agentColor(msg.authorId) : '#374151');
  const threadCount = msg.replies ? msg.replies.length : 0;

  let reactionsHtml = '';
  if (msg.reactions && Object.keys(msg.reactions).length) {
    reactionsHtml = '<div class="msg-reactions">';
    for (const [emoji, users] of Object.entries(msg.reactions)) {
      const isActive = users.includes('me');
      reactionsHtml += `<button class="reaction-btn ${isActive ? 'active' : ''}" onclick="toggleReaction('${msg.id}','${emoji}')">
        ${emoji} <span class="count">${users.length}</span>
      </button>`;
    }
    reactionsHtml += `<button class="add-reaction-btn" onclick="showEmojiPicker(event,'${msg.id}')">+</button></div>`;
  } else {
    reactionsHtml = `<div class="msg-reactions"><button class="add-reaction-btn" onclick="showEmojiPicker(event,'${msg.id}')">+</button></div>`;
  }

  let bodyHtml = '';
  if (msg.image) {
    bodyHtml += `<img src="${msg.image}" alt="첨부 이미지" onclick="previewImage(this.src)">`;
  }
  if (msg.text) {
    bodyHtml += renderMarkdown(msg.text);
  }
  if (msg.streaming) {
    bodyHtml += '<span class="typing-cursor" style="display:inline-block;width:2px;height:14px;background:var(--accent);animation:blink 1s infinite;vertical-align:middle;margin-left:2px;"></span>';
  }

  const aiCopyBtn = isAI && !msg.streaming
    ? `<button class="ai-copy-btn" onclick="copyAiMsg('${msg.id}')">📋 복사</button>` : '';

  const agentBadge = isAI
    ? `<span class="msg-badge-agent" data-agent="${msg.authorId}">${escapeHtml(sender.role || 'AI')}</span>`
    : '';

  return `<div class="msg-group ${isAI ? 'ai-msg' : ''}" data-msg-id="${msg.id}" ${isAI ? 'data-agent="'+msg.authorId+'"' : ''}>
    <div class="msg-avatar" style="background:${avatarBg}">${sender.emoji || '👤'}</div>
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-author">${escapeHtml(msg.author)}</span>
        ${agentBadge}
        <span class="msg-time">${formatTime(msg.ts)}</span>
      </div>
      <div class="msg-body">${bodyHtml}</div>
      ${aiCopyBtn}
      ${reactionsHtml}
      ${threadCount > 0 ? `<div class="msg-thread-info" onclick="openThread('${msg.id}')">💬 ${threadCount}개 답글</div>` : ''}
    </div>
    <div class="msg-actions">
      <button class="msg-action-btn" onclick="showEmojiPicker(event,'${msg.id}')" title="리액션">😀</button>
      <button class="msg-action-btn" onclick="openThread('${msg.id}')" title="스레드">💬</button>
      ${!isAI && msg.authorId === 'me' ? `<button class="msg-action-btn" onclick="editMessage('${msg.id}')" title="편집">✏️</button>` : ''}
      ${msg.authorId === 'me' ? `<button class="msg-action-btn" onclick="deleteMessage('${msg.id}')" title="삭제">🗑️</button>` : ''}
    </div>
  </div>`;
}

function switchChannel(channelId) {
  const proj = getProject();
  if (!proj) return;
  const ch = proj.channels.find(c => c.id === channelId);
  if (!ch) return;
  ch.unread = 0;
  proj.currentChannel = channelId;
  if (!isGuestMode && (!ch.messages || !ch.messages.length)) {
    loadChannelMessages(channelId).then(msgs => {
      ch.messages = msgs;
      renderMessages();
    });
  }
  // Connect WebSocket to the new channel
  WS.connect(channelId);
  saveState();
  renderChannelList();
  renderMessages();
  renderHeader();
  closeSidebar();
}

function addChannel() {
  showModal('새 토픽', `
    <div class="settings-field">
      <label>토픽 이름</label>
      <input id="new-ch-name" placeholder="토픽 이름">
    </div>
    <div class="settings-field">
      <label>아이콘 (이모지)</label>
      <input id="new-ch-icon" value="💬" maxlength="4">
    </div>
  `, () => {
    const name = $('new-ch-name').value.trim();
    const icon = $('new-ch-icon').value.trim() || '💬';
    if (!name) { toast('이름을 입력하세요', 'error'); return; }
    const proj = getProject();
    const id = 'ch_' + uid();
    proj.channels.push({ id, name, icon, color: '#6366f1', messages: [], unread: 0 });
    if (!isGuestMode) {
      API.createChannel({ project_id: proj.id, name, icon, color: '#6366f1' }).then(res => {
        if (res.ok && res.data) {
          const ch = proj.channels.find(c => c.name === name);
          if (ch) ch.id = res.data.id;
        }
      });
    }
    saveState();
    switchChannel(id);
    closeModal();
    toast(`#${name} 토픽 생성됨`, 'success');
  });
}

function deleteChannel(channelId) {
  if (!isGuestMode) API.deleteChannel(channelId);
  const proj = getProject();
  if (proj.channels.length <= 1) { toast('최소 1개 토픽이 필요합니다', 'error'); return; }
  proj.channels = proj.channels.filter(c => c.id !== channelId);
  if (proj.currentChannel === channelId) {
    proj.currentChannel = proj.channels[0].id;
  }
  saveState();
  renderAll();
  toast('토픽 삭제됨', 'success');
}

function sendMessage(text, image) {
  const proj = getProject();
  if (!proj) return;
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  if (!ch) return;

  text = text?.trim() || '';
  if (!text && !image) return;

  // /todo command
  if (text.startsWith('/todo ')) {
    const title = text.slice(6).trim();
    if (title) {
      addTask(title, '', 'todo');
      toast(`태스크 생성: ${title}`, 'success');
    }
    return;
  }

  // /done command
  if (text.startsWith('/done ')) {
    const num = parseInt(text.slice(6).trim());
    if (!isNaN(num)) {
      completeTaskByNumber(num);
    }
    return;
  }

  const me = proj.members.find(m => m.isMe) || { id: 'me', name: '나', emoji: '😊' };
  const msg = {
    id: uid(),
    authorId: me.id,
    author: me.name,
    text,
    image: image || null,
    ts: Date.now(),
    isBot: false,
    reactions: {},
    replies: [],
  };
  ch.messages.push(msg);

  if (!isGuestMode) {
    // Try WebSocket first for real-time delivery, fall back to REST
    const wsSent = WS.send({ type: 'message', text: msg.text, image: msg.image || '' });
    if (!wsSent) {
      API.sendMessage({ channel_id: ch.id, text: msg.text, image: msg.image || '' }).then(res => {
        if (res.ok && res.data) {
          msg.id = res.data.id;
        }
      });
    }
  }

  saveState();
  renderMessages();
  renderChannelList();

  // Check for @bot mentions
  const mentionMatch = text.match(/@(\S+)/);
  if (mentionMatch) {
    const botName = mentionMatch[1];
    const bot = proj.bots.find(b => b.active && b.name.toLowerCase() === botName.toLowerCase());
    if (bot) {
      callAI(bot, text, ch);
      return;
    }
  }

  // Default: broadcast to all gateways
  broadcastToChat(text, ch);
}

function deleteMessage(msgId) {
  if (!isGuestMode) {
    API.deleteMessage(msgId);
  }
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  if (!ch) return;
  ch.messages = ch.messages.filter(m => m.id !== msgId);
  saveState();
  renderMessages();
}

function editMessage(msgId) {
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  const msg = ch?.messages.find(m => m.id === msgId);
  if (!msg) return;

  showModal('메시지 편집', `
    <div class="settings-field">
      <textarea id="edit-msg-text" rows="4">${escapeHtml(msg.text)}</textarea>
    </div>
  `, () => {
    const newText = $('edit-msg-text').value.trim();
    if (newText) {
      msg.text = newText;
      if (!isGuestMode) API.updateMessage(msg.id, { text: newText });
      msg.edited = true;
      saveState();
      renderMessages();
    }
    closeModal();
  });
}

function copyAiMsg(msgId) {
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  const msg = ch?.messages.find(m => m.id === msgId);
  if (msg) {
    navigator.clipboard.writeText(msg.text).then(() => toast('복사됨', 'success'));
  }
}

// ===== OpenAI-compatible API Client (fetch + SSE) =====

async function callAI(bot, userText, channel) {
  const proj = getProject();
  const settings = proj.settings;
  const aiMsg = {
    id: uid(), authorId: bot.id, author: bot.name, text: '',
    ts: Date.now(), isBot: true, streaming: true, reactions: {}, replies: [],
  };
  channel.messages.push(aiMsg);
  renderMessages();
  showTypingIndicator(bot.name);

  try {
    // Build OpenAI messages array
    const contextLen = settings.contextLength || 20;
    const recentMsgs = channel.messages.slice(-contextLen - 1, -1);
    const messages = [
      { role: 'system', content: `${bot.systemPrompt}\n\n프로젝트: ${proj.name}\n설명: ${proj.desc || ''}` },
    ];
    for (const m of recentMsgs) {
      messages.push({ role: m.isBot ? 'assistant' : 'user', content: m.text });
    }
    messages.push({ role: 'user', content: userText });

    let resp;
    console.log('[Chatub] callAI: sending', messages.length, 'messages to /api/gateway-chat');
    resp = await fetch('/api/gateway-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });
    console.log('[Chatub] callAI: response status', resp.status);

    if (!resp.ok) {
      const errBody = await resp.text();
      console.error('[Chatub] callAI: error', resp.status, errBody);
      let errMsg;
      try { errMsg = JSON.parse(errBody).error?.message || errBody; } catch { errMsg = errBody; }
      throw new Error(`API ${resp.status}: ${errMsg}`);
    }

    // Parse SSE stream
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line in buffer

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') break;
        try {
          const chunk = JSON.parse(data);
          const delta = chunk.choices?.[0]?.delta?.content;
          if (delta) {
            aiMsg.text += delta;
            updateStreamingMessage(aiMsg);
          }
        } catch {}
      }
    }
  } catch(e) {
    aiMsg.text = aiMsg.text || `[오류: ${e.message || 'API 연결 실패'}]`;
  }

  aiMsg.streaming = false;
  hideTypingIndicator();
  const currentProj = getProject();
  if (currentProj && currentProj.currentChannel !== channel.id) {
    channel.unread = (channel.unread || 0) + 1;
    renderChannelList();
  }
  saveState();
  renderMessages();
}

function updateStreamingMessage(msg) {
  const el = document.querySelector(`[data-msg-id="${msg.id}"] .msg-body`);
  if (el) {
    el.innerHTML = renderMarkdown(msg.text) +
      '<span style="display:inline-block;width:2px;height:14px;background:var(--accent);animation:blink 1s infinite;vertical-align:middle;margin-left:2px;"></span>';
    const container = $('messages-container');
    container.scrollTop = container.scrollHeight;
  }
}

function toggleReaction(msgId, emoji) {
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  const msg = ch?.messages.find(m => m.id === msgId);
  if (!msg) return;
  if (!msg.reactions) msg.reactions = {};
  if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
  const idx = msg.reactions[emoji].indexOf('me');
  if (idx >= 0) {
    msg.reactions[emoji].splice(idx, 1);
    if (!msg.reactions[emoji].length) delete msg.reactions[emoji];
  } else {
    msg.reactions[emoji].push('me');
  }
  if (!isGuestMode) {
    API.updateMessage(msgId, { reactions_json: JSON.stringify(msg.reactions) });
  }
  saveState();
  renderMessages();
}

let currentEmojiTarget = null;
function showEmojiPicker(event, msgId) {
  event.stopPropagation();
  currentEmojiTarget = msgId;
  const picker = $('emoji-picker');
  const grid = $('emoji-grid');
  grid.innerHTML = QUICK_EMOJIS.map(e => `<button onclick="pickEmoji('${e}')">${e}</button>`).join('');
  picker.style.left = event.clientX + 'px';
  picker.style.top = (event.clientY - 60) + 'px';
  picker.classList.add('show');
}

function pickEmoji(emoji) {
  if (currentEmojiTarget) {
    toggleReaction(currentEmojiTarget, emoji);
  }
  $('emoji-picker').classList.remove('show');
  currentEmojiTarget = null;
}

function openThread(msgId) {
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  const msg = ch?.messages.find(m => m.id === msgId);
  if (!msg) return;

  const panel = $('right-panel');

  const me = proj.members.find(m => m.isMe) || { name: '나', emoji: '😊' };

  const renderThreadContent = () => {
    const repliesHtml = (msg.replies || []).map(r => {
      const sender = r.isBot
        ? proj.bots.find(b => b.id === r.authorId) || { emoji: '🤖', name: r.author }
        : proj.members.find(m => m.id === r.authorId) || { emoji: '👤', name: r.author };
      return `<div class="msg-group ${r.isBot ? 'ai-msg' : ''}" ${r.isBot ? 'data-agent="'+r.authorId+'"' : ''} style="margin-bottom:8px;">
        <div class="msg-avatar" style="background:${sender.color || (r.isBot ? agentColor(r.authorId) : '#374151')};width:28px;height:28px;font-size:13px;">${sender.emoji}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author" style="font-size:13px;">${escapeHtml(r.author)}</span>
            <span class="msg-time">${formatTime(r.ts)}</span>
          </div>
          <div class="msg-body" style="font-size:13px;">${renderMarkdown(r.text)}</div>
        </div>
      </div>`;
    }).join('');

    $('panel-content').innerHTML = `
      <div class="thread-panel">
        <div class="thread-original">
          <div style="font-weight:700;margin-bottom:4px;">${escapeHtml(msg.author)}</div>
          <div style="font-size:13px;">${renderMarkdown(msg.text)}</div>
        </div>
        <div class="thread-messages" id="thread-messages">${repliesHtml || '<div style="padding:20px;color:var(--text-muted);text-align:center;font-size:13px;">아직 답글이 없습니다</div>'}</div>
        <div class="thread-input">
          <div class="input-wrapper">
            <textarea id="thread-input" placeholder="답글 입력..." rows="1" style="font-size:13px;"></textarea>
            <button class="send-btn" onclick="sendThreadReply('${msgId}')" style="font-size:12px;">답글</button>
          </div>
        </div>
      </div>`;

    const threadInput = $('thread-input');
    if (threadInput) {
      threadInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendThreadReply(msgId);
        }
      });
    }
  };

  renderThreadContent();
  window._currentThreadMsgId = msgId;
  window._renderThreadContent = renderThreadContent;
}

function sendThreadReply(msgId) {
  const proj = getProject();
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  const msg = ch?.messages.find(m => m.id === msgId);
  if (!msg) return;

  const input = $('thread-input');
  const text = input?.value.trim();
  if (!text) return;

  const me = proj.members.find(m => m.isMe) || { id: 'me', name: '나', emoji: '😊' };
  if (!msg.replies) msg.replies = [];
  msg.replies.push({
    id: uid(),
    authorId: me.id,
    author: me.name,
    text,
    ts: Date.now(),
    isBot: false,
  });

  if (!isGuestMode) {
    API.createThread({ message_id: msgId, text });
  }

  saveState();
  renderMessages();

  if (window._currentThreadMsgId === msgId && window._renderThreadContent) {
    window._renderThreadContent();
    const newInput = $('thread-input');
    if (newInput) newInput.value = '';
  }
}

let mentionState = { active: false, query: '', startPos: 0, selectedIdx: 0 };

function handleMentionInput(textarea) {
  const val = textarea.value;
  const pos = textarea.selectionStart;
  const beforeCursor = val.slice(0, pos);
  const atMatch = beforeCursor.match(/@(\S*)$/);

  if (atMatch) {
    mentionState.active = true;
    mentionState.query = atMatch[1].toLowerCase();
    mentionState.startPos = pos - atMatch[1].length - 1;
    showMentionDropdown();
  } else {
    mentionState.active = false;
    hideMentionDropdown();
  }
}

function showMentionDropdown() {
  const proj = getProject();
  if (!proj) return;
  const dropdown = $('mention-dropdown');

  const allMentionable = [
    ...proj.members.map(m => ({ ...m, type: 'member' })),
    ...proj.bots.filter(b => b.active).map(b => ({ ...b, type: 'bot' })),
  ];

  const filtered = mentionState.query
    ? allMentionable.filter(m => m.name.toLowerCase().includes(mentionState.query))
    : allMentionable;

  if (!filtered.length) { hideMentionDropdown(); return; }

  mentionState.selectedIdx = 0;
  dropdown.innerHTML = filtered.map((m, i) => `
    <div class="mention-option ${i === 0 ? 'selected' : ''}" data-name="${escapeHtml(m.name)}" onclick="selectMention('${escapeHtml(m.name)}')">
      <div class="avatar" style="background:${m.type === 'bot' ? agentColor(m.id) : (m.color || '#6366f1')}">${m.emoji || '👤'}</div>
      <div class="info">
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="role">${escapeHtml(m.role || (m.type === 'bot' ? 'AI 에이전트' : '팀원'))}</div>
      </div>
    </div>
  `).join('');
  dropdown.classList.add('show');
}

function hideMentionDropdown() {
  $('mention-dropdown').classList.remove('show');
}

function selectMention(name) {
  const textarea = $('msg-input');
  const val = textarea.value;
  const before = val.slice(0, mentionState.startPos);
  const after = val.slice(textarea.selectionStart);
  textarea.value = before + '@' + name + ' ' + after;
  textarea.focus();
  textarea.selectionStart = textarea.selectionEnd = before.length + name.length + 2;
  mentionState.active = false;
  hideMentionDropdown();
}

function handleMentionKeydown(e) {
  if (!mentionState.active) return false;
  const dropdown = $('mention-dropdown');
  const options = dropdown.querySelectorAll('.mention-option');
  if (!options.length) return false;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    mentionState.selectedIdx = Math.min(mentionState.selectedIdx + 1, options.length - 1);
    options.forEach((o, i) => o.classList.toggle('selected', i === mentionState.selectedIdx));
    return true;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    mentionState.selectedIdx = Math.max(mentionState.selectedIdx - 1, 0);
    options.forEach((o, i) => o.classList.toggle('selected', i === mentionState.selectedIdx));
    return true;
  }
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    const selected = options[mentionState.selectedIdx];
    if (selected) selectMention(selected.dataset.name);
    return true;
  }
  if (e.key === 'Escape') {
    hideMentionDropdown();
    mentionState.active = false;
    return true;
  }
  return false;
}

function openSearch() {
  const overlay = $('search-overlay');
  overlay.classList.add('show');
  const input = $('search-input');
  input.value = '';
  input.focus();
  $('search-results').innerHTML = '';
}

function closeSearch() {
  $('search-overlay').classList.remove('show');
}

function performSearch(query) {
  if (!query.trim()) { $('search-results').innerHTML = ''; return; }
  const proj = getProject();
  if (!proj) return;
  const results = [];
  const q = query.toLowerCase();
  proj.channels.forEach(ch => {
    ch.messages.forEach(msg => {
      if (msg.text && msg.text.toLowerCase().includes(q)) {
        results.push({ channel: ch, msg });
      }
    });
  });
  const container = $('search-results');
  if (!results.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">결과 없음</div>';
    return;
  }
  container.innerHTML = results.slice(0, 20).map(r => `
    <div class="search-result-item" onclick="goToSearchResult('${r.channel.id}','${r.msg.id}')">
      <div class="result-channel">#${escapeHtml(r.channel.name)}</div>
      <div class="result-text">${highlightSearchResult(escapeHtml(r.msg.text.slice(0, 100)), query)}</div>
      <div class="result-author">${escapeHtml(r.msg.author)} · ${formatTime(r.msg.ts)}</div>
    </div>
  `).join('');
}

function highlightSearchResult(text, query) {
  const re = new RegExp(`(${escapeHtml(query)})`, 'gi');
  return text.replace(re, '<strong style="color:var(--accent)">$1</strong>');
}

function goToSearchResult(channelId, msgId) {
  closeSearch();
  switchChannel(channelId);
  setTimeout(() => {
    const el = document.querySelector(`[data-msg-id="${msgId}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.background = 'var(--accent-dim)';
      setTimeout(() => el.style.background = '', 2000);
    }
  }, 100);
}

function renderTaskView() {
  const proj = getProject();
  if (!proj) return;

  const tasks = proj.tasks || [];
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const doing = tasks.filter(t => t.status === 'doing').length;
  const todo = tasks.filter(t => t.status === 'todo').length;

  $('task-stats').innerHTML = `
    <div class="stat-card"><div class="num">📊 ${total}</div><div class="label">전체</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warning)">⏳ ${todo}</div><div class="label">대기</div></div>
    <div class="stat-card"><div class="num" style="color:var(--info)">🔄 ${doing}</div><div class="label">진행</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">✅ ${done}</div><div class="label">완료</div></div>
  `;

  const pct = total ? Math.round((done / total) * 100) : 0;
  const progressFill = $('task-progress');
  progressFill.style.width = pct + '%';
  progressFill.style.background = pct > 70 ? 'var(--success)' : pct >= 30 ? 'var(--warning)' : 'var(--danger)';

  const msFilter = $('milestone-filter');
  if (msFilter) {
    const milestones = proj.milestones || [];
    const currentVal = currentMilestoneFilter;
    msFilter.innerHTML = '<option value="">모든 마일스톤</option>' +
      milestones.map(m => `<option value="${m.id}" ${currentVal === m.id ? 'selected' : ''}>${escapeHtml(m.name)}</option>`).join('');
  }

  const oldMsProgress = document.getElementById('milestone-progress-section');
  if (oldMsProgress) oldMsProgress.remove();
  if ((proj.milestones || []).length) {
    let msProgressHtml = '<div id="milestone-progress-section" style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">';
    proj.milestones.forEach(m => {
      const msTasks = tasks.filter(t => t.milestoneId === m.id);
      const msDone = msTasks.filter(t => t.status === 'done').length;
      const msPct = msTasks.length ? Math.round(msDone / msTasks.length * 100) : 0;
      const msColor = msPct > 70 ? 'var(--success)' : msPct >= 30 ? 'var(--warning)' : 'var(--danger)';
      msProgressHtml += `<div style="display:flex;align-items:center;gap:6px;font-size:11px;">
        <span class="milestone-tag" style="background:${m.color}20;color:${m.color}">${escapeHtml(m.name)}</span>
        <div class="progress-bar" style="flex:1;height:4px;"><div class="fill" style="width:${msPct}%;background:${msColor}"></div></div>
        <span style="color:var(--text-muted)">${msDone}/${msTasks.length} (${msPct}%)</span>
      </div>`;
    });
    msProgressHtml += '</div>';
    const progressEl = $('task-progress')?.parentElement;
    if (progressEl) progressEl.insertAdjacentHTML('afterend', msProgressHtml);
  }

  const filter = currentTaskFilter;
  const searchQ = ($('task-search')?.value || '').toLowerCase();

  const filterTasks = (status) => {
    return tasks.filter(t => {
      if (t.status !== status) return false;
      if (filter !== 'all' && t.status !== filter) return false;
      if (searchQ && !t.title.toLowerCase().includes(searchQ) && !(t.desc || '').toLowerCase().includes(searchQ)) return false;
      if (currentMilestoneFilter && t.milestoneId !== currentMilestoneFilter) return false;
      return true;
    });
  };

  ['todo', 'doing', 'done'].forEach(status => {
    const filtered = filterTasks(status);
    const col = $('col-' + status);
    $('count-' + status).textContent = filtered.length;
    col.innerHTML = filtered.map(t => renderTaskCard(t, proj)).join('');
  });

  setupDragAndDrop();
}

function renderTaskCard(task, proj) {
  const milestone = proj.milestones?.find(m => m.id === task.milestoneId);
  const milestoneTag = milestone
    ? `<span class="milestone-tag" style="background:${milestone.color}20;color:${milestone.color}">${escapeHtml(milestone.name)}</span>`
    : '';

  let deadlineHtml = '';
  if (task.deadline) {
    const isOverdue = new Date(task.deadline) < new Date() && task.status !== 'done';
    deadlineHtml = `<span class="task-deadline ${isOverdue ? 'overdue' : ''}">📅 ${task.deadline}</span>`;
  }

  return `<div class="task-card" draggable="true" data-task-id="${task.id}"
               ondragstart="onDragStart(event,'${task.id}')" onclick="openTaskDetail('${task.id}')">
    <div class="task-title">#${task.num} ${escapeHtml(task.title)}</div>
    ${task.desc ? `<div class="task-desc">${escapeHtml(task.desc)}</div>` : ''}
    <div class="task-meta">${milestoneTag}${deadlineHtml}</div>
  </div>`;
}

let currentTaskFilter = 'all';
let currentMilestoneFilter = '';

function addTask(title, desc, status) {
  const proj = getProject();
  if (!proj) return;
  const num = proj.nextTaskId++;
  proj.tasks.push({
    id: uid(),
    num,
    title,
    desc: desc || '',
    status: status || 'todo',
    milestoneId: '',
    deadline: '',
    createdAt: Date.now(),
  });
  if (!isGuestMode) {
    API.createTask({ project_id: proj.id, title, description: desc || '', status: status || 'todo' });
  }
  saveState();
  renderTaskView();
}

function completeTaskByNumber(num) {

  const task = proj.tasks.find(t => t.num === num);

// Drag and Drop
let draggedTaskId = null;

function onDragStart(e, taskId) {
  draggedTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function setupDragAndDrop() {
  document.querySelectorAll('.kanban-col-body').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      if (!draggedTaskId) return;
      const newStatus = col.closest('.kanban-col').dataset.status;
      const proj = getProject();
      const task = proj.tasks.find(t => t.id === draggedTaskId);
      if (task) {
        task.status = newStatus;
        if (!isGuestMode) API.updateTask(task.id, { status: newStatus });
        saveState();
        renderTaskView();
      }
      draggedTaskId = null;
    });
  });

  setupTouchDrag();
}

function setupTouchDrag() {
  let touchTask = null;
  let touchEl = null;
  let clone = null;
  let startX, startY;

  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      touchTask = card.dataset.taskId;
      touchEl = card;
      card._touchTimer = setTimeout(() => {
        clone = card.cloneNode(true);
        clone.style.position = 'fixed';
        clone.style.width = card.offsetWidth + 'px';
        clone.style.opacity = '0.8';
        clone.style.zIndex = '1000';
        clone.style.pointerEvents = 'none';
        clone.style.transform = 'rotate(3deg)';
        document.body.appendChild(clone);
        card.style.opacity = '0.3';
      }, 300);
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      if (!clone) return;
      e.preventDefault();
      const touch = e.touches[0];
      clone.style.left = (touch.clientX - 40) + 'px';
      clone.style.top = (touch.clientY - 20) + 'px';
    }, { passive: false });

    card.addEventListener('touchend', e => {
      clearTimeout(card._touchTimer);
      if (clone) {
        clone.remove();
        clone = null;
        if (touchEl) touchEl.style.opacity = '1';

        const touch = e.changedTouches[0];
        const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        const col = dropTarget?.closest('.kanban-col');
        if (col && touchTask) {
          const newStatus = col.dataset.status;
          const proj = getProject();
          const task = proj.tasks.find(t => t.id === touchTask);
          if (task && task.status !== newStatus) {
            task.status = newStatus;
            if (!isGuestMode) API.updateTask(task.id, { status: newStatus });
            saveState();
            renderTaskView();
          }
        }
      }
      touchTask = null;
      touchEl = null;
    });
  });
}

// ===== Data Export/Import =====

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `chatub-backup-${formatDate(Date.now())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('데이터 내보내기 완료', 'success');
}

function importData() {
  const input = $('import-input');
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.projects) {
          state = data;
          saveState();
          renderAll();
          toast('데이터 가져오기 완료', 'success');
        } else {
          toast('잘못된 형식', 'error');
        }
      } catch(e) { toast('파일 파싱 실패', 'error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function confirmClearData() {
  if (confirm('모든 데이터를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
    state.projects.forEach(p => localStorage.removeItem(projectStorageKey(p.id)));
    localStorage.removeItem(STORAGE_META);
    localStorage.removeItem(STORAGE_KEY);
    state = { currentProject: null, projects: [] };
    loadState();
    renderAll();
    toast('데이터 삭제 완료', 'success');
  }
}

// ================================================================
// INLINE CHAT SEARCH
// ================================================================

let inlineSearchState = { active: false, matches: [], currentIdx: -1, query: '' };

function openInlineSearch() {
  const bar = $('chat-search-bar');
  bar.style.display = 'flex';
  inlineSearchState.active = true;
  const input = $('inline-search-input');
  input.value = inlineSearchState.query || '';
  input.focus();
  input.select();
}

function closeInlineSearch() {
  $('chat-search-bar').style.display = 'none';
  inlineSearchState.active = false;
  inlineSearchState.matches = [];
  inlineSearchState.currentIdx = -1;
  inlineSearchState.query = '';
  $('inline-search-counter').textContent = '';
  clearInlineHighlights();
}

function clearInlineHighlights() {
  document.querySelectorAll('#messages-container .search-highlight').forEach(el => {
    const parent = el.parentNode;
    parent.replaceChild(document.createTextNode(el.textContent), el);
    parent.normalize();
  });
}

function performInlineSearch(query) {
  clearInlineHighlights();
  inlineSearchState.matches = [];
  inlineSearchState.currentIdx = -1;
  inlineSearchState.query = query;

  if (!query.trim()) {
    $('inline-search-counter').textContent = '';
    return;
  }

  const container = $('messages-container');
  const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${escapedQuery})`, 'gi');

  const msgBodies = container.querySelectorAll('.msg-body');
  msgBodies.forEach(body => {
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null);
    const textNodes = [];
    while (walker.nextNode()) {
      if (walker.currentNode.textContent.toLowerCase().includes(query.toLowerCase())) {
        textNodes.push(walker.currentNode);
      }
    }
    textNodes.forEach(node => {
      const parts = node.textContent.split(regex);
      if (parts.length <= 1) return;
      const frag = document.createDocumentFragment();
      parts.forEach(part => {
        if (part.toLowerCase() === query.toLowerCase()) {
          const span = document.createElement('span');
          span.className = 'search-highlight';
          span.textContent = part;
          frag.appendChild(span);
          inlineSearchState.matches.push(span);
        } else {
          frag.appendChild(document.createTextNode(part));
        }
      });
      node.parentNode.replaceChild(frag, node);
    });
  });

  const total = inlineSearchState.matches.length;
  if (total > 0) {
    inlineSearchState.currentIdx = 0;
    updateInlineSearchHighlight();
  }
  $('inline-search-counter').textContent = total > 0 ? `1/${total}` : '0개';
}

function updateInlineSearchHighlight() {
  const { matches, currentIdx } = inlineSearchState;
  matches.forEach((m, i) => m.classList.toggle('current', i === currentIdx));
  if (matches[currentIdx]) {
    matches[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  $('inline-search-counter').textContent = `${currentIdx + 1}/${matches.length}`;
}

function navigateInlineSearch(direction) {
  const { matches } = inlineSearchState;
  if (!matches.length) return;
  if (direction === 'next') {
    inlineSearchState.currentIdx = (inlineSearchState.currentIdx + 1) % matches.length;
  } else {
    inlineSearchState.currentIdx = (inlineSearchState.currentIdx - 1 + matches.length) % matches.length;
  }
  updateInlineSearchHighlight();
}

// ================================================================
// KEYBOARD SHORTCUTS
// ================================================================

function handleGlobalKeydown(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f' && currentView === 'chat') {
    e.preventDefault();
    openInlineSearch();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const input = $('msg-input');
    if (document.activeElement === input) {
      e.preventDefault();
      sendMessage(input.value);
      input.value = '';
      autoResize(input);
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    addChannel();
  }
  if (e.key === 'Escape') {
    if (inlineSearchState.active) { closeInlineSearch(); return; }
    closeSearch();
    closeModal();
    $('emoji-picker').classList.remove('show');
    $('img-preview').classList.remove('show');
    closeSidebar();
    if (!$('right-panel').classList.contains('hidden')) {
      $('right-panel').classList.add('hidden');
    }
  }
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
}
