const AUTH_TOKEN_KEY = 'chatub_token';
const AUTH_USER_KEY = 'chatub_user';
const AUTH_MODE_KEY = 'chatub_mode';

let authUser = null;
let isGuestMode = false;

const API = {
  get token() { return localStorage.getItem(AUTH_TOKEN_KEY); },

  async request(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (this.token) headers['Authorization'] = 'Bearer ' + this.token;

    const opts = { method, headers };
    if (body && method !== 'GET') opts.body = JSON.stringify(body);

    try {
      const resp = await fetch('/api/' + path, opts);
      const data = await resp.json();

      if (resp.status === 401) {
        toast('세션이 만료되었습니다. 다시 로그인해주세요.', 'error');
        handleLogout();
        return { ok: false, error: '세션 만료' };
      }

      return data;
    } catch(e) {
      console.error('API error:', e);
      toast('네트워크 오류', 'error');
      return { ok: false, error: e.message };
    }
  },

  async register(username, password, display_name) {
    return this.request('POST', 'auth/register', { username, password, display_name });
  },
  async login(username, password) {
    return this.request('POST', 'auth/login', { username, password });
  },
  async me() {
    return this.request('GET', 'auth/me');
  },

  async getProjects() { return this.request('GET', 'projects'); },
  async createProject(name, description, color) { return this.request('POST', 'projects', { name, description, color }); },
  async updateProject(id, data) { return this.request('PUT', 'projects/' + id, data); },
  async deleteProject(id) { return this.request('DELETE', 'projects/' + id); },

  // Channels: nested under projects
  async getChannels(projectId) { return this.request('GET', 'projects/' + projectId + '/channels'); },
  async createChannel(data) {
    const pid = data.project_id;
    const body = { name: data.name, icon: data.icon, color: data.color };
    return this.request('POST', 'projects/' + pid + '/channels', body);
  },
  async updateChannel(id, data) { return this.request('PUT', 'channels/' + id, data); },
  async deleteChannel(id) { return this.request('DELETE', 'channels/' + id); },

  // Messages: nested under channels
  async getMessages(channelId, limit, before) {
    let path = 'channels/' + channelId + '/messages';
    const params = [];
    if (limit) params.push('limit=' + limit);
    if (before) params.push('before=' + before);
    if (params.length) path += '?' + params.join('&');
    return this.request('GET', path);
  },
  async sendMessage(data) {
    const chId = data.channel_id;
    const body = { text: data.text, image: data.image || '' };
    return this.request('POST', 'channels/' + chId + '/messages', body);
  },
  async updateMessage(id, data) { return this.request('PUT', 'messages/' + id, data); },
  async deleteMessage(id) { return this.request('DELETE', 'messages/' + id); },

  async getThreads(messageId) { return this.request('GET', 'threads?message_id=' + messageId); },
  async createThread(data) { return this.request('POST', 'threads', data); },

  async getTasks(projectId, status, milestoneId) {
    let path = 'tasks?project_id=' + projectId;
    if (status) path += '&status=' + status;
    if (milestoneId) path += '&milestone_id=' + milestoneId;
    return this.request('GET', path);
  },
  async createTask(data) { return this.request('POST', 'tasks', data); },
  async updateTask(id, data) { return this.request('PUT', 'tasks/' + id, data); },
  async deleteTask(id) { return this.request('DELETE', 'tasks/' + id); },

  async getMilestones(projectId) { return this.request('GET', 'milestones?project_id=' + projectId); },
  async createMilestone(data) { return this.request('POST', 'milestones', data); },
  async updateMilestone(id, data) { return this.request('PUT', 'milestones/' + id, data); },
  async deleteMilestone(id) { return this.request('DELETE', 'milestones/' + id); },

  async getMembers(projectId) { return this.request('GET', 'members?project_id=' + projectId); },
  async createMember(data) { return this.request('POST', 'members', data); },
  async updateMember(id, data) { return this.request('PUT', 'members/' + id, data); },
  async deleteMember(id) { return this.request('DELETE', 'members/' + id); },

  async getBots(projectId) { return this.request('GET', 'bots?project_id=' + (projectId || '')); },
  async createBot(data) { return this.request('POST', 'bots', data); },
  async updateBot(id, data) { return this.request('PUT', 'bots/' + id, data); },
  async deleteBot(id) { return this.request('DELETE', 'bots/' + id); },

  async getSettings() { return this.request('GET', 'settings'); },
  async updateSettings(data) { return this.request('PUT', 'settings', data); },

  async migrate(data) { return this.request('POST', 'migrate', data); },
};

// ===== Auth UI Functions =====

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.toggle('active', f.id === tab + '-form'));
  $('login-error').textContent = '';
  $('register-error').textContent = '';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = $('login-btn');
  btn.disabled = true;
  $('login-error').textContent = '';

  const username = $('login-username').value.trim();
  const password = $('login-password').value;

  const res = await API.login(username, password);
  btn.disabled = false;

  if (res.ok) {
    const d = res.data || res;
    localStorage.setItem(AUTH_TOKEN_KEY, d.token);
    localStorage.setItem(AUTH_USER_KEY, JSON.stringify(d.user));
    localStorage.removeItem(AUTH_MODE_KEY);
    authUser = d.user;
    isGuestMode = false;
    enterApp();
  } else {
    $('login-error').textContent = res.error || '로그인 실패';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = $('register-btn');
  btn.disabled = true;
  $('register-error').textContent = '';

  const username = $('reg-username').value.trim();
  const password = $('reg-password').value;
  const display_name = $('reg-display-name').value.trim();

  if (username.length < 2) { $('register-error').textContent = '사용자명은 2자 이상이어야 합니다'; btn.disabled = false; return; }
  if (password.length < 4) { $('register-error').textContent = '비밀번호는 4자 이상이어야 합니다'; btn.disabled = false; return; }
  if (!display_name) { $('register-error').textContent = '표시 이름을 입력하세요'; btn.disabled = false; return; }

  const res = await API.register(username, password, display_name);
  btn.disabled = false;

  if (res.ok) {
    const d = res.data || res;
    localStorage.setItem(AUTH_TOKEN_KEY, d.token);
    localStorage.setItem(AUTH_USER_KEY, JSON.stringify(d.user));
    localStorage.removeItem(AUTH_MODE_KEY);
    authUser = d.user;
    isGuestMode = false;
    enterApp();
    toast('가입 완료! 환영합니다.', 'success');
  } else {
    $('register-error').textContent = res.error || '가입 실패';
  }
}

function enterGuestMode() {
  localStorage.setItem(AUTH_MODE_KEY, 'guest');
  localStorage.removeItem(AUTH_TOKEN_KEY);
  localStorage.removeItem(AUTH_USER_KEY);
  authUser = null;
  isGuestMode = true;
  enterApp();
}

function handleLogout() {
  WS.disconnect();
  localStorage.removeItem(AUTH_TOKEN_KEY);
  localStorage.removeItem(AUTH_USER_KEY);
  localStorage.removeItem(AUTH_MODE_KEY);
  authUser = null;
  isGuestMode = false;
  $('app').classList.add('hidden');
  $('auth-screen').classList.remove('hidden');
  $('login-username').value = '';
  $('login-password').value = '';
  $('login-error').textContent = '';
}

function enterApp() {
  $('auth-screen').classList.add('hidden');
  $('app').classList.remove('hidden');
  updateProfileUI();
  loadStateAndRender();
}

function updateProfileUI() {
  const avatar = $('profile-avatar');
  const nameDisplay = $('profile-name-display');
  const migrateBtn = $('btn-migrate-data');

  if (isGuestMode) {
    avatar.textContent = '👤';
    avatar.style.background = 'var(--bg-tertiary)';
    nameDisplay.textContent = '게스트 모드';
    migrateBtn.style.display = 'none';
  } else if (authUser) {
    avatar.textContent = authUser.display_name ? authUser.display_name.charAt(0).toUpperCase() : '?';
    avatar.style.background = authUser.avatar_color || 'var(--accent)';
    nameDisplay.textContent = authUser.display_name || authUser.username;
    const hasGuestData = localStorage.getItem('chatub_meta') || localStorage.getItem('chatub');
    migrateBtn.style.display = hasGuestData ? 'block' : 'none';
  }
}

function toggleProfileDropdown() {
  $('profile-dropdown').classList.toggle('show');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.profile-area')) {
    const dd = document.getElementById('profile-dropdown');
    if (dd) dd.classList.remove('show');
  }
});

function showProfileEdit() {
  $('profile-dropdown').classList.remove('show');
  switchView('settings');
}

// ===== Data Migration (Guest -> Login) =====

function showMigrateModal() {
  $('profile-dropdown').classList.remove('show');
  showModal('데이터 마이그레이션', `
    <p style="margin-bottom:16px;color:var(--text-secondary);font-size:13px;">
      로컬에 저장된 게스트 데이터를 서버로 이전합니다.<br>
      기존 서버 데이터는 유지되며, 게스트 프로젝트가 추가됩니다.
    </p>
    <div id="migrate-status" style="font-size:13px;color:var(--text-muted);"></div>
  `, async () => {
    $('migrate-status').textContent = '마이그레이션 진행 중...';

    const metaRaw = localStorage.getItem('chatub_meta');
    const guestProjects = [];

    if (metaRaw) {
      const meta = JSON.parse(metaRaw);
      (meta.projectIds || []).forEach(id => {
        const raw = localStorage.getItem('chatub_' + id);
        if (raw) guestProjects.push(JSON.parse(raw));
      });
    } else {
      const raw = localStorage.getItem('chatub');
      if (raw) {
        const data = JSON.parse(raw);
        if (data.projects) guestProjects.push(...data.projects);
      }
    }

    if (!guestProjects.length) {
      $('migrate-status').textContent = '마이그레이션할 데이터가 없습니다.';
      return;
    }

    const res = await API.migrate({ projects: guestProjects });
    if (res.ok) {
      if (metaRaw) {
        const meta = JSON.parse(metaRaw);
        (meta.projectIds || []).forEach(id => localStorage.removeItem('chatub_' + id));
        localStorage.removeItem('chatub_meta');
      }
      localStorage.removeItem('chatub');

      closeModal();
      toast('마이그레이션 완료!', 'success');
      updateProfileUI();
      await loadStateFromServer();
      renderAll();
    } else {
      $('migrate-status').textContent = '오류: ' + (res.error || '마이그레이션 실패');
    }
  });
}

// ===== Server-backed state loading =====

let serverChannelMessages = {};
let serverMessagePagination = {};

async function loadStateFromServer() {
  if (isGuestMode) return;

  const projRes = await API.getProjects();
  if (!projRes.ok) return;

  state.projects = [];

  for (const sp of projRes.data) {
    const [chRes, memRes, botRes, taskRes, msRes] = await Promise.all([
      API.getChannels(sp.id),
      API.getMembers(sp.id),
      API.getBots(sp.id),
      API.getTasks(sp.id),
      API.getMilestones(sp.id),
    ]);

    const channels = (chRes.data || []).map(ch => ({
      id: ch.id,
      name: ch.name,
      icon: ch.icon || '#',
      color: ch.color || '#6366f1',
      messages: [],
      unread: 0,
    }));

    const members = [
      { id: authUser.id, name: authUser.display_name, emoji: '😊', role: '나', color: authUser.avatar_color || '#6366f1', isMe: true },
      ...(memRes.data || []).map(m => ({
        id: m.id, name: m.name, role: m.role, emoji: '👤',
        color: m.avatar_color || '#6366f1',
      }))
    ];

    const bots = (botRes.data || []).map(b => ({
      id: b.id, name: b.name, role: b.role,
      emoji: b.avatar || '🤖',
      systemPrompt: b.system_prompt || '',
      active: !!b.is_active,
      isBot: true,
    }));

    const tasks = (taskRes.data || []).map(t => ({
      id: t.id, num: t.id.slice(-4),
      title: t.title, desc: t.description || '',
      status: t.status || 'todo',
      milestoneId: t.milestone_id || '',
      deadline: t.deadline ? new Date(t.deadline * 1000).toISOString().split('T')[0] : '',
      createdAt: t.created_at * 1000,
    }));

    const milestones = (msRes.data || []).map(m => ({
      id: m.id, name: m.name,
      deadline: m.deadline ? new Date(m.deadline * 1000).toISOString().split('T')[0] : '',
      color: m.color || '#6366f1',
    }));

    const setRes = await API.getSettings();
    const settings = setRes.ok && setRes.data ? {
      apiBaseUrl: setRes.data.api_base_url || 'https://api.openai.com/v1',
      apiKey: setRes.data.api_key || '',
      model: setRes.data.model || 'gpt-4o',
      contextLength: setRes.data.context_length || 20,
    } : { contextLength: 20 };

    const proj = {
      id: sp.id,
      name: sp.name,
      desc: sp.description || '',
      color: sp.color || '#6366f1',
      channels,
      currentChannel: channels[0]?.id || '',
      members,
      bots,
      tasks,
      milestones,
      settings,
      nextTaskId: tasks.length + 1,
    };
    state.projects.push(proj);
  }

  if (!state.projects.length) {
    return;
  }

  state.currentProject = state.projects[0].id;
}

async function loadChannelMessages(channelId, limit = 50, before = null) {
  if (isGuestMode) return;

  const res = await API.getMessages(channelId, limit, before);
  if (!res.ok) return [];

  const proj = getProject();
  const messages = (res.data || []).map(m => ({
    id: m.id,
    authorId: m.user_id || m.bot_id || '',
    author: m.author_name || '알 수 없음',
    text: m.text || '',
    image: m.image || null,
    ts: m.created_at * 1000,
    editedAt: m.edited_at ? m.edited_at * 1000 : null,
    isBot: !!m.bot_id,
    reactions: m.reactions_json ? (typeof m.reactions_json === 'string' ? JSON.parse(m.reactions_json) : m.reactions_json) : {},
    replies: [],
  }));

  messages.reverse();

  if (!serverMessagePagination[channelId]) {
    serverMessagePagination[channelId] = { hasMore: true, oldestTs: null };
  }

  if (messages.length < limit) {
    serverMessagePagination[channelId].hasMore = false;
  }

  if (messages.length > 0) {
    serverMessagePagination[channelId].oldestTs = Math.floor(messages[0].ts / 1000);
  }

  return messages;
}

async function loadMoreMessages() {
  const proj = getProject();
  if (!proj || isGuestMode) return;
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  if (!ch) return;

  const pagination = serverMessagePagination[ch.id];
  if (!pagination || !pagination.hasMore) {
    toast('더 이상 메시지가 없습니다', 'info');
    return;
  }

  const container = $('messages-container');
  const scrollHeightBefore = container.scrollHeight;

  const older = await loadChannelMessages(ch.id, 50, pagination.oldestTs);
  if (older.length) {
    ch.messages = [...older, ...ch.messages];
    renderMessages();
    requestAnimationFrame(() => {
      container.scrollTop = container.scrollHeight - scrollHeightBefore;
    });
  }
}

// ================================================================
// WEBSOCKET REAL-TIME CONNECTION
// ================================================================

const WS = {
  socket: null,
  channelId: null,
  reconnectTimer: null,
  reconnectDelay: 1000,
  maxReconnectDelay: 30000,

  connect(channelId) {
    if (isGuestMode) return;
    if (this.socket && this.channelId === channelId && this.socket.readyState === WebSocket.OPEN) return;

    this.disconnect();
    this.channelId = channelId;

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const token = API.token || '';
    const url = `${proto}//${location.host}/ws/${channelId}?token=${encodeURIComponent(token)}`;

    try {
      this.socket = new WebSocket(url);
    } catch (e) {
      console.warn('WebSocket connection failed:', e);
      this.scheduleReconnect();
      return;
    }

    this.socket.onopen = () => {
      console.log('[WS] connected to channel', channelId);
      this.reconnectDelay = 1000;
    };

    this.socket.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        this.handleMessage(data);
      } catch (e) {
        console.warn('[WS] parse error:', e);
      }
    };

    this.socket.onclose = (e) => {
      console.log('[WS] disconnected', e.code, e.reason);
      if (this.channelId === channelId) {
        this.scheduleReconnect();
      }
    };

    this.socket.onerror = (e) => {
      console.warn('[WS] error:', e);
    };
  },

  disconnect() {
    clearTimeout(this.reconnectTimer);
    if (this.socket) {
      this.socket.onclose = null;
      this.socket.close();
      this.socket = null;
    }
    this.channelId = null;
  },

  scheduleReconnect() {
    clearTimeout(this.reconnectTimer);
    this.reconnectTimer = setTimeout(() => {
      if (this.channelId && !isGuestMode) {
        console.log('[WS] reconnecting...');
        this.connect(this.channelId);
      }
    }, this.reconnectDelay);
    this.reconnectDelay = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);
  },

  send(data) {
    if (this.socket && this.socket.readyState === WebSocket.OPEN) {
      this.socket.send(JSON.stringify(data));
      return true;
    }
    return false;
  },

  handleMessage(data) {
    const proj = getProject();
    if (!proj) return;

    switch (data.type) {
      case 'message': {
        const ch = proj.channels.find(c => c.id === data.channel_id);
        if (!ch) return;
        // Avoid duplicates (own messages already added locally)
        if (ch.messages.find(m => m.id === data.id)) return;
        const msg = {
          id: data.id,
          authorId: data.user_id || data.bot_id || '',
          author: data.author_name || '알 수 없음',
          text: data.text || '',
          image: data.image || null,
          ts: data.created_at ? data.created_at * 1000 : Date.now(),
          isBot: !!data.bot_id,
          reactions: data.reactions_json ? (typeof data.reactions_json === 'string' ? JSON.parse(data.reactions_json) : data.reactions_json) : {},
          replies: [],
        };
        ch.messages.push(msg);
        if (proj.currentChannel === data.channel_id) {
          renderMessages();
        } else {
          ch.unread = (ch.unread || 0) + 1;
          renderChannelList();
        }
        break;
      }
      case 'message_update': {
        const ch = proj.channels.find(c => c.id === data.channel_id);
        if (!ch) return;
        const msg = ch.messages.find(m => m.id === data.id);
        if (msg) {
          if (data.text !== undefined) msg.text = data.text;
          if (data.reactions_json) {
            msg.reactions = typeof data.reactions_json === 'string' ? JSON.parse(data.reactions_json) : data.reactions_json;
          }
          if (proj.currentChannel === data.channel_id) renderMessages();
        }
        break;
      }
      case 'message_delete': {
        const ch = proj.channels.find(c => c.id === data.channel_id);
        if (!ch) return;
        ch.messages = ch.messages.filter(m => m.id !== data.id);
        if (proj.currentChannel === data.channel_id) renderMessages();
        break;
      }
      case 'typing': {
        if (data.user_id !== authUser?.id) {
          showTypingIndicator(data.display_name || '누군가');
          clearTimeout(WS._typingTimeout);
          WS._typingTimeout = setTimeout(hideTypingIndicator, 3000);
        }
        break;
      }
      case 'user_join':
      case 'user_leave': {
        // Could update online status indicators
        break;
      }
      default:
        console.log('[WS] unknown message type:', data.type);
    }
  },

  _typingTimeout: null,

  sendTyping() {
    this.send({ type: 'typing' });
  },
};

// ===== Dual-mode loadState/saveState =====

async function loadStateAndRender() {
  if (isGuestMode) {
    loadState();
    renderAll();
  } else {
    await loadStateFromServer();
    if (state.projects.length && state.currentProject) {
      const proj = getProject();
      if (proj && proj.currentChannel) {
        const msgs = await loadChannelMessages(proj.currentChannel);
        const ch = proj.channels.find(c => c.id === proj.currentChannel);
        if (ch) ch.messages = msgs;
        // Connect WebSocket to current channel
        WS.connect(proj.currentChannel);
      }
    }
    renderAll();
  }
}

function init() {
  loadTheme();

  const savedMode = localStorage.getItem(AUTH_MODE_KEY);
  const savedToken = localStorage.getItem(AUTH_TOKEN_KEY);
  const savedUser = localStorage.getItem(AUTH_USER_KEY);

  if (savedMode === 'guest') {
    isGuestMode = true;
    authUser = null;
    enterApp();
  } else if (savedToken && savedUser) {
    authUser = JSON.parse(savedUser);
    isGuestMode = false;
    API.me().then(res => {
      if (res.ok) {
        const me = res.data || res;
        authUser = me.user;
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify(me.user));
        enterApp();
      } else {
        handleLogout();
      }
    });
  } else {
    $('app').classList.add('hidden');
    $('auth-screen').classList.remove('hidden');
  }

  // Message input
  const msgInput = $('msg-input');
  msgInput.addEventListener('keydown', (e) => {
    if (handleMentionKeydown(e)) return;
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(msgInput.value);
      msgInput.value = '';
      autoResize(msgInput);
    }
  });
  let typingThrottle = 0;
  msgInput.addEventListener('input', () => {
    autoResize(msgInput);
    handleMentionInput(msgInput);
    // Send typing indicator via WebSocket (throttled)
    const now = Date.now();
    if (now - typingThrottle > 2000) {
      typingThrottle = now;
      WS.sendTyping();
    }
  });

  // Send button
  $('btn-send').addEventListener('click', () => {
    sendMessage(msgInput.value);
    msgInput.value = '';
    autoResize(msgInput);
  });

  // File attachment
  $('btn-attach').addEventListener('click', () => $('file-input').click());
  $('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      processImage(file, (dataUrl) => {
        sendMessage(msgInput.value, dataUrl);
        msgInput.value = '';
        autoResize(msgInput);
      });
    }
    e.target.value = '';
  });

  // Image drag & drop on chat area
  const chatView = $('chat-view');
  chatView.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    chatView.style.outline = '2px dashed var(--accent)';
  });
  chatView.addEventListener('dragleave', () => {
    chatView.style.outline = '';
  });
  chatView.addEventListener('drop', (e) => {
    e.preventDefault();
    chatView.style.outline = '';
    const files = e.dataTransfer.files;
    if (files.length && files[0].type.startsWith('image/')) {
      processImage(files[0], (dataUrl) => {
        sendMessage(msgInput.value, dataUrl);
        msgInput.value = '';
        autoResize(msgInput);
      });
    }
  });

  // Channel add
  $('btn-add-channel').addEventListener('click', addChannel);

  // Member add
  $('btn-add-member').addEventListener('click', showAddMemberModal);

  // Project switcher
  $('project-select').addEventListener('change', async (e) => {
    state.currentProject = e.target.value;
    saveState();
    if (!isGuestMode) {
      const proj = getProject();
      if (proj && proj.currentChannel) {
        const ch = proj.channels.find(c => c.id === proj.currentChannel);
        if (ch && !ch.messages.length) {
          const msgs = await loadChannelMessages(proj.currentChannel);
          ch.messages = msgs;
        }
      }
    }
    renderAll();
  });

  // New project
  $('btn-new-project').addEventListener('click', () => {
    showModal('새 프로젝트', `
      <div class="settings-field"><label>이름</label><input id="new-proj-name" placeholder="프로젝트 이름"></div>
      <div class="settings-field"><label>설명</label><input id="new-proj-desc" placeholder="설명"></div>
      <div class="settings-field"><label>색상</label><input id="new-proj-color" type="color" value="#6366f1"></div>
    `, () => {
      const name = $('new-proj-name').value.trim();
      if (!name) { toast('이름 입력', 'error'); return; }
      createProject(name, $('new-proj-desc').value.trim(), $('new-proj-color').value);
      renderAll();
      closeModal();
      toast('프로젝트 생성됨', 'success');
    });
  });

  // Sidebar buttons
  $('btn-tasks-view').addEventListener('click', () => { switchView('tasks'); closeSidebar(); });
  $('btn-control-view').addEventListener('click', () => { switchView('control'); closeSidebar(); });
  $('btn-chat-view').addEventListener('click', () => { switchView('chat'); closeSidebar(); });
  $('btn-settings-view').addEventListener('click', () => { switchView('settings'); closeSidebar(); });

  // Header buttons
  $('btn-search').addEventListener('click', () => {
    if (currentView === 'chat') openInlineSearch();
    else openSearch();
  });
  $('btn-toggle-theme').addEventListener('click', toggleTheme);
  $('btn-toggle-panel').addEventListener('click', () => {
    $('right-panel').classList.toggle('hidden');
  });
  $('btn-hamburger').addEventListener('click', openSidebar);
  $('sidebar-backdrop').addEventListener('click', closeSidebar);

  // Close panel
  $('btn-close-panel').addEventListener('click', () => {
    $('right-panel').classList.add('hidden');
  });

  // Global search overlay
  $('search-input').addEventListener('input', (e) => performSearch(e.target.value));
  $('search-overlay').addEventListener('click', (e) => {
    if (e.target === $('search-overlay')) closeSearch();
  });

  // Inline chat search
  const inlineSearchInput = $('inline-search-input');
  let inlineSearchTimer = null;
  inlineSearchInput.addEventListener('input', () => {
    clearTimeout(inlineSearchTimer);
    inlineSearchTimer = setTimeout(() => performInlineSearch(inlineSearchInput.value), 150);
  });
  inlineSearchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (e.shiftKey) navigateInlineSearch('prev');
      else navigateInlineSearch('next');
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      closeInlineSearch();
    }
  });
  $('btn-search-next').addEventListener('click', () => navigateInlineSearch('next'));
  $('btn-search-prev').addEventListener('click', () => navigateInlineSearch('prev'));
  $('btn-search-close').addEventListener('click', closeInlineSearch);

  // Modal close
  $('modal-close').addEventListener('click', closeModal);
  $('modal-overlay').addEventListener('click', (e) => {
    if (e.target === $('modal-overlay')) closeModal();
  });

  // Emoji picker close on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.emoji-picker') && !e.target.closest('.add-reaction-btn') && !e.target.closest('.msg-action-btn')) {
      $('emoji-picker').classList.remove('show');
    }
  });

  // Image preview close
  $('img-preview').addEventListener('click', () => {
    $('img-preview').classList.remove('show');
  });

  // Task filter buttons
  $('task-filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.task-filter-btn');
    if (!btn) return;
    currentTaskFilter = btn.dataset.filter;
    $$('.task-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderTaskView();
  });

  // Task search
  $('task-search').addEventListener('input', () => renderTaskView());

  // Milestone filter
  $('milestone-filter').addEventListener('change', (e) => {
    currentMilestoneFilter = e.target.value;
    renderTaskView();
  });

  // Add task buttons
  $('btn-add-task-main').addEventListener('click', () => showAddTaskModal('todo'));
  document.querySelectorAll('.add-task-btn').forEach(btn => {
    btn.addEventListener('click', () => showAddTaskModal(btn.dataset.status));
  });

  // Mobile tabs
  $$('.mobile-tab').forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
  });

  // Global keyboard shortcuts
  document.addEventListener('keydown', handleGlobalKeydown);

  // CSS blink animation for streaming cursor
  const style = document.createElement('style');
  style.textContent = '@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }';
  document.head.appendChild(style);
}

// ================================================================
// CONTROL TOWER (관제탑) — v3 Two-Column Layout
// ================================================================

let ctrlCurrentTab = 'activity';
let ctrlGateways = []; // Cached gateway data from API
let ctrlSelectedGw = null;    // Currently selected gateway for detail panel
let ctrlDetailTab = 'overview'; // Detail panel active tab
let ctrlAutoPolling = true;
let ctrlPollTimer = null;
let ctrlSidePanelCollapsed = false;
let ctrlGwAgentsExpanded = {}; // Track expanded agent lists per gateway

// Agent metadata (for display, not from API)
const AGENT_META = {
  renover: { emoji: '😇', role: 'Frontend', color: 'var(--agent-lenovo)' },
  laika:   { emoji: '🐕', role: 'PM', color: 'var(--agent-laika)' },
  xiaomi:  { emoji: '🤖', role: 'Backend', color: 'var(--agent-xiaomi)' },
};

function renderControlTower() {
  fetchGateways();
  initCtrlAutoPolling();
}

// -- Toast notification --
function ctrlToast(msg, type) {
  type = type || 'info';
  var container = $('ctrl-toast-container');
  if (!container) return;
  var el = document.createElement('div');
  el.className = 'ctrl-toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// -- Auto polling --
function initCtrlAutoPolling() {
  var cb = $('ctrl-auto-poll-cb');
  if (!cb) return;
  cb.checked = ctrlAutoPolling;
  cb.onchange = function() {
    ctrlAutoPolling = cb.checked;
    if (ctrlAutoPolling) { startCtrlPolling(); } else { stopCtrlPolling(); }
  };
  if (ctrlAutoPolling) startCtrlPolling();
}
function startCtrlPolling() { stopCtrlPolling(); ctrlPollTimer = setInterval(fetchGateways, 30000); }
function stopCtrlPolling() { if (ctrlPollTimer) { clearInterval(ctrlPollTimer); ctrlPollTimer = null; } }

// -- Derive 4-level status --
function getGwStatus(gw) {
  if (!gw.health) return 'disconnected';
  var hs = (gw.health.status || '').toLowerCase();
  if (hs === 'connected' || hs === 'online' || gw.health.online === true) return 'online';
  if (hs === 'pairing-required' || hs === 'pairing') return 'pairing';
  if (hs === 'error') return 'error';
  if (hs === 'disconnected' || hs === 'offline') return 'disconnected';
  return gw.health.online ? 'online' : 'disconnected';
}
function getGwStatusText(s) { return { online: '연결됨', pairing: '페어링 필요', error: '오류', disconnected: '오프라인' }[s] || '알 수 없음'; }
function getGwStatusBadgeClass(s) { return { online: 'success', pairing: 'info', error: 'danger', disconnected: 'default' }[s] || 'default'; }

function renderLatencyBadge(gw) {
  var ms = gw.health && gw.health.latencyMs;
  if (ms == null || ms === undefined) return '';
  var cls = ms < 100 ? 'green' : ms < 500 ? 'yellow' : 'red';
  return '<span class="ctrl-latency ' + cls + '">⏱ ' + ms + 'ms</span>';
}

function renderCapBadges(gw) {
  var caps = (gw.health && gw.health.capabilities) || {};
  var items = [
    { key: 'chat', label: '\ud83d\udcac' },
    { key: 'streaming', label: '\ud83d\udce1' },
    { key: 'tools', label: '\ud83d\udd27' },
    { key: 'sessions', label: '\ud83d\udcbb' },
    { key: 'models', label: '\ud83e\udde0' },
  ];
  return items.map(function(i) {
    var on = !!caps[i.key];
    return '<span class="ctrl-cap-badge ' + (on ? 'on' : 'off') + '" title="' + i.key + '">' + i.label + '</span>';
  }).join('');
}

// -- Fetch gateways & render all --
async function fetchGateways() {
  try {
    var resp = await fetch('/api/gateways/');
    var data = await resp.json();
    if (data.ok) {
      ctrlGateways = data.data || [];
      renderTopBarStats();
      renderSideList();
      renderDetailView();
      updateLastCheck();
    }
  } catch (e) {
    console.error('[ControlTower] Failed to fetch gateways:', e);
  }
}

function updateLastCheck() {
  var el = $('ctrl-last-check');
  if (el) el.textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// -- TopBar Stats --
function renderTopBarStats() {
  var el = $('ctrl-topbar-stats');
  if (!el) return;
  var counts = { online: 0, pairing: 0, error: 0, disconnected: 0 };
  ctrlGateways.forEach(function(gw) { var s = getGwStatus(gw); if (counts[s] !== undefined) counts[s]++; });
  var totalAgents = ctrlGateways.length;
  var pills = [];
  if (counts.online) pills.push('<span class="ctrl-stat-pill st-online"><span class="dot-sm"></span>' + counts.online + ' 연결</span>');
  if (counts.error) pills.push('<span class="ctrl-stat-pill st-error"><span class="dot-sm"></span>' + counts.error + ' 오류</span>');
  if (counts.pairing) pills.push('<span class="ctrl-stat-pill st-pairing"><span class="dot-sm"></span>' + counts.pairing + ' 페어링</span>');
  if (counts.disconnected) pills.push('<span class="ctrl-stat-pill st-disconnected"><span class="dot-sm"></span>' + counts.disconnected + ' 오프라인</span>');
  pills.push('<span class="ctrl-badge-sm default">' + totalAgents + ' gateways</span>');
  el.innerHTML = pills.join('');
}

// -- Side Panel: Gateway List --
function renderSideList() {
  var list = $('ctrl-side-list');
  var countEl = $('ctrl-gw-count');
  if (countEl) countEl.textContent = '(' + ctrlGateways.length + ')';
  if (!list) return;

  if (ctrlGateways.length === 0) {
    list.innerHTML = '<div style="padding:24px;color:var(--text-muted);font-size:13px;text-align:center;">' +
      '<div style="font-size:36px;margin-bottom:10px;opacity:0.3;">📡</div>' +
      '등록된 Gateway가 없습니다<br><span style="font-size:11px;">+ Gateway 버튼으로 추가하세요</span></div>';
    return;
  }

  list.innerHTML = ctrlGateways.map(function(gw) {
    var meta = AGENT_META[gw.name.toLowerCase()] || { emoji: '🖥️', role: '', color: 'var(--accent)' };
    var status = getGwStatus(gw);
    var statusText = getGwStatusText(status);
    var badgeCls = getGwStatusBadgeClass(status);
    var latencyMs = gw.health && gw.health.latencyMs;
    var latencyStr = latencyMs != null ? latencyMs + 'ms' : '—';
    var selected = ctrlSelectedGw && ctrlSelectedGw.id === gw.id ? ' selected' : '';
    var borderCls = status === 'online' ? ' border-success' : status === 'error' ? ' border-danger' : status === 'pairing' ? ' border-info' : '';
    var expanded = ctrlGwAgentsExpanded[gw.id];
    var agentCount = (gw.health && gw.health.agentCount) || 0;

    var agentListHtml = '';
    if (expanded && gw.health && gw.health.agents && gw.health.agents.length) {
      agentListHtml = '<div class="ctrl-gw-agent-list">' + gw.health.agents.map(function(a) {
        return '<div class="ctrl-gw-agent-item"><span>' + (a.emoji || '🤖') + '</span><span style="font-weight:500;">' + escapeHtml(a.name || a.id) + '</span><span class="agent-id">' + (a.id || '').slice(0, 8) + '</span></div>';
      }).join('') + '</div>';
    }

    return '<div class="ctrl-gw-card' + selected + borderCls + '" onclick="ctrlSelectGw(\'' + gw.id + '\')" ondblclick="ctrlHealthCheck(\'' + gw.id + '\')">' +
      '<div class="ctrl-gw-card-head">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">' +
            '<span class="ctrl-gw-name">' + meta.emoji + ' ' + escapeHtml(gw.name) + '</span>' +
            '<span class="ctrl-badge-sm ' + badgeCls + '">' + statusText + '</span>' +
          '</div>' +
          '<div class="ctrl-gw-url">' + escapeHtml(gw.url) + '</div>' +
        '</div>' +
        '<button class="ctrl-topbar-btn ghost" onclick="event.stopPropagation();ctrlHealthCheck(\'' + gw.id + '\')" title="Health Check" style="padding:4px;">↻</button>' +
      '</div>' +
      '<div class="ctrl-gw-metrics">' +
        '<span>⏱ ' + latencyStr + '</span>' +
        '<span>🤖 ' + agentCount + ' agents</span>' +
        '<div class="ctrl-cap-row" style="margin-top:0;">' + renderCapBadges(gw) + '</div>' +
      '</div>' +
      (agentCount > 0 ? '<button class="ctrl-gw-agents-toggle" onclick="event.stopPropagation();ctrlToggleAgents(\'' + gw.id + '\')">' + (expanded ? '▾' : '▸') + ' agents (' + agentCount + ')</button>' : '') +
      agentListHtml +
    '</div>';
  }).join('');
}

function ctrlToggleAgents(gwId) {
  ctrlGwAgentsExpanded[gwId] = !ctrlGwAgentsExpanded[gwId];
  renderSideList();
}

// -- Side Panel collapse/expand --
function ctrlToggleSidePanel() {
  ctrlSidePanelCollapsed = !ctrlSidePanelCollapsed;
  var panel = $('ctrl-side-panel');
  var toggle = $('ctrl-panel-toggle');
  if (ctrlSidePanelCollapsed) {
    panel.style.display = 'none';
    toggle.style.display = 'block';
    toggle.textContent = '▶';
  } else {
    panel.style.display = 'flex';
    toggle.style.display = 'none';
  }
}

// -- Mobile: toggle side panel overlay --
function ctrlMobileToggleSidePanel() {
  var panel = $('ctrl-side-panel');
  var btn = $('ctrl-mobile-toggle');
  if (!panel) return;
  var visible = panel.classList.contains('mobile-visible');
  if (visible) {
    panel.classList.remove('mobile-visible');
    if (btn) btn.textContent = '☰ Gateways';
  } else {
    panel.classList.add('mobile-visible');
    if (btn) btn.textContent = '✕ 닫기';
  }
}

// -- Select gateway -> show detail --
function ctrlSelectGw(gwId) {
  var gw = ctrlGateways.find(function(g) { return g.id === gwId; });
  if (ctrlSelectedGw && ctrlSelectedGw.id === gwId) {
    ctrlSelectedGw = null;
    ctrlDetailTab = 'overview';
  } else {
    ctrlSelectedGw = gw || null;
    ctrlDetailTab = 'overview';
    // On mobile, close side panel overlay after selection
    var panel = $('ctrl-side-panel');
    if (panel) { panel.classList.remove('mobile-visible'); var btn = $('ctrl-mobile-toggle'); if (btn) btn.textContent = '☰ Gateways'; }
  }
  renderSideList();
  renderDetailView();
}

// -- Health check --
async function ctrlHealthCheck(gwId) {
  try {
    ctrlToast('Health check 실행 중...', 'info');
    var resp = await fetch('/api/gateways/' + gwId + '/health', { method: 'POST' });
    var data = await resp.json();
    if (data.ok) {
      ctrlToast('Health check 완료', 'success');
      fetchGateways();
    } else {
      ctrlToast('Health check 실패', 'error');
    }
  } catch (e) {
    ctrlToast('Health check 오류: ' + e.message, 'error');
  }
}

// -- Detail View (right main area) --
function renderDetailView() {
  var empty = $('ctrl-detail-empty');
  var content = $('ctrl-detail-content');
  if (!ctrlSelectedGw) {
    if (empty) empty.style.display = 'flex';
    if (content) content.style.display = 'none';
    return;
  }
  if (empty) empty.style.display = 'none';
  if (content) content.style.display = 'flex';

  var gw = ctrlSelectedGw;
  var meta = AGENT_META[gw.name.toLowerCase()] || { emoji: '🖥️', role: 'Agent', color: 'var(--accent)' };
  var status = getGwStatus(gw);
  var statusText = getGwStatusText(status);
  var badgeCls = getGwStatusBadgeClass(status);

  // Header
  var headEl = $('ctrl-detail-head');
  if (headEl) {
    headEl.innerHTML = '<h4>' + meta.emoji + ' ' + escapeHtml(gw.name) +
      ' <span style="font-size:11px;font-weight:400;color:var(--text-secondary);">' + (meta.role || 'Agent') + '</span>' +
      ' <span class="ctrl-badge-sm ' + badgeCls + '" style="margin-left:6px;">' + statusText + '</span></h4>' +
      '<button class="ctrl-detail-close" onclick="ctrlSelectGw(\'' + gw.id + '\')" title="닫기">✕</button>';
  }

  // Tabs
  var tabs = [
    { id: 'overview', label: '개요' },
    { id: 'sessions', label: '세션' },
    { id: 'files', label: '파일' },
    { id: 'chat', label: '채팅' },
  ];
  var tabsEl = $('ctrl-detail-tabs-bar');
  if (tabsEl) {
    tabsEl.innerHTML = tabs.map(function(t) {
      return '<button class="ctrl-detail-tab' + (ctrlDetailTab === t.id ? ' active' : '') + '" onclick="ctrlSwitchDetailTab(\'' + t.id + '\')">' + t.label + '</button>';
    }).join('');
  }

  // Body
  renderDetailBody();
}

function ctrlSwitchDetailTab(tab) {
  ctrlDetailTab = tab;
  // Update tab bar active state
  var tabsEl = $('ctrl-detail-tabs-bar');
  if (tabsEl) {
    tabsEl.querySelectorAll('.ctrl-detail-tab').forEach(function(btn) {
      btn.classList.toggle('active', btn.textContent.trim() === { overview: '개요', sessions: '세션', files: '파일', chat: '채팅' }[tab]);
    });
  }
  renderDetailBody();
}

function renderDetailBody() {
  var body = $('ctrl-detail-body');
  if (!body || !ctrlSelectedGw) return;
  var gw = ctrlSelectedGw;

  if (ctrlDetailTab === 'overview') {
    renderDetailOverview(body, gw);
  } else if (ctrlDetailTab === 'sessions') {
    body.innerHTML = '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:24px;">로딩 중...</div>';
    loadDetailSessions(body, gw);
  } else if (ctrlDetailTab === 'files') {
    body.innerHTML = '<div style="color:var(--text-muted);font-size:12px;text-align:center;padding:24px;">로딩 중...</div>';
    loadDetailFiles(body, gw);
  } else if (ctrlDetailTab === 'chat') {
    renderDetailChat(body, gw);
  }
}

function renderDetailOverview(body, gw) {
  var meta = AGENT_META[gw.name.toLowerCase()] || { emoji: '🖥️', role: 'Agent', color: 'var(--accent)' };
  var status = getGwStatus(gw);
  var statusText = getGwStatusText(status);
  var dotColors = { online: 'var(--success)', pairing: 'var(--info)', error: 'var(--danger)', disconnected: 'var(--text-muted)' };
  var latencyMs = gw.health && gw.health.latencyMs;
  var latencyColor = latencyMs != null ? (latencyMs < 100 ? 'var(--success)' : latencyMs < 500 ? 'var(--warning)' : 'var(--danger)') : '';
  var agentCount = (gw.health && gw.health.agentCount) || 0;

  body.innerHTML = '<div class="ctrl-overview-grid">' +
    '<div class="ctrl-metric-card"><div class="ctrl-metric-label">상태</div><div class="ctrl-metric-value"><span style="width:8px;height:8px;display:inline-block;border-radius:50%;background:' + (dotColors[status] || 'var(--text-muted)') + ';"></span>' + statusText + '</div></div>' +
    '<div class="ctrl-metric-card"><div class="ctrl-metric-label">레이턴시</div><div class="ctrl-metric-value"' + (latencyColor ? ' style="color:' + latencyColor + '"' : '') + '>' + (latencyMs != null ? latencyMs + 'ms' : '—') + '</div></div>' +
    '<div class="ctrl-metric-card"><div class="ctrl-metric-label">에이전트</div><div class="ctrl-metric-value">' + agentCount + '</div></div>' +
  '</div>' +
  '<div class="ctrl-metric-card" style="margin-bottom:12px;text-align:left;">' +
    '<div class="ctrl-metric-label" style="text-align:left;margin-bottom:8px;">정보</div>' +
    '<div class="ctrl-detail-row"><span class="label">ID</span><span class="value" style="font-size:11px;color:var(--text-muted);font-family:monospace;">' + gw.id + '</span></div>' +
    '<div class="ctrl-detail-row"><span class="label">URL</span><span class="value" style="font-size:11px;">' + escapeHtml(gw.url) + '</span></div>' +
    '<div class="ctrl-detail-row"><span class="label">역할</span><span class="value">' + (meta.role || 'Agent') + '</span></div>' +
    '<div class="ctrl-detail-row"><span class="label">기능</span><span class="value"><div class="ctrl-cap-row" style="margin-top:0;">' + renderCapBadges(gw) + '</div></span></div>' +
  '</div>' +
  '<div style="display:flex;gap:8px;">' +
    '<button class="ctrl-topbar-btn primary" onclick="ctrlHealthCheck(\'' + gw.id + '\')" style="flex:1;">↻ Health Check</button>' +
  '</div>';
}

async function loadDetailSessions(body, gw) {
  try {
    var resp = await fetch('/api/gateways/' + gw.id + '/sessions');
    var data = await resp.json();
    if (!data.ok) { body.innerHTML = '<div style="color:var(--danger);font-size:12px;text-align:center;padding:16px;">세션 조회 실패</div>'; return; }
    var note = data.data && data.data.note ? data.data.note : '응답됨';
    var sessions = Array.isArray(data.data) ? data.data : ((data.data && data.data.sessions) || []);
    if (sessions.length === 0) {
      body.innerHTML = '<div class="ctrl-session-item" style="text-align:left;">' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
          '<div style="font-size:13px;font-weight:600;">' + escapeHtml(gw.name) + '</div>' +
          '<span style="margin-left:auto;font-size:11px;color:var(--success);">' + escapeHtml(note) + '</span>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">' + escapeHtml(gw.url) + '</div>' +
      '</div>';
      return;
    }
    body.innerHTML = sessions.map(function(s) {
      return '<div class="ctrl-session-item">' +
        '<div style="display:flex;align-items:center;gap:8px;">' +

async function ctrlLoadChatHistory(gwId) {

      msgs.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px;">채팅 기록이 없습니다</div>';

    }

      var time = new Date(l.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      if (isUser) {
        return '<div class="ctrl-chat-bubble user"><div><div class="bubble-content">' + escapeHtml(l.content) + '</div><div style="font-size:10px;color:var(--text-muted);text-align:right;margin-top:2px;">' + time + '</div></div></div>';
      } else {
        var meta2 = AGENT_META[(l.agent_name || '').toLowerCase()] || {};
        return '<div class="ctrl-chat-bubble agent"><div><div class="bubble-name">' + (meta2.emoji || '🤖') + ' ' + escapeHtml(l.agent_name || 'Agent') + '</div><div class="bubble-content">' + escapeHtml(l.content) + '</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px;">' + time + '</div></div></div>';

  }

// CP14: WebSocket-based streaming chat (replaces SSE fetch)
var _ctrlChatWs = {};  // {gwId: WebSocket}

function _getOrCreateChatWs(gwId) {
  if (_ctrlChatWs[gwId] && _ctrlChatWs[gwId].readyState <= 1) return _ctrlChatWs[gwId];
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var ws = new WebSocket(proto + '//' + location.host + '/ws/chat/' + gwId);
  _ctrlChatWs[gwId] = ws;
  return ws;
}

async function ctrlSendChat(gwId) {
  var input = $('ctrl-chat-input');
  var text = input ? input.value.trim() : '';
  if (!text) return;
  input.value = '';
  input.disabled = true;

  var msgs = $('ctrl-chat-msgs');
  // Add user bubble
  msgs.innerHTML += '<div class="ctrl-chat-bubble user"><div><div class="bubble-content">' + escapeHtml(text) + '</div></div></div>';

  // Add streaming bubble
  var streamId = 'ctrl-stream-' + Date.now();
  var gw = ctrlGateways.find(function(g) { return g.id === gwId; });
  var meta = gw ? (AGENT_META[gw.name.toLowerCase()] || { emoji: '🖥️' }) : { emoji: '🖥️' };
  msgs.innerHTML += '<div class="ctrl-chat-bubble agent" id="' + streamId + '"><div><div class="bubble-name">' + meta.emoji + ' ' + escapeHtml(gw ? gw.name : 'Agent') + '</div><div class="bubble-content"><span class="streaming-cursor"></span></div></div></div>';
  msgs.scrollTop = msgs.scrollHeight;

  var ws = _getOrCreateChatWs(gwId);
  var fullContent = '';

  function _send() {
    ws.send(JSON.stringify({ messages: [{ role: 'user', content: text }] }));
  }

  function _cleanup() {
    ws.onmessage = null;
    ws.onerror = null;
    input.disabled = false;
    input.focus();
    msgs.scrollTop = msgs.scrollHeight;
  }

  ws.onmessage = function(ev) {
    try {
      var data = JSON.parse(ev.data);
      var bubble = document.getElementById(streamId);
      if (data.type === 'chat.chunk') {
        fullContent += data.content;
        if (bubble) bubble.querySelector('.bubble-content').textContent = fullContent;
        msgs.scrollTop = msgs.scrollHeight;
      } else if (data.type === 'chat.done') {
        if (bubble) {
          if (data.full) bubble.querySelector('.bubble-content').textContent = data.full;
          else if (!fullContent) bubble.querySelector('.bubble-content').innerHTML = '<span style="color:var(--text-muted);">(빈 응답)</span>';
        }
        _cleanup();
      } else if (data.type === 'chat.error') {
        if (bubble) bubble.querySelector('.bubble-content').innerHTML = '<span style="color:var(--danger);">오류: ' + escapeHtml(data.error || '알 수 없음') + '</span>';
        _cleanup();
      }
    } catch (_) {}
  };

  ws.onerror = function() {
    var bubble = document.getElementById(streamId);
    if (bubble) bubble.querySelector('.bubble-content').innerHTML = '<span style="color:var(--danger);">WebSocket 연결 실패</span>';
    _cleanup();
  };

  if (ws.readyState === 1) {
    _send();
  } else if (ws.readyState === 0) {
    ws.onopen = function() { _send(); };
  } else {
    // Reconnect
    ws = _getOrCreateChatWs(gwId);
    ws.onopen = function() { _send(); };
    ws.onmessage = ws.onmessage;
    ws.onerror = ws.onerror;
  }
}

// -- Side Panel Resize Handle --
(function initCtrlResize() {
  var handle = $('ctrl-resize-handle');
  var panel = $('ctrl-side-panel');
  if (!handle || !panel) return;
  var MIN_W = 280, MAX_W = 520;
  var dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var newW = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
    panel.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Touch support
  handle.addEventListener('touchstart', function(e) {
    e.preventDefault();
    dragging = true;
    startX = e.touches[0].clientX;
    startW = panel.offsetWidth;
    handle.classList.add('dragging');
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    var newW = Math.min(MAX_W, Math.max(MIN_W, startW + (e.touches[0].clientX - startX)));
    panel.style.width = newW + 'px';
  });

  document.addEventListener('touchend', function() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
  });
})();

async function broadcastToAll() {
  const input = $('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  broadcastToChat(text, null);
}

async function broadcastToChat(text, channel) {
  const container = $('messages-container');
  try {
    const resp = await fetch('/api/gateway-broadcast', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages: [{ role: 'user', content: text }], broadcast: true })
    });
    const data = await resp.json();
    if (data.ok && data.data) {
      for (const r of data.data) {
        if (!r.ok) continue;
        const meta = AGENT_META[(r.name || '').toLowerCase()] || { emoji: '🖥️' };
        const aiMsg = {
          id: uid(), authorId: r.id, author: r.name, text: r.content,
          ts: Date.now(), isBot: true, reactions: {}, replies: [],
        };
        if (channel) {
          channel.messages.push(aiMsg);
          renderMessages();
        } else {
          container.innerHTML += `<div class="message bot"><div class="message-content"><span style="font-size:16px;">${meta.emoji}</span> <strong>${escapeHtml(r.name)}</strong>: ${escapeHtml(r.content)}</div></div>`;
          container.scrollTop = container.scrollHeight;
        }
      }
    }
  } catch(e) {
    console.error('[Broadcast]', e);
  }
}

async function wizardAutoDetect() {
  const name = $('wizard-name').value.trim();
  const url = $('wizard-url').value.trim();
  const token = $('wizard-token').value.trim();
  
  if (!name || !url) {
    alert('이름과 URL을 입력해주세요.');
    return;
  }
  
  $('wizard-step1').style.display = 'none';
  $('wizard-step2').style.display = 'block';
  $('wizard-spinner').style.display = 'block';
  $('wizard-results').style.display = 'none';
  $('wizard-actions').style.display = 'none';
  
  try {
    const resp = await fetch('/api/gateways/auto-detect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, url, token })
    });
    const data = await resp.json();
    
    $('wizard-spinner').style.display = 'none';
    
    if (data.ok) {
      const r = data.data;
      wizardDetectResult = { name, url, token, capabilities: r.capabilities || {} };
      
      const caps = r.capabilities || {};
      const capHTML = Object.entries(caps).map(([k, v]) => {
        const label = {chat:'Chat',streaming:'Stream',tools:'Tools',sessions:'Sessions',models:'Models'}[k] || k;
        return v ? '<span style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--success);color:#fff;">🟢 ' + label + '</span>' : '<span style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--bg-secondary);color:var(--text-muted);border:1px solid var(--border);">⚪ ' + label + '</span>';
      }).join(' ');
      
      const kind = r.kind || 'unknown';
      const kindEmoji = {openclaw:'☁️',hermes:'🐦','openai-compatible':'🤖',auto:'🔍'}[kind] || '🖥️';
      
      $('wizard-results').innerHTML = '<div style="text-align:center;margin-bottom:16px;">' +
        '<div style="font-size:40px;margin-bottom:8px;">✅</div>' +
        '<div style="font-size:16px;font-weight:700;color:var(--success);">연결 성공!</div>' +
        '</div>' +
        '<div style="background:var(--bg-secondary);border-radius:10px;padding:14px;margin-bottom:12px;">' +
        '<div style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">런타임</div>' +
        '<div style="font-size:15px;font-weight:600;">' + kindEmoji + ' ' + escapeHtml(kind) + '</div>' +
        '</div>' +
        '<div style="background:var(--bg-secondary);border-radius:10px;padding:14px;margin-bottom:12px;">' +
        '<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">감지된 기능</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' + capHTML + '</div>' +
        '</div>' +
        (r.models ? '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">모델 ' + r.models.length + '개 발견</div>' : '') +
        (r.version ? '<div style="font-size:12px;color:var(--text-muted);">버전: ' + escapeHtml(r.version) + '</div>' : '');
      
      $('wizard-save-btn').disabled = false;
      $('wizard-save-btn').textContent = '✅ 등록';
    } else {
      const errCode = data.error_code || 'unknown';
      const errMsg = data.error || '알 수 없는 오류';
      const errEmoji = {auth_failed:'🔒',cors_blocked:'🌐',timeout:'⏱️',unsupported_api:'❌',network_error:'📶'}[errCode] || '⚠️';
      const errDesc = {auth_failed:'인증 실패 — API Key를 확인하세요',cors_blocked:'CORS 차단 — 서버 설정을 확인하세요',timeout:'응답 시간 초과 — URL과 네트워크를 확인하세요',unsupported_api:'미지원 API — OpenClaw/Hermes 호환 엔드포인트가 아닙니다',network_error:'네트워크 오류 — 서버에 도달할 수 없습니다'}[errCode] || errMsg;
      
      $('wizard-results').innerHTML = '<div style="text-align:center;margin-bottom:16px;">' +
        '<div style="font-size:40px;margin-bottom:8px;">' + errEmoji + '</div>' +
        '<div style="font-size:16px;font-weight:700;color:var(--danger);">연결 실패</div>' +
        '</div>' +
        '<div style="background:rgba(255,59,48,0.1);border-radius:10px;padding:14px;">' +
        '<div style="font-size:14px;font-weight:600;color:var(--danger);margin-bottom:4px;">' + escapeHtml(errDesc) + '</div>' +
        '<div style="font-size:12px;color:var(--text-muted);">코드: ' + escapeHtml(errCode) + '</div>' +
        '</div>';
      
      wizardDetectResult = null;
    }
    
    $('wizard-results').style.display = 'block';
    $('wizard-actions').style.display = 'flex';
    
  } catch (e) {
    $('wizard-spinner').style.display = 'none';
    $('wizard-results').innerHTML = '<div style="text-align:center;">' +
      '<div style="font-size:40px;margin-bottom:8px;">⚠️</div>' +
      '<div style="font-size:14px;color:var(--danger);">서버 오류가 발생했습니다</div>' +
      '</div>';
    $('wizard-results').style.display = 'block';
    $('wizard-actions').style.display = 'flex';
  }
}

async function wizardSave() {
  if (!wizardDetectResult) return;
  
  try {
    const resp = await fetch('/api/gateways/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(wizardDetectResult)
    });

    if (data.ok) {

      alert('등록 실패: ' + (data.error || ''));
    }
  } catch (e) {
    alert('서버 오류: ' + e.message);
  }
}
