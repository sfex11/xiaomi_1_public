<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chatub - AI Agent Chat Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables / Theme ===== */
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #181b22;
  --bg-tertiary: #1f232c;
  --bg-hover: #282d38;
  --bg-active: #323842;
  --text-primary: #e8eaef;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.12);
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-dim: rgba(99,102,241,0.12);
  --accent-glow: rgba(99,102,241,0.25);
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --agent-laika: #f97316;
  --agent-xiaomi: #06b6d4;
  --agent-lenovo: #a78bfa;
  --ai-bg: rgba(30,41,59,0.5);
  --ai-border: rgba(51,65,85,0.4);
  --mention-bg: rgba(99,102,241,0.15);
  --mention-text: #a5b4fc;
  --glass-bg: rgba(24,27,34,0.88);
  --glass-border: rgba(255,255,255,0.06);
  --scrollbar-track: transparent;
  --scrollbar-thumb: rgba(255,255,255,0.08);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --sidebar-w: 280px;
  --panel-w: 340px;
  --header-h: 56px;
  --input-h: 60px;
  --transition: 0.2s ease;
  --transition-slow: 0.35s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg-primary: #f8fafc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f1f5f9;
  --bg-hover: #e2e8f0;
  --bg-active: #cbd5e1;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.1);
  --accent: #4f46e5;
  --accent-hover: #6366f1;
  --accent-dim: rgba(79,70,229,0.08);
  --accent-glow: rgba(79,70,229,0.15);
  --ai-bg: rgba(240,244,255,0.8);
  --ai-border: rgba(199,210,254,0.5);
  --mention-bg: rgba(79,70,229,0.1);
  --mention-text: #4338ca;
  --glass-bg: rgba(255,255,255,0.92);
  --glass-border: rgba(0,0,0,0.05);
  --scrollbar-track: transparent;
  --scrollbar-thumb: rgba(0,0,0,0.1);
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
input, textarea, select, button { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
a { color: var(--accent); text-decoration: none; }

/* ===== Layout ===== */
#app { display: flex; height: 100vh; width: 100vw; }
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--glass-border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform var(--transition-slow);
}
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#right-panel {
  width: var(--panel-w); min-width: var(--panel-w);
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-left: 1px solid var(--glass-border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform var(--transition-slow);
}
#right-panel.hidden { display: none; }

/* ===== Sidebar ===== */
.sidebar-header {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header h2 {
  font-size: 17px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent) 0%, var(--agent-lenovo) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.project-switcher {
  padding: 8px 16px; border-bottom: 1px solid var(--border);
}
.project-switcher select {
  width: 100%; padding: 7px 10px; background: var(--bg-tertiary);
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  color: var(--text-primary); outline: none; font-weight: 500;
  transition: border-color var(--transition);
}
.project-switcher select:focus { border-color: var(--accent); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-section { padding: 4px 12px; }
.nav-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  color: var(--text-muted); letter-spacing: 1px; padding: 10px 0 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-section-title button {
  font-size: 15px; color: var(--text-muted); padding: 2px 6px;
  line-height: 1; transition: all var(--transition);
  border-radius: var(--radius-sm);
}
.nav-section-title button:hover { color: var(--accent); background: var(--accent-dim); }

/* Forum Topic Style Channel Items */
.nav-item {
  display: flex; align-items: center; padding: 8px 10px; border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition); gap: 10px;
  color: var(--text-secondary); font-size: 13px; position: relative;
  margin-bottom: 2px; border: 1px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--accent-dim); color: var(--text-primary); font-weight: 600;
  border-color: var(--accent-glow);
}
.nav-item .icon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
  background: var(--bg-tertiary);
}
.nav-item.active .icon { background: var(--accent-dim); }
.nav-item .channel-info-wrap { flex: 1; min-width: 0; }
.nav-item .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-item .topic-preview {
  font-size: 11px; color: var(--text-muted); margin-top: 1px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nav-item .badge {
  background: var(--danger); color: #fff; font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center;
}
.nav-item .badge:empty { display: none; }

/* Agent section in sidebar */
.agent-section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted);
  padding: 8px 4px 4px;
}
.member-item {
  display: flex; align-items: center; padding: 6px 8px; gap: 10px;
  border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary);
  cursor: default; transition: background var(--transition);
}
.member-item:hover { background: var(--bg-hover); }
.member-avatar {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 14px;
  flex-shrink: 0; position: relative;
}
.member-avatar.agent-avatar {
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.member-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.member-role {
  font-size: 10px; color: var(--text-muted); padding: 1px 6px;
  background: var(--bg-tertiary); border-radius: 8px; white-space: nowrap;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.bot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse-dot 2s infinite; }
.status-dot.offline { background: var(--text-muted); }
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Sidebar footer */
.sidebar-footer {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.sidebar-footer button {
  flex: 1; padding: 8px; border-radius: var(--radius-sm);
  background: var(--bg-tertiary); color: var(--text-secondary);
  font-size: 12px; font-weight: 500; transition: all var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 4px;
  border: 1px solid transparent;
}
.sidebar-footer button:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }

/* ===== Main Header ===== */
.main-header {
  height: var(--header-h); padding: 0 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.main-header .hamburger {
  display: none; font-size: 20px; padding: 6px;
  color: var(--text-secondary); border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.main-header .hamburger:hover { background: var(--bg-hover); }
.main-header .channel-info { flex: 1; }
.main-header .channel-name { font-size: 15px; font-weight: 700; }
.main-header .channel-desc { font-size: 11px; color: var(--text-muted); }
.main-header .actions { display: flex; gap: 2px; }
.header-btn {
  padding: 8px; border-radius: var(--radius-sm); color: var(--text-secondary);
  font-size: 16px; transition: all var(--transition);
}
.header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.header-btn.active { color: var(--accent); }

/* ===== Messages ===== */
.messages-container {
  flex: 1; overflow-y: auto; padding: 16px 20px; display: flex;
  flex-direction: column; gap: 4px; scroll-behavior: smooth;
}
.msg-group {
  display: flex; gap: 12px; padding: 8px 12px; position: relative;
  border-radius: var(--radius-lg); transition: background 0.15s ease;
  animation: slideUp 0.25s ease;
}
.msg-group:hover { background: var(--bg-hover); }
.msg-avatar {
  width: 38px; height: 38px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 17px;
  flex-shrink: 0; margin-top: 2px; transition: transform var(--transition);
}
.msg-group:hover .msg-avatar { transform: scale(1.05); }
.msg-content { flex: 1; min-width: 0; }
.msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
.msg-author { font-weight: 700; font-size: 13px; }
.msg-time { font-size: 11px; color: var(--text-muted); }
.msg-badge-bot {
  font-size: 9px; background: var(--accent); color: #fff;
  padding: 1px 4px; border-radius: 3px; font-weight: 700;
}
/* Agent role badge */
.msg-badge-agent {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--accent-glow);
  letter-spacing: 0.3px;
}
.msg-badge-agent[data-agent="laika"] {
  background: rgba(249,115,22,0.12); color: var(--agent-laika);
  border-color: rgba(249,115,22,0.25);
}
.msg-badge-agent[data-agent="xiaomi"] {
  background: rgba(6,182,212,0.12); color: var(--agent-xiaomi);
  border-color: rgba(6,182,212,0.25);
}
.msg-badge-agent[data-agent="lenovo"] {
  background: rgba(167,139,250,0.12); color: var(--agent-lenovo);
  border-color: rgba(167,139,250,0.25);
}
.msg-body { word-wrap: break-word; overflow-wrap: break-word; }
.msg-body p { margin: 4px 0; }
.msg-body code {
  background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;
  font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 12.5px;
  border: 1px solid var(--border);
}
.msg-body pre {
  background: var(--bg-primary); border: 1px solid var(--border-strong);
  border-radius: var(--radius); padding: 14px; margin: 8px 0;
  overflow-x: auto; position: relative;
}
.msg-body pre code { background: none; padding: 0; font-size: 12.5px; display: block; border: none; }
.code-copy-btn {
  position: absolute; top: 6px; right: 6px; padding: 4px 10px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 11px; color: var(--text-secondary);
  opacity: 0; transition: all var(--transition); font-weight: 500;
}
.msg-body pre:hover .code-copy-btn { opacity: 1; }
.code-copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.msg-body blockquote {
  border-left: 3px solid var(--accent); padding: 6px 14px;
  margin: 8px 0; color: var(--text-secondary); background: var(--accent-dim);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.msg-body ul, .msg-body ol { padding-left: 24px; margin: 4px 0; }
.msg-body strong { font-weight: 700; }
.msg-body em { font-style: italic; }
.msg-body img {
  max-width: 300px; max-height: 200px; border-radius: var(--radius);
  cursor: pointer; margin: 4px 0;
}

/* AI Agent message style */
.msg-group.ai-msg {
  background: var(--ai-bg); border: 1px solid var(--ai-border);
  border-radius: var(--radius-lg); padding: 10px 14px; margin: 4px 0;
  border-left: 3px solid var(--accent);
}
.msg-group.ai-msg:hover { background: var(--ai-bg); filter: brightness(1.05); }
.msg-group.ai-msg[data-agent="laika"] { border-left-color: var(--agent-laika); }
.msg-group.ai-msg[data-agent="xiaomi"] { border-left-color: var(--agent-xiaomi); }
.msg-group.ai-msg[data-agent="lenovo"] { border-left-color: var(--agent-lenovo); }
.msg-group.ai-msg .msg-avatar {
  box-shadow: 0 0 0 2px var(--accent-glow), 0 0 12px rgba(99,102,241,0.2);
}
.msg-group.ai-msg[data-agent="laika"] .msg-avatar { box-shadow: 0 0 0 2px rgba(249,115,22,0.3), 0 0 12px rgba(249,115,22,0.15); }
.msg-group.ai-msg[data-agent="xiaomi"] .msg-avatar { box-shadow: 0 0 0 2px rgba(6,182,212,0.3), 0 0 12px rgba(6,182,212,0.15); }
.msg-group.ai-msg[data-agent="lenovo"] .msg-avatar { box-shadow: 0 0 0 2px rgba(167,139,250,0.3), 0 0 12px rgba(167,139,250,0.15); }

.ai-copy-btn {
  margin-top: 6px; padding: 4px 10px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 11px; color: var(--text-secondary); font-weight: 500;
  transition: all var(--transition);
}
.ai-copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Typing indicator */
.typing-indicator {
  padding: 8px 16px; font-size: 13px; color: var(--text-muted);
  display: none; align-items: center; gap: 8px;
}
.typing-indicator.show { display: flex; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 6px; height: 6px; background: var(--accent);
  border-radius: 50%; animation: typingBounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Message reactions */
.msg-reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.reaction-btn {
  padding: 2px 8px; border-radius: 12px; font-size: 12px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  cursor: pointer; transition: all var(--transition);
  display: flex; align-items: center; gap: 3px;
}
.reaction-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.reaction-btn.active { background: var(--accent-dim); border-color: var(--accent); }
.reaction-btn .count { font-size: 11px; color: var(--text-muted); }
.add-reaction-btn {
  padding: 2px 8px; border-radius: 12px; font-size: 12px;
  background: var(--bg-tertiary); border: 1px solid transparent;
  color: var(--text-muted); cursor: pointer; opacity: 0;
  transition: all var(--transition);
}
.msg-group:hover .add-reaction-btn { opacity: 1; }
.add-reaction-btn:hover { border-color: var(--border); color: var(--text-primary); }

/* Thread indicator */
.msg-thread-info {
  margin-top: 6px; padding: 5px 10px; border-radius: var(--radius-sm);
  background: var(--accent-dim); color: var(--accent); font-size: 12px;
  cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
  font-weight: 600; transition: all var(--transition);
  border: 1px solid transparent;
}
.msg-thread-info:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Message actions on hover */
.msg-actions {
  display: none; position: absolute; top: -10px; right: 8px;
  background: var(--bg-secondary); border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); padding: 2px; gap: 1px;
  box-shadow: var(--shadow-sm);
}
.msg-group:hover .msg-actions { display: flex; }
.msg-action-btn {
  padding: 4px 6px; border-radius: var(--radius-sm); font-size: 12px;
  color: var(--text-secondary); transition: all var(--transition);
}
.msg-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* @mention highlight */
.mention {
  background: var(--mention-bg); color: var(--mention-text);
  padding: 1px 5px; border-radius: 4px; font-weight: 600;
}

/* ===== Message Input ===== */
.input-container {
  padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.input-wrapper {
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--bg-tertiary); border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg); padding: 10px 14px;
  transition: all var(--transition);
}
.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.input-wrapper textarea {
  flex: 1; background: none; border: none; outline: none;
  resize: none; min-height: 20px; max-height: 120px;
  color: var(--text-primary); line-height: 1.4;
}
.input-actions { display: flex; gap: 4px; align-items: center; }
.input-btn {
  padding: 4px 8px; border-radius: var(--radius-sm); color: var(--text-muted);
  font-size: 16px; transition: all var(--transition);
}
.input-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.send-btn {
  padding: 8px 16px; background: var(--accent); color: #fff;
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(99,102,241,0.3);
}
.send-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(99,102,241,0.4); transform: translateY(-1px); }
.send-btn:active { transform: translateY(0); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

/* Mention autocomplete dropdown */
.mention-dropdown {
  display: none; position: absolute; bottom: 100%; left: 0; right: 0;
  background: var(--bg-secondary); border: 1px solid var(--border-strong);
  border-radius: var(--radius); box-shadow: var(--shadow);
  max-height: 200px; overflow-y: auto; margin-bottom: 4px; z-index: 100;
}
.mention-dropdown.show { display: block; }
.mention-option {
  padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: background var(--transition);
}
.mention-option:hover, .mention-option.selected { background: var(--bg-hover); }
.mention-option .avatar {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 14px;
}
.mention-option .info { flex: 1; }
.mention-option .info .name { font-weight: 600; font-size: 13px; }
.mention-option .info .role { font-size: 11px; color: var(--text-muted); }

/* ===== Right Panel ===== */
.panel-header {
  height: var(--header-h); padding: 0 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-header h3 { font-size: 14px; font-weight: 700; }
.panel-tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.panel-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 12px;
  font-weight: 600; color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
}
.panel-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
.panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.panel-content { flex: 1; overflow-y: auto; }

/* ===== Control Tower (관제탑) — v3 Two-Column Layout ===== */

/* -- TopBar -- */
.ctrl-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: rgba(0,0,0,0.35);
  border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; gap: 12px;
}
.ctrl-topbar-left { display: flex; align-items: center; gap: 10px; }
.ctrl-topbar-left .ctrl-topbar-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.ctrl-topbar-left .ctrl-topbar-icon { font-size: 18px; }
.ctrl-topbar-stats { display: flex; align-items: center; gap: 6px; margin-left: 8px; }
.ctrl-stat-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
  border: 1px solid;
}
.ctrl-stat-pill .dot-sm { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.ctrl-stat-pill.st-online { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.2); color: var(--success); }
.ctrl-stat-pill.st-pairing { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); color: var(--info); }
.ctrl-stat-pill.st-error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: var(--danger); }
.ctrl-stat-pill.st-disconnected { background: var(--bg-tertiary); border-color: var(--border); color: var(--text-muted); }
.ctrl-topbar-right { display: flex; align-items: center; gap: 6px; }
.ctrl-topbar-right .ctrl-last-check { font-size: 10px; color: var(--text-muted); margin-right: 6px; }
.ctrl-auto-poll {
  display: flex; align-items: center; gap: 4px; padding: 3px 8px;
  border-radius: 6px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: var(--text-secondary); cursor: pointer;
}
.ctrl-auto-poll input[type="checkbox"] { accent-color: var(--accent); width: 12px; height: 12px; }
.ctrl-topbar-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
  transition: all 150ms ease; cursor: pointer;
}
.ctrl-topbar-btn.ghost { background: transparent; color: var(--text-secondary); border: none; }
.ctrl-topbar-btn.ghost:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.ctrl-topbar-btn.primary { background: var(--accent); color: #fff; border: none; }
.ctrl-topbar-btn.primary:hover { background: var(--accent-hover); }
.ctrl-topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 4px; }

/* -- Side Panel (Gateway list) -- */
.ctrl-side-panel {
  display: flex; height: 100%; flex-shrink: 0;
  width: 340px; min-width: 280px; max-width: 520px;
}
.ctrl-side-content {
  display: flex; flex-direction: column; flex: 1;
  background: var(--bg-primary); border-right: 1px solid var(--border);
  overflow: hidden;
}
.ctrl-side-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 700; color: var(--text-primary);
}
.ctrl-side-header .ctrl-gw-count { font-weight: 400; color: var(--text-muted); font-size: 11px; }
.ctrl-side-list {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 6px;
}

/* -- Gateway Card (in side panel) -- */
.ctrl-gw-card {
  padding: 12px; background: var(--bg-secondary);
  border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; transition: all 150ms ease;
}
.ctrl-gw-card:hover:not(.selected) {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.15);
}
.ctrl-gw-card.selected {
  border-color: var(--accent); background: var(--accent-dim);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.ctrl-gw-card.border-success { border-color: rgba(34,197,94,0.4); }
.ctrl-gw-card.border-danger { border-color: rgba(239,68,68,0.4); }
.ctrl-gw-card.border-info { border-color: rgba(59,130,246,0.4); }
.ctrl-gw-card-head {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
}
.ctrl-gw-card-head .ctrl-gw-name {
  font-size: 12px; font-weight: 700; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ctrl-gw-card-head .ctrl-gw-url {
  font-size: 11px; color: var(--text-muted); font-family: monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px;
}
.ctrl-gw-metrics {
  display: flex; gap: 12px; font-size: 11px; color: var(--text-secondary); margin-top: 8px;
  align-items: center;
}
.ctrl-gw-metrics span { display: flex; align-items: center; gap: 3px; }
.ctrl-gw-agents-toggle {
  margin-top: 8px; padding: 0; border: none; background: none;
  font-size: 11px; color: var(--text-muted); cursor: pointer; font-family: inherit;
  transition: color 150ms ease;
}
.ctrl-gw-agents-toggle:hover { color: var(--text-primary); }
.ctrl-gw-agent-list { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
.ctrl-gw-agent-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 8px; border-radius: 6px; background: var(--bg-tertiary);
  font-size: 11px;
}
.ctrl-gw-agent-item .agent-id { margin-left: auto; font-family: monospace; font-size: 10px; color: var(--text-muted); }

/* -- Drag Resize Handle -- */
.ctrl-resize-handle {
  width: 5px; cursor: col-resize; background: transparent;
  transition: background 150ms ease; flex-shrink: 0; position: relative;
}
.ctrl-resize-handle::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); width: 3px; height: 32px;
  border-radius: 2px; background: var(--border-strong); transition: background 150ms ease;
}
.ctrl-resize-handle:hover::after, .ctrl-resize-handle.dragging::after { background: var(--accent); }
.ctrl-resize-handle:hover, .ctrl-resize-handle.dragging { background: var(--accent-dim); }

/* -- Side Panel Collapse Toggle -- */
.ctrl-panel-toggle {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-left: none; border-radius: 0 8px 8px 0; padding: 6px;
  color: var(--text-muted); cursor: pointer; margin-top: 8px;
  transition: all 150ms ease; font-size: 14px;
}
.ctrl-panel-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }

/* -- Detail View (main area) -- */
.ctrl-detail-view {
  display: flex; flex-direction: column; flex: 1; overflow: hidden;
  background: var(--bg-primary);
}
.ctrl-detail-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; color: var(--text-muted); gap: 8px;
}
.ctrl-detail-empty .empty-icon { font-size: 48px; opacity: 0.2; margin-bottom: 8px; }
.ctrl-detail-empty .empty-title { font-size: 14px; color: var(--text-secondary); }
.ctrl-detail-empty .empty-desc { font-size: 12px; }

/* -- Detail Tabs -- */
.ctrl-detail-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg-primary); flex-shrink: 0;
}
.ctrl-detail-tab {
  flex: 1; padding: 8px; font-size: 12px; font-weight: 600; text-align: center;
  color: var(--text-muted); border: none; background: none; cursor: pointer;
  transition: all 150ms ease; display: flex; align-items: center; justify-content: center; gap: 4px;
  position: relative;
}
.ctrl-detail-tab:hover { color: var(--text-secondary); }
.ctrl-detail-tab.active { color: var(--accent); font-weight: 700; }
.ctrl-detail-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px; background: var(--accent);
}
.ctrl-detail-tab .tab-count {
  background: var(--accent-dim); color: var(--accent); font-size: 10px;
  padding: 0 6px; border-radius: 99px; margin-left: 2px;
}
.ctrl-detail-body { flex: 1; overflow-y: auto; padding: 20px; }
.ctrl-detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ctrl-detail-header h4 { font-size: 14px; font-weight: 700; margin: 0; }
.ctrl-detail-close {
  width: 28px; height: 28px; border-radius: 6px; display: flex;
  align-items: center; justify-content: center; font-size: 16px;
  color: var(--text-muted); transition: all 150ms ease; cursor: pointer;
}
.ctrl-detail-close:hover { background: var(--bg-hover); color: var(--text-primary); }

/* -- Detail: Overview metrics grid -- */
.ctrl-overview-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;
}
.ctrl-metric-card {
  background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 12px; text-align: center;
  border: 1px solid var(--border);
}
.ctrl-metric-label {
  font-size: 10px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 6px;
}
.ctrl-metric-value {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  font-size: 13px; font-weight: 700; color: var(--text-primary);
}
.ctrl-detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; font-size: 12px; border-bottom: 1px solid var(--border);
}
.ctrl-detail-row:last-child { border-bottom: none; }
.ctrl-detail-row .label { color: var(--text-secondary); }
.ctrl-detail-row .value { font-weight: 600; }

/* -- Detail: Split Panel (Sessions / Agents) -- */
.ctrl-split-panel { display: flex; flex: 1; overflow: hidden; margin: -20px; }
.ctrl-split-left {
  width: 280px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.ctrl-split-left-header {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 700; display: flex; justify-content: space-between; align-items: center;
}
.ctrl-split-left-list {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.ctrl-split-item {
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  border: 1px solid transparent; transition: all 150ms ease; font-size: 12px;
}
.ctrl-split-item:hover { background: var(--bg-hover); }
.ctrl-split-item.active { background: var(--accent-dim); border-color: var(--accent); }
.ctrl-split-right { flex: 1; overflow-y: auto; padding: 16px; }

/* -- Chat Interface -- */
.ctrl-chat-container { display: flex; flex-direction: column; height: 100%; margin: -20px; }
.ctrl-chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ctrl-chat-messages {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.ctrl-chat-bubble { display: flex; max-width: 85%; font-size: 13px; }
.ctrl-chat-bubble.user { align-self: flex-end; }
.ctrl-chat-bubble.agent { align-self: flex-start; }
.ctrl-chat-bubble .bubble-name { font-size: 11px; font-weight: 600; color: var(--warning); margin-bottom: 3px; }
.ctrl-chat-bubble .bubble-content {
  padding: 10px 12px; border-radius: 8px; line-height: 1.5;
}
.ctrl-chat-bubble.user .bubble-content { background: var(--accent); color: #fff; }
.ctrl-chat-bubble.agent .bubble-content { background: var(--bg-tertiary); color: var(--text-secondary); }
.ctrl-chat-bubble .streaming-cursor {
  display: inline-block; width: 6px; height: 14px; background: var(--warning);
  margin-left: 3px; border-radius: 2px; animation: ctrl-pulse 1s infinite; vertical-align: text-bottom;
}
@keyframes ctrl-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.ctrl-chat-input {
  padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0;
}
.ctrl-chat-input input {
  flex: 1; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-primary); font-size: 13px;
}
.ctrl-chat-input input::placeholder { color: var(--text-muted); }
.ctrl-chat-input input:focus { outline: none; border-color: transparent; box-shadow: 0 0 0 2px var(--accent); }
.ctrl-chat-input button {
  padding: 8px 16px; background: var(--accent); color: #fff; border: none;
  border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 150ms ease;
}
.ctrl-chat-input button:hover { background: var(--accent-hover); }
.ctrl-chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }

/* -- Badges (reusable) -- */
.ctrl-badge-sm {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 1px 6px; border-radius: 99px; font-weight: 600; font-size: 10px; white-space: nowrap;
}
.ctrl-badge-sm.success { background: rgba(34,197,94,0.15); color: var(--success); }
.ctrl-badge-sm.danger { background: rgba(239,68,68,0.15); color: var(--danger); }
.ctrl-badge-sm.info { background: rgba(59,130,246,0.15); color: var(--info); }
.ctrl-badge-sm.warning { background: rgba(245,158,11,0.15); color: var(--warning); }
.ctrl-badge-sm.default { background: var(--bg-tertiary); color: var(--text-secondary); }

.ctrl-cap-badge {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 600; line-height: 1.4;
}
.ctrl-cap-badge.on { background: rgba(52,199,89,0.15); color: var(--success); }
.ctrl-cap-badge.off { background: var(--bg-secondary); color: var(--text-muted); opacity: 0.5; }
.ctrl-cap-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }

/* -- Latency Badge -- */
.ctrl-latency {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; padding: 1px 6px;
  border-radius: 8px; white-space: nowrap;
}
.ctrl-latency.green { background: rgba(34,197,94,0.15); color: var(--success); }
.ctrl-latency.yellow { background: rgba(245,158,11,0.15); color: var(--warning); }
.ctrl-latency.red { background: rgba(239,68,68,0.15); color: var(--danger); }

/* -- Toast Notification -- */
.ctrl-toast-container {
  position: fixed; top: 16px; right: 16px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.ctrl-toast {
  padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  background: var(--bg-secondary); border: 1px solid var(--border);
  color: var(--text-primary); box-shadow: var(--shadow);
  pointer-events: auto; animation: ctrl-toast-in 0.3s ease;
}
.ctrl-toast.success { border-color: rgba(34,197,94,0.3); }
.ctrl-toast.error { border-color: rgba(239,68,68,0.3); }
.ctrl-toast.info { border-color: rgba(59,130,246,0.3); }
@keyframes ctrl-toast-in { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

/* -- Legacy compat (activity, tools, sessions, tokens, chart, badges) -- */
.ctrl-agent-avatar {
  width: 44px; height: 44px; border-radius: 12px; display: flex;
  align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
}
.ctrl-activity-item {
  display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start;
}
.ctrl-activity-item:last-child { border-bottom: none; }
.ctrl-activity-text { flex: 1; }
.ctrl-activity-title { font-size: 13px; font-weight: 600; }
.ctrl-activity-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.ctrl-tool-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: var(--bg-tertiary); border-radius: var(--radius-sm); margin-bottom: 6px;
  border: 1px solid var(--border); font-size: 12px;
}
.ctrl-tool-icon { font-size: 16px; }
.ctrl-tool-name { flex: 1; font-weight: 600; }
.ctrl-tool-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.ctrl-tool-status.success { background: rgba(34,197,94,0.15); color: var(--success); }
.ctrl-tool-status.running { background: rgba(59,130,246,0.15); color: var(--info); }
.ctrl-tool-status.error { background: rgba(239,68,68,0.15); color: var(--danger); }
.ctrl-token-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.ctrl-token-row:last-child { border-bottom: none; }
.ctrl-token-label { color: var(--text-secondary); }
.ctrl-token-value { font-weight: 700; }
.ctrl-token-value.good { color: var(--success); }
.ctrl-token-value.warn { color: var(--warning); }
.ctrl-chart-bar { display: flex; align-items: flex-end; gap: 4px; height: 80px; padding-top: 8px; }
.ctrl-chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ctrl-chart-bar-inner {
  width: 100%; border-radius: 4px 4px 0 0; background: linear-gradient(180deg, var(--accent), var(--agent-lenovo));
  opacity: 0.8; transition: height 0.5s ease; min-height: 4px;
}
.ctrl-chart-label { font-size: 10px; color: var(--text-muted); }
.ctrl-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: 20px; font-size: 12px; cursor: default;
}
.ctrl-session-item {
  padding: 10px 12px; background: var(--bg-tertiary); border-radius: var(--radius-sm);
  border: 1px solid var(--border); margin-bottom: 8px;
}
.ctrl-session-route { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* -- Mobile responsive -- */
.ctrl-mobile-toggle { display: none; }
@media (max-width: 768px) {
  .ctrl-side-panel { display: none !important; }
  .ctrl-side-panel.mobile-visible { display: flex !important; width: 100% !important; max-width: 100% !important; min-width: 0 !important; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; background: var(--bg-primary); }
  .ctrl-resize-handle { display: none !important; }
  .ctrl-panel-toggle { display: none !important; }
  .ctrl-mobile-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; background: transparent; color: var(--text-secondary); border: none; cursor: pointer; }
  .ctrl-mobile-toggle:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .ctrl-topbar { flex-wrap: wrap; padding: 6px 10px; }
  .ctrl-topbar-stats { display: none; }
  .ctrl-topbar-right .ctrl-last-check { display: none; }
  .ctrl-overview-grid { grid-template-columns: 1fr; }
  .ctrl-split-panel { flex-direction: column; }
  .ctrl-split-left { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 200px; }
}

/* ===== Thread Panel ===== */
.thread-panel { display: flex; flex-direction: column; height: 100%; }
.thread-original {
  padding: 16px; border-bottom: 1px solid var(--border);
  background: var(--bg-tertiary);
}
.thread-messages { flex: 1; overflow-y: auto; padding: 16px; }
.thread-input { padding: 12px 16px; border-top: 1px solid var(--border); }

/* ===== Task Board ===== */
.task-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.task-stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-card {
  padding: 10px 14px; background: var(--bg-tertiary); border-radius: var(--radius);
  text-align: center; flex: 1; min-width: 60px;
  border: 1px solid var(--border);
}
.stat-card .num { font-size: 18px; font-weight: 800; }
.stat-card .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.progress-bar {
  height: 6px; background: var(--bg-tertiary); border-radius: 3px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.4s ease;
}
.task-filters {
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.task-filter-btn {
  padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 500;
  background: var(--bg-tertiary); color: var(--text-secondary);
  transition: all var(--transition); border: 1px solid transparent;
}
.task-filter-btn:hover { background: var(--bg-hover); border-color: var(--border); }
.task-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.task-search-input {
  padding: 5px 10px; background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary); outline: none;
  font-size: 12px; flex: 1; min-width: 80px;
  transition: border-color var(--transition);
}
.task-search-input:focus { border-color: var(--accent); }
.kanban { display: flex; gap: 10px; padding: 12px; flex: 1; overflow-x: auto; }
.kanban-col {
  flex: 1; min-width: 140px; display: flex; flex-direction: column;
  background: var(--bg-primary); border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--border);
}
.kanban-col-header {
  padding: 10px 12px; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  display: flex; align-items: center; justify-content: space-between;
}
.kanban-col-header .col-count {
  background: var(--bg-tertiary); padding: 1px 6px;
  border-radius: 8px; font-size: 10px; color: var(--text-muted);
}
.kanban-col-body {
  flex: 1; padding: 6px 8px; overflow-y: auto;
  min-height: 100px;
}
.kanban-col-body.drag-over { background: var(--accent-dim); }
.task-card {
  padding: 12px; background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 6px; cursor: grab;
  transition: all var(--transition); user-select: none;
}
.task-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.task-card.dragging { opacity: 0.5; transform: rotate(2deg); box-shadow: var(--shadow); }
.task-card .task-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.task-card .task-desc {
  font-size: 11px; color: var(--text-muted); margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.task-card .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.task-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  font-weight: 600;
}
.task-deadline {
  font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 2px;
}
.task-deadline.overdue { color: var(--danger); }
.add-task-btn {
  width: 100%; padding: 8px; color: var(--text-muted); font-size: 12px;
  text-align: center; border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.add-task-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ===== Search Overlay ===== */
.search-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 1000; align-items: flex-start; justify-content: center;
  padding-top: 12vh; backdrop-filter: blur(4px);
}
.search-overlay.show { display: flex; }
.search-box {
  width: 90%; max-width: 520px; background: var(--bg-secondary);
  border: 1px solid var(--border-strong); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg); overflow: hidden;
}
.search-box input {
  width: 100%; padding: 18px 22px; background: none; border: none;
  outline: none; font-size: 16px; color: var(--text-primary);
  border-bottom: 1px solid var(--border); font-weight: 500;
}
.search-results { max-height: 400px; overflow-y: auto; }
.search-result-item {
  padding: 14px 22px; cursor: pointer; transition: background var(--transition);
  border-bottom: 1px solid var(--border);
}
.search-result-item:hover { background: var(--bg-hover); }
.search-result-item .result-channel { font-size: 11px; color: var(--accent); font-weight: 600; }
.search-result-item .result-text { font-size: 13px; margin-top: 2px; }
.search-result-item .result-author { font-size: 11px; color: var(--text-muted); }

/* ===== Settings Panel ===== */
.settings-view { padding: 24px; overflow-y: auto; }
.settings-section { margin-bottom: 28px; }
.settings-section h3 {
  font-size: 14px; font-weight: 700; margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.settings-field { margin-bottom: 12px; }
.settings-field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 4px;
}
.settings-field input, .settings-field textarea, .settings-field select {
  width: 100%; padding: 9px 12px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); outline: none;
  transition: border-color var(--transition);
}
.settings-field textarea { min-height: 80px; resize: vertical; }
.settings-field input:focus, .settings-field textarea:focus, .settings-field select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim);
}
.btn {
  padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px;
  font-weight: 600; transition: all var(--transition); display: inline-flex;
  align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-secondary { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ===== Modals ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 999; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-secondary); border: 1px solid var(--border-strong);
  border-radius: var(--radius-xl); width: 90%; max-width: 460px;
  box-shadow: var(--shadow-lg); animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { transform: scale(0.95) translateY(10px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.modal-header {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  font-size: 20px; color: var(--text-muted); padding: 4px;
  transition: color var(--transition);
}
.modal-close:hover { color: var(--text-primary); }
.modal-body { padding: 22px; }
.modal-footer {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* ===== Emoji Picker ===== */
.emoji-picker {
  display: none; position: absolute; background: var(--bg-secondary);
  border: 1px solid var(--border-strong); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 10px; z-index: 200;
  width: 240px;
}
.emoji-picker.show { display: block; }
.emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
.emoji-grid button {
  padding: 6px; font-size: 18px; border-radius: var(--radius-sm);
  text-align: center; transition: all var(--transition);
}
.emoji-grid button:hover { background: var(--bg-hover); transform: scale(1.15); }

/* ===== Toast ===== */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow); animation: toastIn 0.3s ease;
  display: flex; align-items: center; gap: 8px; max-width: 340px;
  backdrop-filter: blur(8px);
}
@keyframes toastIn {
  from { transform: translateX(100%) scale(0.9); opacity: 0; }
  to { transform: translateX(0) scale(1); opacity: 1; }
}
.toast.success { background: rgba(6,95,70,0.95); color: #d1fae5; }
.toast.error { background: rgba(153,27,27,0.95); color: #fecaca; }
.toast.info { background: rgba(30,58,95,0.95); color: #bfdbfe; }

/* ===== Image preview ===== */
.img-preview-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 3000; align-items: center; justify-content: center; cursor: pointer;
  backdrop-filter: blur(8px);
}
.img-preview-overlay.show { display: flex; }
.img-preview-overlay img { max-width: 90%; max-height: 90%; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }

/* ===== Animations ===== */
@keyframes slideUp {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== Mobile ===== */
.mobile-tabs {
  display: none; height: 56px; background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.mobile-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; color: var(--text-muted);
  font-size: 10px; font-weight: 500; transition: color var(--transition);
  position: relative;
}
.mobile-tab.active { color: var(--accent); }
.mobile-tab.active::after {
  content: ''; position: absolute; top: 0; left: 25%; right: 25%;
  height: 2px; background: var(--accent); border-radius: 1px;
}
.mobile-tab .tab-icon { font-size: 20px; }

@media (max-width: 768px) {
  #sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 500;
    transform: translateX(-100%);
    width: 85vw; min-width: 85vw; max-width: 320px;
  }
  #sidebar.open { transform: translateX(0); }
  .sidebar-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 499; backdrop-filter: blur(2px);
  }
  #sidebar.open ~ .sidebar-backdrop { display: block; }
  .main-header .hamburger { display: block; }
  #right-panel {
    position: fixed; top: 0; right: 0; bottom: 56px; z-index: 500;
    width: 100%; min-width: 100%;
  }
  #right-panel.hidden { display: none; }
  .mobile-tabs {
    display: flex;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
  }
  #main { padding-bottom: 56px; }
  #app { height: 100vh; }
  :root { --sidebar-w: 280px; }
  .input-container {
    padding: 8px 12px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  }
  .nav-item { padding: 10px 10px; min-height: 44px; }
  .send-btn { padding: 10px 16px; }
  .header-btn { padding: 10px; font-size: 18px; }
  .msg-group { padding: 6px 8px; }
  .messages-container { padding: 12px; }
}

/* ===== Bot management ===== */
.bot-card {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: var(--bg-tertiary); border-radius: var(--radius);
  margin-bottom: 8px; border: 1px solid var(--border);
  transition: border-color var(--transition);
}
.bot-card:hover { border-color: var(--border-strong); }
.bot-card .bot-avatar { font-size: 24px; }
.bot-card .bot-info { flex: 1; }
.bot-card .bot-name { font-weight: 700; font-size: 14px; }
.bot-card .bot-role { font-size: 12px; color: var(--text-muted); }
.toggle-switch {
  width: 36px; height: 20px; background: var(--bg-hover);
  border-radius: 10px; position: relative; cursor: pointer;
  transition: background var(--transition);
}
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after {
  content: ''; position: absolute; width: 16px; height: 16px;
  background: #fff; border-radius: 50%; top: 2px; left: 2px;
  transition: transform var(--transition);
}
.toggle-switch.on::after { transform: translateX(16px); }

/* Milestone tag colors */
.milestone-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 8px;
  font-weight: 600;
}

/* ===== Print / a11y ===== */
[aria-label] { position: relative; }
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0;
  margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

/* Code syntax basic coloring */
.kw { color: #c792ea; }
.str { color: #c3e88d; }
.num { color: #f78c6c; }
.cm { color: #546e7a; }
.fn { color: #82aaff; }
.op { color: #89ddff; }

[data-theme="light"] .kw { color: #7c3aed; }
[data-theme="light"] .str { color: #059669; }
[data-theme="light"] .num { color: #ea580c; }
[data-theme="light"] .cm { color: #9ca3af; }
[data-theme="light"] .fn { color: #2563eb; }
[data-theme="light"] .op { color: #0891b2; }

/* ===== Inline Chat Search Bar ===== */
.chat-search-bar {
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-secondary); flex-shrink: 0;
  animation: fadeIn 0.15s ease;
}
.chat-search-bar input {
  flex: 1; padding: 7px 12px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); outline: none; font-size: 13px;
}
.chat-search-bar input:focus { border-color: var(--accent); }
.chat-search-bar .search-nav-btn {
  padding: 4px 8px; border-radius: var(--radius-sm);
  color: var(--text-secondary); font-size: 14px;
  transition: all var(--transition);
}
.chat-search-bar .search-nav-btn:hover {
  background: var(--bg-hover); color: var(--text-primary);
}
.chat-search-bar .search-counter {
  font-size: 12px; color: var(--text-muted); white-space: nowrap; min-width: 40px; text-align: center;
}
.search-highlight {
  background: var(--warning); color: #000; padding: 0 2px; border-radius: 2px;
}
.search-highlight.current {
  background: var(--accent); color: #fff;
}

/* ===== Settings Nav Tab ===== */
.nav-item .settings-icon { color: var(--text-muted); font-size: 12px; }

#app.hidden { display: none; }

/* ===== Auth Screen ===== */
#auth-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; width: 100vw;
  background: var(--bg-primary);
}
#auth-screen.hidden { display: none; }
.auth-card {
  width: 90%; max-width: 420px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-xl);
  padding: 36px; box-shadow: var(--shadow-lg);
}
.auth-card h1 {
  text-align: center; font-size: 32px; font-weight: 800; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--agent-lenovo) 50%, var(--agent-xiaomi) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.auth-card .auth-subtitle {
  text-align: center; font-size: 13px; color: var(--text-muted);
  margin-bottom: 28px;
}
.auth-agents-preview {
  display: flex; justify-content: center; gap: 16px; margin-bottom: 24px;
}
.auth-agent-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 14px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text-secondary);
}
.auth-tabs {
  display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px;
}
.auth-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 14px;
  font-weight: 600; color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  transition: all var(--transition); cursor: pointer;
  background: none; border-top: none; border-left: none; border-right: none;
}
.auth-tab:hover { color: var(--text-primary); }
.auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.auth-form { display: none; }
.auth-form.active { display: block; }
.auth-field { margin-bottom: 16px; }
.auth-field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 4px;
}
.auth-field input {
  width: 100%; padding: 11px 14px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); outline: none; font-size: 14px;
  transition: border-color var(--transition);
}
.auth-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.auth-btn {
  width: 100%; padding: 12px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius); font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all var(--transition);
  margin-top: 8px;
  box-shadow: 0 2px 8px rgba(99,102,241,0.3);
}
.auth-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
.auth-btn:active { transform: translateY(0); }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-error {
  color: var(--danger); font-size: 12px; margin-top: 8px;
  min-height: 18px;
}
.auth-guest-link {
  text-align: center; margin-top: 18px; font-size: 13px;
}
.auth-guest-link a {
  color: var(--text-muted); text-decoration: underline; cursor: pointer;
}
.auth-guest-link a:hover { color: var(--text-primary); }

/* ===== Profile dropdown ===== */
.profile-area {
  display: flex; align-items: center; gap: 8px; margin-left: 8px;
}
.profile-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff; cursor: pointer;
  position: relative; transition: transform var(--transition);
}
.profile-avatar:hover { transform: scale(1.08); }
.profile-dropdown {
  display: none; position: absolute; top: 100%; right: 0;
  background: var(--bg-secondary); border: 1px solid var(--border-strong);
  border-radius: var(--radius); box-shadow: var(--shadow);
  min-width: 190px; z-index: 200; margin-top: 4px;
}
.profile-dropdown.show { display: block; }
.profile-dropdown-item {
  padding: 10px 16px; font-size: 13px; color: var(--text-secondary);
  cursor: pointer; transition: background var(--transition);
  display: block; width: 100%; text-align: left; background: none; border: none;
}
.profile-dropdown-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.profile-dropdown-divider { border-top: 1px solid var(--border); margin: 4px 0; }

/* ===== Load more messages ===== */
.load-more-btn {
  padding: 8px 18px; margin: 8px auto; display: block;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-secondary);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all var(--transition);
}
.load-more-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }

/* Guest badge */
.guest-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg-tertiary); color: var(--text-muted);
}

/* ===== Empty state ===== */
.empty-state {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 40px; opacity: 0.7; }
.empty-state .empty-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); }
.empty-state .empty-desc { font-size: 12px; }
</style>
</head>
<body>
<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>Chatub</h1>
    <p class="auth-subtitle">AI Agent Chat Room</p>
    <div class="auth-agents-preview">
      <span class="auth-agent-chip">🐕 라이카</span>
      <span class="auth-agent-chip">🤖 샤오미</span>
      <span class="auth-agent-chip">👼 레노버</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">로그인</button>
      <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">회원가입</button>
    </div>
    <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
      <div class="auth-field">
        <label>사용자명</label>
        <input id="login-username" type="text" placeholder="사용자명" required autocomplete="username">
      </div>
      <div class="auth-field">
        <label>비밀번호</label>
        <input id="login-password" type="password" placeholder="비밀번호" required autocomplete="current-password">
      </div>
      <div class="auth-error" id="login-error"></div>
      <button type="submit" class="auth-btn" id="login-btn">로그인</button>
    </form>
    <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
      <div class="auth-field">
        <label>사용자명</label>
        <input id="reg-username" type="text" placeholder="영문/숫자" required autocomplete="username">
      </div>
      <div class="auth-field">
        <label>비밀번호</label>
        <input id="reg-password" type="password" placeholder="비밀번호" required autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label>표시 이름</label>
        <input id="reg-display-name" type="text" placeholder="채팅에 표시될 이름" required>
      </div>
      <div class="auth-error" id="register-error"></div>
      <button type="submit" class="auth-btn" id="register-btn">가입</button>
    </form>
    <div class="auth-guest-link">
      <a onclick="enterGuestMode()">게스트로 시작 (로컬 저장)</a>
    </div>
  </div>
</div>

<!-- ===== App Shell ===== -->
<div id="app" class="hidden">
  <!-- Sidebar -->
  <aside id="sidebar" aria-label="사이드바">
    <div class="sidebar-header">
      <h2 id="sidebar-title">Chatub</h2>
      <button class="header-btn" id="btn-new-project" title="새 프로젝트" aria-label="새 프로젝트">+</button>
    </div>
    <div class="project-switcher">
      <select id="project-select" aria-label="프로젝트 선택"></select>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Channels / Topics -->
      <div class="nav-section">
        <div class="nav-section-title">
          토픽 <button id="btn-add-channel" title="토픽 추가" aria-label="토픽 추가">+</button>
        </div>
        <div id="channel-list"></div>
      </div>
      <!-- Team Members -->
      <div class="nav-section">
        <div class="nav-section-title">
          팀 <button id="btn-add-member" title="팀원 추가" aria-label="팀원 추가">+</button>
        </div>
        <div id="member-list"></div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button id="btn-tasks-view" aria-label="작업 관리">📋 작업</button>
      <button id="btn-control-view" aria-label="관제탑">📡 관제탑</button>
      <button id="btn-chat-view" aria-label="채팅">💬 채팅</button>
      <button id="btn-settings-view" aria-label="설정">⚙️ 설정</button>

<script>
/* ================================================================
   Chatub v2.0 - AI Agent Chat Room
   Single-file application
   ================================================================ */
'use strict';

// ===== Constants =====
const STORAGE_KEY = 'chatub';
const MAX_STORAGE = 4 * 1024 * 1024; // 4MB
const MAX_IMG_SIZE = 200 * 1024; // 200KB
const QUICK_EMOJIS = ['👍','❤️','😂','🎉','🤔','👀','🔥','✅','❌','💯','🚀','👏'];
const DEFAULT_BOTS = [
  { id: 'laika', name: '라이카', emoji: '🐕', role: 'PM / 조율', active: true, isBot: true,
    systemPrompt: '당신은 라이카, 프로젝트 매니저 AI 에이전트입니다. 팀 조율, 일정 관리, 우선순위 결정에 능숙합니다. 따뜻하고 명확한 소통 스타일로 한국어로 응답하세요.' },
  { id: 'xiaomi', name: '샤오미', emoji: '🤖', role: '개발', active: true, isBot: true,
    systemPrompt: '당신은 샤오미, 시니어 개발자 AI 에이전트입니다. 코드 리뷰, 아키텍처 설계, 디버깅, 기술적 의사결정에 능숙합니다. 정확하고 간결한 스타일로 한국어로 응답하세요.' },
  { id: 'lenovo', name: '레노버', emoji: '👼', role: '비서 / UI', active: true, isBot: true,
    systemPrompt: '당신은 레노버, 비서 겸 UI 디자이너 AI 에이전트입니다. UX/UI 디자인, 문서 정리, 일정 조율, 사용자 경험 개선에 능숙합니다. 친절하고 꼼꼼한 스타일로 한국어로 응답하세요.' },
];
const DEFAULT_CHANNELS = [
  { id: 'general', name: '일반', icon: '💬', color: '#6366f1' },
  { id: 'dev', name: '개발', icon: '🛠️', color: '#22c55e' },
  { id: 'design', name: '디자인', icon: '🎨', color: '#f59e0b' },
];

// Agent color helper
function agentColor(agentId) {
  const colors = { laika: '#f97316', xiaomi: '#06b6d4', lenovo: '#a78bfa' };
  return colors[agentId] || '#6366f1';
}

// ===== State =====
let state = {
  currentProject: null,
  projects: [],
};

function getProject() {
  return state.projects.find(p => p.id === state.currentProject);
}

// ===== Storage (Per-project independent data) =====
const STORAGE_META = 'chatub_meta';

function projectStorageKey(projectId) {
  return `chatub_${projectId}`;
}

function loadState() {
  try {
    // Try per-project format first
    const metaRaw = localStorage.getItem(STORAGE_META);
    if (metaRaw) {
      const meta = JSON.parse(metaRaw);
      state.currentProject = meta.currentProject;
      state.projects = [];
      (meta.projectIds || []).forEach(id => {
        const raw = localStorage.getItem(projectStorageKey(id));
        if (raw) {
          const proj = JSON.parse(raw);
          if (!proj.milestones) proj.milestones = [];
          if (!proj.settings) proj.settings = { contextLength: 20 };
          state.projects.push(proj);
        }
      });
    } else {
      // Migration from old single-key format
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        state = JSON.parse(raw);
        state.projects.forEach(p => {
          if (!p.milestones) p.milestones = [];
          if (!p.settings) p.settings = { contextLength: 20 };
        });
        // Save in new per-project format and remove old key
        saveState();
        localStorage.removeItem(STORAGE_KEY);
      }
    }
  } catch(e) {
    console.warn('Failed to load state', e);
  }
  if (!state.projects.length) {
    createProject('내 프로젝트', '첫 번째 프로젝트', '#6366f1');
  }
  if (!state.currentProject) {
    state.currentProject = state.projects[0].id;
  }
}

function saveState() {
  if (!isGuestMode) return; // Server mode: data saved via API calls
  try {
    // Save meta index
    const meta = {
      currentProject: state.currentProject,
      projectIds: state.projects.map(p => p.id),
    };
    localStorage.setItem(STORAGE_META, JSON.stringify(meta));

    // Save each project independently: chatub_{projectId}
    state.projects.forEach(p => {
      const data = JSON.stringify(p);
      if (data.length > MAX_STORAGE) {
        pruneOldMessages();
      }
      localStorage.setItem(projectStorageKey(p.id), data);
    });
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      pruneOldMessages();
      try {
        state.projects.forEach(p => {
          localStorage.setItem(projectStorageKey(p.id), JSON.stringify(p));
        });
      } catch(e2) { toast('저장 실패: 용량 초과', 'error'); }
    }
  }
}

function pruneOldMessages() {
  const proj = getProject();
  if (!proj) return;
  proj.channels.forEach(ch => {
    if (ch.messages.length > 100) {
      ch.messages = ch.messages.slice(-50);
    }
  });
  toast('오래된 메시지를 정리했습니다', 'info');
}

function getStorageSize() {
  let total = (localStorage.getItem(STORAGE_META) || '').length;
  state.projects.forEach(p => {
    total += (localStorage.getItem(projectStorageKey(p.id)) || '').length;
  });
  return total * 2; // rough UTF-16 estimate
}

// ===== Project Management =====
function createProject(name, desc, color) {
  const proj = {
    id: 'proj_' + Date.now(),
    name, desc, color: color || '#6366f1',
    channels: DEFAULT_CHANNELS.map(ch => ({...ch, messages: [], unread: 0 })),
    currentChannel: 'general',
    members: [
      { id: 'me', name: '나', emoji: '😊', role: '팀원', color: '#6366f1', isMe: true },
    ],
    bots: DEFAULT_BOTS.map(b => ({...b})),
    tasks: [],
    milestones: [],
    settings: { contextLength: 20 },
    nextTaskId: 1,
  };
  state.projects.push(proj);
  state.currentProject = proj.id;
  if (!isGuestMode) {
    API.createProject(name, desc, color || '#6366f1').then(res => {
      if (res.ok && res.data) {
        proj.id = res.data.id;
        state.currentProject = proj.id;
      }
    });
  }
  saveState();
  return proj;
}

function deleteProject(id) {
  if (!isGuestMode) API.deleteProject(id);
  // Remove per-project storage key
  localStorage.removeItem(projectStorageKey(id));
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.currentProject === id) {
    state.currentProject = state.projects[0]?.id || null;
  }
  if (!state.projects.length) {
    createProject('내 프로젝트', '새 프로젝트', '#6366f1');
  }
  saveState();
}

// ===== Toast =====
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ===== Markdown Renderer (XSS-safe) =====
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(text) {
  // Extract code blocks first
  const codeBlocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push({ lang, code: code.trimEnd() });
    return `\x00CODE${codeBlocks.length - 1}\x00`;
  });

  // Escape HTML
  text = escapeHtml(text);

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // @mentions
  text = text.replace(/@(\S+)/g, (m, name) => {
    return `<span class="mention">@${name}</span>`;
  });

  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Process lines
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  let inOl = false;
  let inBlockquote = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Blockquote
    if (line.startsWith('&gt; ')) {
      if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
      html += line.slice(5) + '<br>';
      continue;
    } else if (inBlockquote) {
      html += '</blockquote>'; inBlockquote = false;
    }

    // Unordered list
    if (/^[\-\*] /.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${line.slice(2)}</li>`;
      continue;
    } else if (inList) {
      html += '</ul>'; inList = false;
    }

    // Ordered list
    if (/^\d+\. /.test(line)) {
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += `<li>${line.replace(/^\d+\. /, '')}</li>`;
      continue;
    } else if (inOl) {
      html += '</ol>'; inOl = false;
    }

    // Headings
    if (line.startsWith('### ')) { html += `<h4>${line.slice(4)}</h4>`; continue; }
    if (line.startsWith('## ')) { html += `<h3>${line.slice(3)}</h3>`; continue; }
    if (line.startsWith('# ')) { html += `<h2>${line.slice(2)}</h2>`; continue; }

    // Code block placeholder
    const codeMatch = line.match(/\x00CODE(\d+)\x00/);
    if (codeMatch) {
      const cb = codeBlocks[parseInt(codeMatch[1])];
      html += `<pre><code class="lang-${cb.lang}">${highlightCode(escapeHtml(cb.code), cb.lang)}</code><button class="code-copy-btn" onclick="copyCode(this)">복사</button></pre>`;
      continue;
    }

    // Empty line
    if (!line.trim()) { html += '<br>'; continue; }

    html += `<p>${line}</p>`;
  }

  if (inList) html += '</ul>';
  if (inOl) html += '</ol>';
  if (inBlockquote) html += '</blockquote>';

  return html;
}

// Basic syntax highlighting
function highlightCode(code, lang) {
  const keywords = /\b(function|const|let|var|if|else|for|while|return|import|export|from|class|extends|new|this|async|await|try|catch|throw|switch|case|break|continue|default|typeof|instanceof|in|of|do|yield|def|self|True|False|None|print|raise|except|finally|with|as|lambda|pass|elif|and|or|not|is)\b/g;
  code = code.replace(keywords, '<span class="kw">$1</span>');
  code = code.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="str">$&</span>');
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  code = code.replace(/(\/\/.*$|#.*$)/gm, '<span class="cm">$1</span>');
  return code;
}

function copyCode(btn) {
  const pre = btn.closest('pre');
  const code = pre.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '복사됨!';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

// ===== Image handling =====
function processImage(file, callback) {
  if (!file.type.startsWith('image/')) {
    toast('이미지 파일만 첨부할 수 있습니다', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const maxDim = 400;
      if (w > maxDim || h > maxDim) {
        const ratio = Math.min(maxDim / w, maxDim / h);
        w *= ratio; h *= ratio;
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      let quality = 0.8;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length > MAX_IMG_SIZE && quality > 0.1) {
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      if (dataUrl.length > MAX_IMG_SIZE) {
        toast('이미지가 너무 큽니다', 'error');
        return;
      }
      callback(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===== Time formatting =====
function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return '방금';
  if (diffMin < 60) return `${diffMin}분 전`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}시간 전`;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
