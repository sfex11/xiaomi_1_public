function showMigrateModal() {
  $('profile-dropdown').classList.remove('show');
  showModal('데이터 마이그레이션', `
    <p style="margin-bottom:16px;color:var(--text-secondary);font-size:13px;">
      로컬에 저장된 게스트 데이터를 서버로 이전합니다.<br>
      기존 서버 데이터는 유지되며, 게스트 프로젝트가 추가됩니다.
    </p>
    <div id="migrate-status" style="font-size:13px;color:var(--text-muted);"></div>
  `, async () => {
    $('migrate-status').textContent = '마이그레이션 진행 중...';

    const metaRaw = localStorage.getItem('chatub_meta');
    const guestProjects = [];

    if (metaRaw) {
      const meta = JSON.parse(metaRaw);
      (meta.projectIds || []).forEach(id => {
        const raw = localStorage.getItem('chatub_' + id);
        if (raw) guestProjects.push(JSON.parse(raw));
      });
    } else {
      const raw = localStorage.getItem('chatub');
      if (raw) {
        const data = JSON.parse(raw);
        if (data.projects) guestProjects.push(...data.projects);
      }
    }

    if (!guestProjects.length) {
      $('migrate-status').textContent = '마이그레이션할 데이터가 없습니다.';
      return;
    }

    const res = await API.migrate({ projects: guestProjects });
    if (res.ok) {
      if (metaRaw) {
        const meta = JSON.parse(metaRaw);
        (meta.projectIds || []).forEach(id => localStorage.removeItem('chatub_' + id));
        localStorage.removeItem('chatub_meta');
      }
      localStorage.removeItem('chatub');

      closeModal();
      toast('마이그레이션 완료!', 'success');
      updateProfileUI();
      await loadStateFromServer();
      renderAll();
    } else {
      $('migrate-status').textContent = '오류: ' + (res.error || '마이그레이션 실패');
    }
  });
}

// ===== Server-backed state loading =====

let serverChannelMessages = {};
let serverMessagePagination = {};

async function loadStateFromServer() {
  if (isGuestMode) return;

  const projRes = await API.getProjects();
  if (!projRes.ok) return;

  state.projects = [];

  for (const sp of projRes.data) {
    const [chRes, memRes, botRes, taskRes, msRes] = await Promise.all([
      API.getChannels(sp.id),
      API.getMembers(sp.id),
      API.getBots(sp.id),
      API.getTasks(sp.id),
      API.getMilestones(sp.id),
    ]);

    const channels = (chRes.data || []).map(ch => ({
      id: ch.id,
      name: ch.name,
      icon: ch.icon || '#',
      color: ch.color || '#6366f1',
      messages: [],
      unread: 0,
    }));

    const members = [
      { id: authUser.id, name: authUser.display_name, emoji: '😊', role: '나', color: authUser.avatar_color || '#6366f1', isMe: true },
      ...(memRes.data || []).map(m => ({
        id: m.id, name: m.name, role: m.role, emoji: '👤',
        color: m.avatar_color || '#6366f1',
      }))
    ];

    const bots = (botRes.data || []).map(b => ({
      id: b.id, name: b.name, role: b.role,
      emoji: b.avatar || '🤖',
      systemPrompt: b.system_prompt || '',
      active: !!b.is_active,
      isBot: true,
    }));

    const tasks = (taskRes.data || []).map(t => ({
      id: t.id, num: t.id.slice(-4),
      title: t.title, desc: t.description || '',
      status: t.status || 'todo',
      milestoneId: t.milestone_id || '',
      deadline: t.deadline ? new Date(t.deadline * 1000).toISOString().split('T')[0] : '',
      createdAt: t.created_at * 1000,
    }));

    const milestones = (msRes.data || []).map(m => ({
      id: m.id, name: m.name,
      deadline: m.deadline ? new Date(m.deadline * 1000).toISOString().split('T')[0] : '',
      color: m.color || '#6366f1',
    }));

    const setRes = await API.getSettings();
    const settings = setRes.ok && setRes.data ? {
      gatewayUrl: setRes.data.gateway_url || '',
      gatewayToken: setRes.data.gateway_token || '',
      contextLength: setRes.data.context_length || 20,
    } : { gatewayUrl: '', gatewayToken: '', contextLength: 20 };

    const proj = {
      id: sp.id,
      name: sp.name,
      desc: sp.description || '',
      color: sp.color || '#6366f1',
      channels,
      currentChannel: channels[0]?.id || '',
      members,
      bots,
      tasks,
      milestones,
      settings,
      nextTaskId: tasks.length + 1,
    };
    state.projects.push(proj);
  }

  if (!state.projects.length) {
    return;
  }

  state.currentProject = state.projects[0].id;
}

async function loadChannelMessages(channelId, limit = 50, before = null) {
  if (isGuestMode) return;

  const res = await API.getMessages(channelId, limit, before);
  if (!res.ok) return [];

  const proj = getProject();
  const messages = (res.data || []).map(m => ({
    id: m.id,
    authorId: m.user_id || m.bot_id || '',
    author: m.author_name || '알 수 없음',
    text: m.text || '',
    image: m.image || null,
    ts: m.created_at * 1000,
    editedAt: m.edited_at ? m.edited_at * 1000 : null,
    isBot: !!m.bot_id,
    reactions: m.reactions_json ? (typeof m.reactions_json === 'string' ? JSON.parse(m.reactions_json) : m.reactions_json) : {},
    replies: [],
  }));

  messages.reverse();

  if (!serverMessagePagination[channelId]) {
    serverMessagePagination[channelId] = { hasMore: true, oldestTs: null };
  }

  if (messages.length < limit) {
    serverMessagePagination[channelId].hasMore = false;
  }

  if (messages.length > 0) {
    serverMessagePagination[channelId].oldestTs = Math.floor(messages[0].ts / 1000);
  }

  return messages;
}

async function loadMoreMessages() {
  const proj = getProject();
  if (!proj || isGuestMode) return;
  const ch = proj.channels.find(c => c.id === proj.currentChannel);
  if (!ch) return;

  const pagination = serverMessagePagination[ch.id];
  if (!pagination || !pagination.hasMore) {
    toast('더 이상 메시지가 없습니다', 'info');
    return;
  }

  const container = $('messages-container');
  const scrollHeightBefore = container.scrollHeight;

  const older = await loadChannelMessages(ch.id, 50, pagination.oldestTs);
  if (older.length) {
    ch.messages = [...older, ...ch.messages];
    renderMessages();
    requestAnimationFrame(() => {
      container.scrollTop = container.scrollHeight - scrollHeightBefore;
    });
  }
}

// ================================================================
// WEBSOCKET REAL-TIME CONNECTION
// ================================================================

const WS = {
  socket: null,
  channelId: null,
  reconnectTimer: null,
  reconnectDelay: 1000,
  maxReconnectDelay: 30000,

  connect(channelId) {
    if (isGuestMode) return;
    if (this.socket && this.channelId === channelId && this.socket.readyState === WebSocket.OPEN) return;

    this.disconnect();
    this.channelId = channelId;

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const token = API.token || '';
    const url = `${proto}//${location.host}/ws/${channelId}?token=${encodeURIComponent(token)}`;

    try {
      this.socket = new WebSocket(url);
    } catch (e) {
      console.warn('WebSocket connection failed:', e);
      this.scheduleReconnect();
      return;
    }

    this.socket.onopen = () => {
      console.log('[WS] connected to channel', channelId);
      this.reconnectDelay = 1000;
    };

    this.socket.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        this.handleMessage(data);
      } catch (e) {
        console.warn('[WS] parse error:', e);
      }
    };

    this.socket.onclose = (e) => {
      console.log('[WS] disconnected', e.code, e.reason);
      if (this.channelId === channelId) {
        this.scheduleReconnect();
      }
    };

    this.socket.onerror = (e) => {
      console.warn('[WS] error:', e);
    };
  },

  disconnect() {
    clearTimeout(this.reconnectTimer);
    if (this.socket) {
      this.socket.onclose = null;
      this.socket.close();
      this.socket = null;
    }
    this.channelId = null;
  },

  scheduleReconnect() {
    clearTimeout(this.reconnectTimer);
    this.reconnectTimer = setTimeout(() => {
      if (this.channelId && !isGuestMode) {
        console.log('[WS] reconnecting...');
        this.connect(this.channelId);
      }
    }, this.reconnectDelay);
    this.reconnectDelay = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);
  },

  send(data) {
    if (this.socket && this.socket.readyState === WebSocket.OPEN) {
      this.socket.send(JSON.stringify(data));
      return true;
    }
    return false;
  },

  handleMessage(data) {
    const proj = getProject();
    if (!proj) return;

    switch (data.type) {
      case 'message': {
        const ch = proj.channels.find(c => c.id === data.channel_id);
        if (!ch) return;
        // Avoid duplicates (own messages already added locally)
        if (ch.messages.find(m => m.id === data.id)) return;
        const msg = {
          id: data.id,
          authorId: data.user_id || data.bot_id || '',
          author: data.author_name || '알 수 없음',
          text: data.text || '',
          image: data.image || null,
          ts: data.created_at ? data.created_at * 1000 : Date.now(),
          isBot: !!data.bot_id,
          reactions: data.reactions_json ? (typeof data.reactions_json === 'string' ? JSON.parse(data.reactions_json) : data.reactions_json) : {},
          replies: [],
        };
        ch.messages.push(msg);
        if (proj.currentChannel === data.channel_id) {
          renderMessages();
        } else {
          ch.unread = (ch.unread || 0) + 1;
          renderChannelList();
        }
        break;
      }
      case 'message_update': {
        const ch = proj.channels.find(c => c.id === data.channel_id);
        if (!ch) return;
        const msg = ch.messages.find(m => m.id === data.id);
        if (msg) {
          if (data.text !== undefined) msg.text = data.text;
          if (data.reactions_json) {
            msg.reactions = typeof data.reactions_json === 'string' ? JSON.parse(data.reactions_json) : data.reactions_json;
          }
          if (proj.currentChannel === data.channel_id) renderMessages();
        }
        break;
      }
      case 'message_delete': {
        const ch = proj.channels.find(c => c.id === data.channel_id);
        if (!ch) return;
        ch.messages = ch.messages.filter(m => m.id !== data.id);
        if (proj.currentChannel === data.channel_id) renderMessages();
        break;
      }
      case 'typing': {
        if (data.user_id !== authUser?.id) {
          showTypingIndicator(data.display_name || '누군가');
          clearTimeout(WS._typingTimeout);
          WS._typingTimeout = setTimeout(hideTypingIndicator, 3000);
        }
        break;
      }
      case 'user_join':
      case 'user_leave': {
        // Could update online status indicators
        break;
      }
      default:
        console.log('[WS] unknown message type:', data.type);
    }
  },

  _typingTimeout: null,

  sendTyping() {
    this.send({ type: 'typing' });
  },
};

// ===== Dual-mode loadState/saveState =====

async function loadStateAndRender() {
  if (isGuestMode) {
    loadState();
    renderAll();
  } else {
    await loadStateFromServer();
    if (state.projects.length && state.currentProject) {
      const proj = getProject();
      if (proj && proj.currentChannel) {
        const msgs = await loadChannelMessages(proj.currentChannel);
        const ch = proj.channels.find(c => c.id === proj.currentChannel);
        if (ch) ch.messages = msgs;
        // Connect WebSocket to current channel
        WS.connect(proj.currentChannel);
      }
    }
    renderAll();
  }
}

function init() {
  loadTheme();

  const savedMode = localStorage.getItem(AUTH_MODE_KEY);
  const savedToken = localStorage.getItem(AUTH_TOKEN_KEY);
  const savedUser = localStorage.getItem(AUTH_USER_KEY);

  if (savedMode === 'guest') {
    isGuestMode = true;
    authUser = null;
    enterApp();
  } else if (savedToken && savedUser) {
    authUser = JSON.parse(savedUser);
    isGuestMode = false;
    API.me().then(res => {
      if (res.ok) {
        const me = res.data || res;
        authUser = me.user;
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify(me.user));
        enterApp();
      } else {
        handleLogout();
      }
    });
  } else {
    $('app').classList.add('hidden');
    $('auth-screen').classList.remove('hidden');
  }

  // Message input
  const msgInput = $('msg-input');
  msgInput.addEventListener('keydown', (e) => {
    if (handleMentionKeydown(e)) return;
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(msgInput.value);
      msgInput.value = '';
      autoResize(msgInput);
    }
  });
  let typingThrottle = 0;
  msgInput.addEventListener('input', () => {
    autoResize(msgInput);
    handleMentionInput(msgInput);
    // Send typing indicator via WebSocket (throttled)
    const now = Date.now();
    if (now - typingThrottle > 2000) {
      typingThrottle = now;
      WS.sendTyping();
    }
  });

  // Send button
  $('btn-send').addEventListener('click', () => {
    sendMessage(msgInput.value);
    msgInput.value = '';
    autoResize(msgInput);
  });

  // File attachment
  $('btn-attach').addEventListener('click', () => $('file-input').click());
  $('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      processImage(file, (dataUrl) => {
        sendMessage(msgInput.value, dataUrl);
        msgInput.value = '';
        autoResize(msgInput);
      });
    }
    e.target.value = '';
  });

  // Image drag & drop on chat area
  const chatView = $('chat-view');
  chatView.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    chatView.style.outline = '2px dashed var(--accent)';
  });
  chatView.addEventListener('dragleave', () => {
    chatView.style.outline = '';
  });
  chatView.addEventListener('drop', (e) => {
    e.preventDefault();
    chatView.style.outline = '';
    const files = e.dataTransfer.files;
    if (files.length && files[0].type.startsWith('image/')) {
      processImage(files[0], (dataUrl) => {
        sendMessage(msgInput.value, dataUrl);
        msgInput.value = '';
        autoResize(msgInput);
      });
    }
  });

  // Channel add
  $('btn-add-channel').addEventListener('click', addChannel);

  // Member add
  $('btn-add-member').addEventListener('click', showAddMemberModal);

  // Project switcher
  $('project-select').addEventListener('change', async (e) => {
    state.currentProject = e.target.value;
    saveState();
    if (!isGuestMode) {
      const proj = getProject();
      if (proj && proj.currentChannel) {
        const ch = proj.channels.find(c => c.id === proj.currentChannel);
        if (ch && !ch.messages.length) {
          const msgs = await loadChannelMessages(proj.currentChannel);
          ch.messages = msgs;
        }
      }
    }
    renderAll();
  });

  // New project
  $('btn-new-project').addEventListener('click', () => {
    showModal('새 프로젝트', `
      <div class="settings-field"><label>이름</label><input id="new-proj-name" placeholder="프로젝트 이름"></div>
      <div class="settings-field"><label>설명</label><input id="new-proj-desc" placeholder="설명"></div>
      <div class="settings-field"><label>색상</label><input id="new-proj-color" type="color" value="#6366f1"></div>
    `, () => {
      const name = $('new-proj-name').value.trim();
      if (!name) { toast('이름 입력', 'error'); return; }
      createProject(name, $('new-proj-desc').value.trim(), $('new-proj-color').value);
      renderAll();
      closeModal();
      toast('프로젝트 생성됨', 'success');
    });
  });

  // Sidebar buttons
  $('btn-tasks-view').addEventListener('click', () => { switchView('tasks'); closeSidebar(); });
  $('btn-chat-view').addEventListener('click', () => { switchView('chat'); closeSidebar(); });
  $('btn-settings-view').addEventListener('click', () => { switchView('settings'); closeSidebar(); });

  // Header buttons
  $('btn-search').addEventListener('click', () => {
    if (currentView === 'chat') openInlineSearch();
    else openSearch();
  });
  $('btn-toggle-theme').addEventListener('click', toggleTheme);
  $('btn-toggle-panel').addEventListener('click', () => {
    $('right-panel').classList.toggle('hidden');
  });
  $('btn-hamburger').addEventListener('click', openSidebar);
  $('sidebar-backdrop').addEventListener('click', closeSidebar);

  // Close panel
  $('btn-close-panel').addEventListener('click', () => {
    $('right-panel').classList.add('hidden');
  });

  // Global search overlay
  $('search-input').addEventListener('input', (e) => performSearch(e.target.value));
  $('search-overlay').addEventListener('click', (e) => {
    if (e.target === $('search-overlay')) closeSearch();
  });

  // Inline chat search
  const inlineSearchInput = $('inline-search-input');
  let inlineSearchTimer = null;
  inlineSearchInput.addEventListener('input', () => {
    clearTimeout(inlineSearchTimer);
    inlineSearchTimer = setTimeout(() => performInlineSearch(inlineSearchInput.value), 150);
  });
  inlineSearchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (e.shiftKey) navigateInlineSearch('prev');
      else navigateInlineSearch('next');
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      closeInlineSearch();
    }
  });
  $('btn-search-next').addEventListener('click', () => navigateInlineSearch('next'));
  $('btn-search-prev').addEventListener('click', () => navigateInlineSearch('prev'));
  $('btn-search-close').addEventListener('click', closeInlineSearch);

  // Modal close
  $('modal-close').addEventListener('click', closeModal);
  $('modal-overlay').addEventListener('click', (e) => {
    if (e.target === $('modal-overlay')) closeModal();
  });

  // Emoji picker close on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.emoji-picker') && !e.target.closest('.add-reaction-btn') && !e.target.closest('.msg-action-btn')) {
      $('emoji-picker').classList.remove('show');
    }
  });

  // Image preview close
  $('img-preview').addEventListener('click', () => {
    $('img-preview').classList.remove('show');
  });

  // Task filter buttons
  $('task-filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.task-filter-btn');
    if (!btn) return;
    currentTaskFilter = btn.dataset.filter;
    $$('.task-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderTaskView();
  });

  // Task search
  $('task-search').addEventListener('input', () => renderTaskView());

  // Milestone filter
  $('milestone-filter').addEventListener('change', (e) => {
    currentMilestoneFilter = e.target.value;
    renderTaskView();
  });

  // Add task buttons
  $('btn-add-task-main').addEventListener('click', () => showAddTaskModal('todo'));
  document.querySelectorAll('.add-task-btn').forEach(btn => {
    btn.addEventListener('click', () => showAddTaskModal(btn.dataset.status));
  });

  // Mobile tabs
  $$('.mobile-tab').forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
  });

  // Global keyboard shortcuts
  document.addEventListener('keydown', handleGlobalKeydown);

  // CSS blink animation for streaming cursor
  const style = document.createElement('style');
  style.textContent = '@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }';
  document.head.appendChild(style);
}

// Start
init();
</script>
</body>
</html>
