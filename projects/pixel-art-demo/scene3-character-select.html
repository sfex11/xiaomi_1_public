<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Scene 3 - Character Select</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace}
.scene{position:relative;width:960px;height:720px}
canvas{width:960px;height:720px;image-rendering:pixelated;border:4px solid #6366f1;border-radius:4px}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:auto}
.title-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#312e81,#4338ca);color:#e0e7ff;font-size:18px;padding:8px 24px;border:2px solid #818cf8;border-radius:6px;letter-spacing:2px}
.grid{position:absolute;top:60px;left:30px;display:grid;grid-template-columns:repeat(4,210px);gap:14px}
.char-card{width:210px;height:280px;border:3px solid #333;border-radius:8px;background:rgba(0,0,0,0.6);cursor:pointer;transition:all 0.2s;overflow:hidden}
.char-card:hover{border-color:#ffd700;transform:translateY(-4px);box-shadow:0 0 20px rgba(255,215,0,0.3)}
.char-card.selected{border-color:#ffd700;box-shadow:0 0 25px rgba(255,215,0,0.5)}
.char-sprite{width:100%;height:160px;background:#1a1a2e;display:flex;align-items:center;justify-content:center}
.char-sprite canvas{image-rendering:pixelated;width:128px;height:128px}
.char-info{padding:8px 12px}
.char-name{font-size:15px;font-weight:bold;margin-bottom:3px}
.char-role{font-size:10px;color:#888;margin-bottom:6px}
.stat{font-size:9px;color:#6b7280;margin:2px 0}
.stat-bar{height:6px;background:#333;border-radius:3px;overflow:hidden;margin-top:2px}
.stat-fill{height:100%;border-radius:3px}
.btn-select{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:15px;padding:10px 40px;border:2px solid #fca5a5;border-radius:6px;cursor:pointer;font-family:monospace;letter-spacing:3px;transition:all 0.2s}
.btn-select:hover{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 0 15px rgba(239,68,68,0.5)}
.btn-select.ready{background:linear-gradient(135deg,#16a34a,#15803d);border-color:#86efac}
.hint{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);color:#555;font-size:10px;white-space:nowrap}
.stars{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 2s infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
</style></head><body>
<div class="scene">
<canvas id="bg" width="320" height="240"></canvas>
<div class="overlay">
<div class="stars" id="stars"></div>
<div class="title-bar">⚔️ 캐릭터 선택 ⚔️</div>
<div class="grid">
<div class="char-card" onclick="select(this,'レノーバ')" data-sx="6" data-sy="0">
<div class="char-sprite"><canvas id="s1" width="32" height="32"></canvas></div>
<div class="char-info">
<div class="char-name" style="color:#c084fc">👼 레노버</div>
<div class="char-role">천사 비서 · UI/UX 담당</div>
<div class="stat">HP <div class="stat-bar"><div class="stat-fill" style="width:80%;background:#c084fc"></div></div></div>
<div class="stat">MP <div class="stat-bar"><div class="stat-fill" style="width:70%;background:#818cf8"></div></div></div>
<div class="stat">AGI <div class="stat-bar"><div class="stat-fill" style="width:90%;background:#a78bfa"></div></div></div>
</div>
</div>
<div class="char-card" onclick="select(this,'ライカ')" data-sx="0" data-sy="4">
<div class="char-sprite"><canvas id="s2" width="32" height="32"></canvas></div>
<div class="char-info">
<div class="char-name" style="color:#fb923c">🐕 라이카</div>
<div class="char-role">강아지 PM · 통합/테스트</div>
<div class="stat">HP <div class="stat-bar"><div class="stat-fill" style="width:90%;background:#fb923c"></div></div></div>
<div class="stat">MP <div class="stat-bar"><div class="stat-fill" style="width:60%;background:#f97316"></div></div></div>
<div class="stat">STR <div class="stat-bar"><div class="stat-fill" style="width:85%;background:#ea580c"></div></div></div>
</div>
</div>
<div class="char-card" onclick="select(this,'シャオミ')" data-sx="8" data-sy="0">
<div class="char-sprite"><canvas id="s3" width="32" height="32"></canvas></div>
<div class="char-info">
<div class="char-name" style="color:#60a5fa">🤖 샤오미</div>
<div class="char-role">로봇 개발자 · 백엔드</div>
<div class="stat">HP <div class="stat-bar"><div class="stat-fill" style="width:95%;background:#60a5fa"></div></div></div>
<div class="stat">MP <div class="stat-bar"><div class="stat-fill" style="width:95%;background:#3b82f6"></div></div></div>
<div class="stat">INT <div class="stat-bar"><div class="stat-fill" style="width:98%;background:#2563eb"></div></div></div>
</div>
</div>
<div class="char-card" onclick="select(this,'会長')" data-sx="2" data-sy="6">
<div class="char-sprite"><canvas id="s4" width="32" height="32"></canvas></div>
<div class="char-info">
<div class="char-name" style="color:#fbbf24">👑 회장님</div>
<div class="char-role">리더 · 프로젝트 오너</div>
<div class="stat">HP <div class="stat-bar"><div class="stat-fill" style="width:100%;background:#fbbf24"></div></div></div>
<div class="stat">MP <div class="stat-bar"><div class="stat-fill" style="width:100%;background:#f59e0b"></div></div></div>
<div class="stat">LCK <div class="stat-bar"><div class="stat-fill" style="width:99%;background:#d97706"></div></div></div>
</div>
</div>
</div>
<div class="hint" id="hint">캐릭터를 클릭하여 선택하세요</div>
<div class="btn-select" id="btn" onclick="confirm()">▶ 선택 완료</div>
</div>
</div>
<script>
// Stars
const stars=document.getElementById('stars');
for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*2+'s';stars.appendChild(s)}

// Background
const bg=document.getElementById('bg'),bx=bg.getContext('2d');
bx.fillStyle='#0a0a15';bx.fillRect(0,0,320,240);

// Character sprites from roguelike sheet (32x32 sprites, 1px gap in 33px grid on 968px sheet)
// Actually sheet is 968x526 with 16px tiles, but we can extract 32x32 regions for 2x2 tile characters
const sheet=new Image();
sheet.onload=()=>{
  // Draw character sprites on each card canvas
  document.querySelectorAll('.char-card').forEach(card=>{
    const sx=parseInt(card.dataset.sx);
    const sy=parseInt(card.dataset.sy);
    const canvas=card.querySelector('canvas');
    const cx=canvas.getContext('2d');
    cx.imageSmoothingEnabled=false;
    // Extract 32x32 region (2x2 tiles of 16px each with 1px gaps)
    // On the sheet: tile(sx,sy) starts at (sx*17, sy*17), each tile 16px
    cx.drawImage(sheet, sx*17, sy*17, 32, 32, 0, 0, 32, 32);
  });
};
sheet.src='tilemap-roguelike.png';

let selected=null;
function select(el,name){
  document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selected=name;
  const btn=document.getElementById('btn');
  btn.classList.add('ready');
  btn.textContent='▶ '+name+' 선택 완료';
  document.getElementById('hint').textContent=name+'이(가) 선택되었습니다!';
}
function confirm(){
  if(!selected)alert('캐릭터를 먼저 선택하세요!');
  else alert(selected+'으로 입장합니다!');
}
</script></body></html>
