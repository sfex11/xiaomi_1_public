<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Scene 1 - Pixel Town & Dungeon Office</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;gap:16px}
.scene-wrap{position:relative}
.scene-wrap h3{text-align:center;color:#818cf8;margin-bottom:6px;font-size:13px}
canvas{image-rendering:pixelated;border:3px solid #444;border-radius:4px}
.c1{width:480px;height:360px}.c2{width:480px;height:360px}
.labels{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.label{position:absolute;color:#fff;font-size:10px;font-weight:bold;text-shadow:1px 1px 2px #000,-1px -1px 2px #000;text-align:center;white-space:nowrap}
.lp{color:#c084fc}.lo{color:#fb923c}.lb{color:#60a5fa}
</style></head><body>
<div class="scene-wrap">
<h3>🏘️ 타운 뷰 — 에이전트 빌리지</h3>
<canvas id="town" class="c1" width="320" height="240"></canvas>
</div>
<div class="scene-wrap">
<h3>⚔️ 던전 뷰 — 협업 사무실</h3>
<canvas id="dungeon" class="c2" width="320" height="240"></canvas>
<div class="labels">
<div class="label lp" style="left:20%;top:30%">👼 레노버</div>
<div class="label lo" style="left:55%;top:30%">🐕 라이카</div>
<div class="label lb" style="left:38%;top:55%">🤖 샤오미</div>
</div>
</div>
<script>
// Helper
function drawScene(canvasId, imgSrc, drawFn){
const c=document.getElementById(canvasId),x=c.getContext('2d');
const img=new Image();
img.onload=()=>{x.imageSmoothingEnabled=false;drawFn(x,img)};
img.src=imgSrc;
}

// Scene: Town
drawScene('town','tilemap-town.png',(x,img)=>{
const S=16,G=17;
function t(col,row,dx,dy){x.drawImage(img,col*G,row*G,S,S,dx*S,dy*S,S,S)}

// Grass ground
for(let y=0;y<15;y++)for(let x2=0;x2<20;x2++){
t(0,x2,y); // grass
}
// Path in middle
for(let y=5;y<12;y++)for(let x2=8;x2<12;x2++){
t(6,x2,y); // path/road
}
// Buildings - purple (레노버 house)
for(let y2=2;y2<5;y2++)for(let x2=2;x2<6;x2++){t(36,x2,y2)}
// Buildings - orange (라이카 house)
for(let y2=2;y2<5;y2++)for(let x2=13;x2<17;x2++){t(36,x2,y2)}
// Buildings - blue (샤오미 house)
for(let y2=7;y2<10;y2++)for(let x2=2;x2<6;x2++){t(36,x2,y2)}
// Center guild hall
for(let y2=2;y2<6;y2++)for(let x2=8;x2<12;x2++){t(48,x2,y2)}

// Trees
t(24,0,0);t(24,0,1);t(24,1,0);
t(24,19,0);t(24,19,1);t(24,18,0);
t(24,7,0);t(24,7,1);
t(24,12,0);t(24,12,1);
// More trees
t(24,0,7);t(24,1,8);t(24,0,13);t(24,19,13);t(24,19,7);

// Water at bottom
for(let x2=0;x2<20;x2++){t(12,x2,14);t(13,x2,14)}
for(let x2=3;x2<8;x2++){t(12,x2,13);t(13,x2,13)}

// Roof colors (overlay)
x.fillStyle='rgba(168,85,247,0.3)';
for(let y2=1;y2<5;y2++)for(let x2=2;x2<6;x2++)x.fillRect(x2*S,y2*S,S,S);
x.fillStyle='rgba(251,146,60,0.3)';
for(let y2=1;y2<5;y2++)for(let x2=13;x2<17;x2++)x.fillRect(x2*S,y2*S,S,S);
x.fillStyle='rgba(96,165,250,0.3)';
for(let y2=6;y2<10;y2++)for(let x2=2;x2<6;x2++)x.fillRect(x2*S,y2*S,S,S);
x.fillStyle='rgba(251,191,36,0.3)';
for(let y2=1;y2<6;y2++)for(let x2=8;x2<12;x2++)x.fillRect(x2*S,y2*S,S,S);

// Labels
x.fillStyle='#c084fc';x.font='bold 7px monospace';x.fillText('レ',4*S+4,3*S+12);
x.fillStyle='#fb923c';x.fillText('ラ',15*S+4,3*S+12);
x.fillStyle='#60a5fa';x.fillText('シ',4*S+4,8*S+12);
x.fillStyle='#fbbf24';x.font='bold 6px monospace';x.fillText('GUILD',9*S+2,3*S+12);
});

// Scene: Dungeon Office
drawScene('dungeon','tilemap-dungeon.png',(x,img)=>{
const S=16,G=17;
function t(idx,dx,dy){const col=idx%12,row=Math.floor(idx/12);x.drawImage(img,col*G,row*G,S,S,dx*S,dy*S,S,S)}

// Stone floor
for(let y=2;y<15;y++)for(let x2=0;x2<20;x2++){t((x2+y)%3,x2,y)}
// Walls
for(let x2=0;x2<20;x2++){t(14,x2,0);t(14,x2,1)}
// Side walls
for(let y=2;y<14;y++){t(18,0,y);t(16,19,y)}
// Water bottom
for(let x2=2;x2<18;x2++)t(9,x2,14);

// Torches
t(10,5,1);t(11,15,1);t(10,0,0);t(11,19,0);

// Desks left
t(64,3,6);t(64,4,6);t(64,5,6);t(66,3,7);t(67,4,7);t(66,5,7);
// Desks right
t(64,13,6);t(64,14,6);t(64,15,6);t(66,13,7);t(67,14,7);t(66,15,7);
// Center table
for(let i=8;i<=11;i++){t(64,i,9)}
for(let i=8;i<=11;i++){t(66,i,10)}

// Bookshelves
t(68,1,8);t(69,1,9);t(70,1,10);
// Decorative
t(74,18,3);t(73,18,4);t(62,10,4);
// Characters (NPC tiles)
t(75,4,5);t(76,14,5);t(62,9,8);

// Rug under meeting table
x.fillStyle='rgba(80,40,40,0.3)';
for(let y2=9;y2<=10;y2++)for(let x2=8;x2<=11;x2++)x.fillRect(x2*S,y2*S,S,S);
});
</script></body></html>
