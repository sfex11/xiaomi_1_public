<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Scene 2 - Pixel Chat Tavern</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;gap:12px}
.scene-wrap{position:relative}
.scene-wrap h3{text-align:center;color:#fbbf24;margin-bottom:6px;font-size:13px}
canvas{image-rendering:pixelated;border:3px solid #8B4513;border-radius:4px}
.c{width:480px;height:360px}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.chat-bubble{position:absolute;background:rgba(255,255,255,0.92);color:#333;font-size:9px;padding:4px 6px;border-radius:6px;max-width:100px;box-shadow:1px 1px 2px rgba(0,0,0,0.3)}
.chat-bubble::after{content:'';position:absolute;bottom:-4px;left:8px;border-width:4px 4px 0;border-style:solid;border-color:rgba(255,255,255,0.92) transparent transparent}
.b2::after{left:auto;right:8px}
.b3{top:24%!important}
.char-label{position:absolute;color:#fff;font-size:10px;font-weight:bold;text-shadow:1px 1px 2px #000;text-align:center;white-space:nowrap}
.bar{position:absolute;bottom:4px;left:4px;right:4px;display:flex;justify-content:space-between;color:#dda15e;font-size:8px;background:rgba(60,20,0,0.7);padding:4px 8px;border-radius:4px}
</style></head><body>
<div class="scene-wrap">
<h3>🍺 여관 채팅방 — The Agent Tavern</h3>
<canvas id="tavern" class="c" width="320" height="240"></canvas>
<div class="overlay">
<div class="char-label" style="left:12%;top:40%">レ</div>
<div class="char-label" style="left:35%;top:40%">ラ</div>
<div class="char-label" style="left:58%;top:40%">シ</div>
<div class="char-label" style="left:80%;top:40%">👑</div>
<div class="chat-bubble" style="left:3%;top:26%">안녕~ 회의시작! 👼</div>
<div class="chat-bubble b2" style="left:auto;right:5%;top:26%">서버 연결 완료 🐕</div>
<div class="chat-bubble b3" style="left:30%">테스트 중... 🤖</div>
<div class="bar"><span>🔥 4명 온라인</span><span>💬 1,247</span></div>
</div>
</div>

<div class="scene-wrap">
<h3>🏡 인테리어 뷰 — 팀 라운지</h3>
<canvas id="interior" class="c" width="320" height="240"></canvas>
<div class="overlay">
<div class="char-label" style="left:25%;top:35%">レ</div>
<div class="char-label" style="left:65%;top:35%">シ</div>
<div class="bar"><span>🛋️ 라운지</span><span>✨ 휴식 중</span></div>
</div>
</div>

<script>
function drawScene(canvasId, imgSrc, drawFn){
const c=document.getElementById(canvasId),x=c.getContext('2d');
const img=new Image();
img.onload=()=>{x.imageSmoothingEnabled=false;drawFn(x,img)};
img.src=imgSrc;
}

// Tavern
drawScene('tavern','tilemap-dungeon.png',(x,img)=>{
const S=16,G=17;
function t(idx,dx,dy){const col=idx%12,row=Math.floor(idx/12);x.drawImage(img,col*G,row*G,S,S,dx*S,dy*S,S,S)}
// Wooden floor
for(let y=0;y<15;y++)for(let x2=0;x2<20;x2++){t((x2+y*3)%5,x2,y);x.fillStyle='rgba(139,90,43,0.15)';x.fillRect(x2*S,y*S,S,S)}
// Walls
for(let x2=0;x2<20;x2++){t(14,x2,0);t(14,x2,1)}
// Fireplace
x.fillStyle='rgba(255,100,0,0.2)';x.beginPath();x.arc(2*S+8,2*S+8,5*S,0,Math.PI*2);x.fill();
t(94,1,0);t(96,2,0);
// Bar counter right
for(let i=1;i<7;i++){t(68,13+i,3);t(69,13+i,4)}
// Bar stools
t(65,14,5);t(65,16,5);t(65,18,5);t(67,14,6);t(67,16,6);t(67,18,6);
// Center table
for(let i=6;i<=12;i++)t(64,i,8);for(let i=6;i<=12;i++)t(66,i,9);
// Chairs
t(65,7,7);t(67,8,7);t(65,11,7);t(66,7,10);t(66,10,10);
// Side tables
t(64,2,8);t(66,2,9);t(64,16,8);t(66,16,9);
// Lanterns
t(10,6,1);t(11,13,1);t(10,0,0);t(11,19,0);
// Food
t(62,8,7);t(62,10,7);t(74,3,7);
// Pillars
for(let y2=2;y2<6;y2++){t(18,0,y2);t(16,19,y2)}
// Door
t(5,9,0);t(5,10,0);
// Rug
x.fillStyle='rgba(120,40,40,0.2)';
for(let y2=7;y2<=10;y2++)for(let x2=5;x2<=13;x2++)x.fillRect(x2*S,y2*S,S,S);
});

// Interior lounge
drawScene('interior','tilemap-indoor.png',(x,img)=>{
const S=16,G=17;
function t(dx,dy,srcX,srcY){x.drawImage(img,srcX*G,srcY*G,S,S,dx*S,dy*S,S,S)}
// Wood floor
for(let y=0;y<15;y++)for(let x2=0;x2<20;x2++){
t(x2,y, (x2+y)%12, 5); // wood-like tiles
x.fillStyle='rgba(100,70,30,0.1)';x.fillRect(x2*S,y*S,S,S);
}
// Walls top
for(let x2=0;x2<20;x2++){t(x2,0,0,0);t(x2,1,1,0)}
// Windows
t(5,1,4,0);t(6,1,4,0);t(13,1,4,0);t(14,1,4,0);
x.fillStyle='rgba(135,206,250,0.3)';
x.fillRect(5*S,1*S,S*2,S);x.fillRect(13*S,1*S,S*2,S);

// Sofa left
for(let i=0;i<4;i++){t(2+i,6,2,1)}
// Sofa right  
for(let i=0;i<4;i++){t(14+i,6,2,1)}
// Coffee table center
t(8,7,3,1);t(9,7,3,1);t(8,8,4,1);t(9,8,4,1);
// Armchairs
t(7,7,5,1);t(10,7,5,1);
// Bookshelf
for(let y2=2;y2<6;y2++){t(0,y2,6,0)}
// Rug
x.fillStyle='rgba(168,85,247,0.15)';
for(let y2=6;y2<=9;y2++)for(let x2=6;x2<=12;x2++)x.fillRect(x2*S,y2*S,S,S);
// Plant
t(19,3,7,0);t(19,4,7,1);
// Lamp
t(12,5,8,0);
// Characters on sofas
t(3,5,9,0); // left sofa
t(16,5,9,1); // right sofa
});
</script></body></html>
