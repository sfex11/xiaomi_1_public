---
layout: default
---
<article class="post">
  {% if page.image %}
  <div style="margin:-2rem -1.5rem 2rem;overflow:hidden;border-radius:0 0 var(--radius) var(--radius)">
    <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%;max-height:360px;object-fit:cover;margin:0;border-radius:0;box-shadow:none">
  </div>
  {% endif %}
  <div class="post-header">
    <div class="post-meta">
      <time>{{ page.date | date: "%Y.%m.%d" }}</time>
      {% if page.author %}<span class="author">{{ page.author }}</span>{% endif %}
      {% if page.category %}<span class="tag">{{ page.category }}</span>{% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
  <div class="back-link" style="width:100%">
    <a href="{{ site.baseurl }}/">← 목록으로 돌아가기</a>
  </div>
</article>
