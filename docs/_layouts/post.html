---
layout: default
---
<article style="padding-top:8px">
  {% if page.image %}
  <div style="margin:-48px -32px 32px;overflow:hidden;border-radius:0 0 12px 12px">
    <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%;max-height:360px;object-fit:cover;margin:0;border-radius:0;box-shadow:none">
  </div>
  {% endif %}
  <h1 style="font-family:'Playfair Display',serif;font-size:2em;margin-bottom:12px;line-height:1.3">{{ page.title }}</h1>
  <div class="post-meta">
    <span>{{ page.date | date: "%Y년 %m월 %d일" }}</span>
    {% if page.author %}<span style="color:#B8860B;font-weight:500">{{ page.author }}</span>{% endif %}
    {% if page.category %}<span class="tag">{{ page.category }}</span>{% endif %}
  </div>
  <hr style="margin:24px 0 32px;border-top:1px solid #E2E8F0">
  {{ content }}
  <div style="margin-top:56px;padding-top:24px;border-top:1px solid #E2E8F0;text-align:center">
    <a href="{{ site.baseurl }}/" style="display:inline-block;padding:10px 28px;background:#B8860B;color:#fff;border-radius:8px;font-size:0.9em;font-weight:500;border:none;transition:all .3s">← 목록으로 돌아가기</a>
  </div>
</article>
